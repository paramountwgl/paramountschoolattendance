<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Compliance Hub | Paramount School</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root { --forest: #006633; --gold: #ffd700; --danger: #e53935; --whatsapp: #25D366; --light: #f4f7f6; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding-bottom: 50px; }
        header { background: var(--forest); color: white; padding: 20px 3%; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header-content { display: flex; align-items: center; justify-content: center; gap: 12px; max-width: 1400px; margin: 0 auto; width: 100%; }
        .header-logo { height: 60px; width: auto; }
        .school-text { display: flex; flex-direction: column; line-height: 1.1; text-align: left; }
        .school-name-main { font-family: 'Montserrat'; font-size: clamp(1rem, 3vw, 2rem); font-weight: 800; }
        .school-name-sub { font-family: 'Montserrat'; font-size: clamp(0.5rem, 2vw, 0.8rem); color: var(--gold); font-weight: 700; }
        .admin-portal-title { font-family: 'Montserrat'; font-size: clamp(1rem, 3vw, 2.2rem); font-weight: 800; border-left: 3px solid var(--gold); padding-left: 15px; margin-left: 15px; text-transform: uppercase; }
        .container { max-width: 1100px; margin: 30px auto; padding: 0 15px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); border-top: 6px solid var(--forest); }
        .search-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
        label { display: block; font-size: 11px; font-weight: bold; color: #666; margin-bottom: 5px; text-transform: uppercase; }
        select { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid #eee; outline: none; font-size: 14px; background: white; }
        .btn-submit { background: linear-gradient(135deg, var(--forest), #004d26); color: white; border: none; padding: 15px; border-radius: 50px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; margin-top: 10px; transition: 0.3s; }
        .result-table { width: 100%; border-collapse: collapse; margin-top: 30px; border-radius: 12px; overflow: hidden; background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .result-table th { background: var(--forest); color: white; padding: 15px; font-size: 11px; text-transform: uppercase; }
        .result-table td { padding: 15px; border-bottom: 1px solid #eee; text-align: left; font-size: 14px; vertical-align: top; }
        .name-cell b { display: block; color: var(--forest); font-size: 15px; }
        .name-cell small { color: #666; font-weight: 600; }
        .missing-list { display: flex; flex-direction: column; gap: 4px; }
        .missing-item { color: var(--danger); font-size: 11px; font-weight: 800; background: #fff5f5; padding: 4px 8px; border-radius: 4px; border: 1px solid #ffebeb; text-transform: uppercase; }
        .signed-all { color: #2e7d32; font-weight: 800; font-size: 11px; background: #e8f5e9; padding: 4px 8px; border-radius: 4px; display: inline-block; }
        .action-cell { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-action { text-decoration: none; padding: 8px 12px; border-radius: 50px; font-size: 11px; font-weight: bold; color: white; display: inline-flex; align-items: center; gap: 6px; transition: 0.2s; }
        .btn-wa { background: var(--whatsapp); }
        .btn-call { background: #333; }
        .btn-action:hover { opacity: 0.8; transform: translateY(-1px); }
        .back-nav { display: flex; justify-content: center; margin-top: 30px; }
        .btn-back { text-decoration: none; color: #666; font-weight: bold; font-size: 14px; display: flex; align-items: center; gap: 8px; }
    </style>
</head>

    const daySelect = document.getElementById('vDay');
    const now = new Date();
    for(let i=1; i<=31; i++) {
        let val = i < 10 ? '0' + i : i;
        daySelect.innerHTML += `<option value="${val}" ${now.getDate() == i ? 'selected' : ''}>${val}</option>`;
    }
    document.getElementById('vMonth').value = (now.getMonth() + 1).toString().padStart(2, '0');

    function updateStudentList() {
        const cls = document.getElementById('vClass').value;
        const stSelect = document.getElementById('vStudent');
        stSelect.innerHTML = '<option value="">-- Select Student --</option>';
        if(studentData[cls]) {
            studentData[cls].forEach(name => {
                stSelect.innerHTML += `<option value="${name}">${name}</option>`;
            });
        }
    }

    async function fetchComplianceReport() {
        const d = document.getElementById('vDay').value;
        const m = document.getElementById('vMonth').value;
        const y = document.getElementById('vYear').value;
        const cls = document.getElementById('vClass').value;
        const selectedSt = document.getElementById('vStudent').value;
        const dateKey = `${y}-${m}-${d}`;
        const wrapper = document.getElementById('tableWrapper');

        if(!selectedSt) return alert("Please select a student!");
        wrapper.innerHTML = "<p style='text-align:center; padding:20px;'>Checking database records...</p>";

        const hwSnap = await db.ref(`homework/${dateKey}/${cls}`).once('value');
        const postedHW = hwSnap.val() || {};
        const signSnap = await db.ref(`homework_status/${dateKey}/${selectedSt}`).once('value');
        const signatures = signSnap.val() || {};
        const info = contactMap[selectedSt] || { parent: "Unknown", phone: "0000000000" };

        if(Object.keys(postedHW).length === 0) {
            wrapper.innerHTML = "<div class='card' style='margin-top:20px; text-align:center;'>No homework posted for this date.</div>";
            return;
        }

        let missingSubjects = [];
        let signedSubjects = [];
        for(let sub in postedHW) {
            if(sub === 'lastUpdated') continue;
            if(signatures[sub] && signatures[sub].verified === true) signedSubjects.push(sub);
            else missingSubjects.push(sub);
        }

        const waMsg = encodeURIComponent(`Hello ${info.parent}, homework for ${selectedSt} in subjects (${missingSubjects.join(', ')}) is NOT SIGNED. Please check the portal.`);
        const waLink = `https://wa.me/91${info.phone}?text=${waMsg}`;

        let html = `
        <table class="result-table">
            <thead>
                <tr>
                    <th>Student & Parent</th>
                    <th>Signed Subjects</th>
                    <th>NOT SIGNED</th>
                    <th>Contact Parent</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td class="name-cell">
                        <b>${selectedSt}</b>
                        <small>Parent: ${info.parent}</small><br>
                        <small style="color:#888;">${info.phone}</small>
                    </td>
                    <td>
                        ${signedSubjects.length ? signedSubjects.map(s => `<span class="signed-all" style="display:block; margin-bottom:2px;">${s}</span>`).join('') : '<small>None</small>'}
                    </td>
                    <td>
                        <div class="missing-list">
                            ${missingSubjects.length ? missingSubjects.map(s => `<span class="missing-item"><i class="fas fa-exclamation-triangle"></i> ${s}</span>`).join('') : '<span class="signed-all">COMPLETED</span>'}
                        </div>
                    </td>
                    <td class="action-cell">
                        ${missingSubjects.length ? `
                            <a href="${waLink}" target="_blank" class="btn-action btn-wa"><i class="fab fa-whatsapp"></i> Remind</a>
                            <a href="tel:${info.phone}" class="btn-action btn-call"><i class="fas fa-phone-alt"></i> Call</a>
                        ` : '<i class="fas fa-check-circle" style="color:var(--forest); font-size:24px;"></i>'}
                    </td>
                </tr>
            </tbody>
        </table>`;

        wrapper.innerHTML = html;
    }
