<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Parent Verifier | Paramount School</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Segoe+UI:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root { --forest: #006633; --gold: #ffd700; --danger: #c62828; --light: #f4f7f6; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding-bottom: 50px; }
        header { background: var(--forest); color: white; padding: 20px 3%; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header-content { display: flex; align-items: center; justify-content: center; gap: 12px; max-width: 1400px; margin: 0 auto; width: 100%; }
        .header-logo { height: 60px; width: auto; }
        .school-text { display: flex; flex-direction: column; line-height: 1.1; text-align: left; }
        .school-name-main { font-family: 'Montserrat'; font-size: clamp(1rem, 3vw, 2rem); font-weight: 800; }
        .school-name-sub { font-family: 'Montserrat'; font-size: clamp(0.5rem, 2vw, 0.8rem); color: var(--gold); font-weight: 700; }
        .admin-portal-title { font-family: 'Montserrat'; font-size: clamp(1rem, 3vw, 2.2rem); font-weight: 800; border-left: 3px solid var(--gold); padding-left: 15px; margin-left: 15px; text-transform: uppercase; }
        .container { max-width: 950px; margin: 30px auto; padding: 0 15px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); border-top: 6px solid var(--forest); }
        .search-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
        label { display: block; font-size: 11px; font-weight: bold; color: #666; margin-bottom: 5px; text-transform: uppercase; }
        select { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid #eee; outline: none; font-size: 14px; background: white; }
        .btn-submit { background: linear-gradient(135deg, var(--forest), #004d26); color: white; border: none; padding: 15px; border-radius: 50px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; margin-top: 10px; transition: 0.3s; }
        .result-table { width: 100%; border-collapse: collapse; margin-top: 30px; border-radius: 12px; overflow: hidden; }
        .result-table th { background: var(--forest); color: white; padding: 15px; font-size: 11px; text-transform: uppercase; }
        .result-table td { padding: 18px 15px; background: white; border-bottom: 1px solid #eee; text-align: center; font-size: 14px; }
        .status-badge { padding: 6px 15px; border-radius: 20px; font-weight: 800; font-size: 12px; display: inline-flex; align-items: center; gap: 6px; }
        .status-signed { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
        .status-pending { background: #fafafa; color: #9e9e9e; border: 1px solid #eee; }
        .back-nav { display: flex; justify-content: center; margin-top: 30px; }
        .btn-back { text-decoration: none; color: #666; font-weight: bold; font-size: 14px; display: flex; align-items: center; gap: 8px; }
    </style>
</head>
<body>

<header>
    <div class="header-content">
        <img src="logo.png" class="header-logo" onerror="this.style.display='none'">
        <div class="school-text">
            <span class="school-name-main">PARAMOUNT</span>
            <span class="school-name-sub">ENGLISH MEDIUM SCHOOL</span>
        </div>
        <h1 class="admin-portal-title">Verification</h1>
    </div>
</header>

<div class="container">
    <div class="card">
        <h3><i class="fas fa-user-check"></i> Parent Checkbox Tracker</h3>
        <div class="search-grid">
            <div><label>Day</label><select id="vDay"></select></div>
            <div><label>Month</label><select id="vMonth">
                <option value="01">Jan</option><option value="02">Feb</option><option value="03">Mar</option>
                <option value="04">Apr</option><option value="05">May</option><option value="06">Jun</option>
                <option value="07">Jul</option><option value="08">Aug</option><option value="09">Sep</option>
                <option value="10">Oct</option><option value="11">Nov</option><option value="12">Dec</option>
            </select></div>
            <div><label>Year</label><select id="vYear"><option value="2026">2026</option><option value="2025">2025</option></select></div>
            <div><label>Class</label><select id="vClass" onchange="updateStudentList()">
                <option value="">-- Class --</option>
                <option value="Pre-KG">Pre-KG</option><option value="KG-1">KG-1</option><option value="KG-2">KG-2</option>
                <option value="Grade-1">Grade-1</option><option value="Grade-2">Grade-2</option><option value="Grade-3">Grade-3</option>
                <option value="Grade-4">Grade-4</option><option value="Grade-5">Grade-5</option><option value="Grade-6">Grade-6</option>
                <option value="Grade-7">Grade-7</option><option value="Grade-8">Grade-8</option>
            </select></div>
            <div><label>Student</label><select id="vStudent"><option value="">-- Select Student --</option></select></div>
        </div>
        <button class="btn-submit" onclick="fetchAknowledgment()">View Acknowledgment</button>
    </div>
    <div id="tableWrapper"></div>
    <div class="back-nav"><a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i> Return to Teacher Portal</a></div>
</div>

    // Date Logic
    const daySelect = document.getElementById('vDay');
    for(let i=1; i<=31; i++) {
        let val = i < 10 ? '0' + i : i;
        daySelect.innerHTML += `<option value="${val}">${val}</option>`;
    }

    function updateStudentList() {
        const cls = document.getElementById('vClass').value;
        const stSelect = document.getElementById('vStudent');
        stSelect.innerHTML = '<option value="">-- Select Student --</option>';
        if(studentData[cls]) {
            studentData[cls].forEach(name => {
                stSelect.innerHTML += `<option value="${name}">${name}</option>`;
            });
        }
    }

    function fetchAknowledgment() {
        const d = document.getElementById('vDay').value;
        const m = document.getElementById('vMonth').value;
        const y = document.getElementById('vYear').value;
        const selectedSt = document.getElementById('vStudent').value;
        const dateKey = `${y}-${m}-${d}`;
        const wrapper = document.getElementById('tableWrapper');

        if(!selectedSt) return alert("Please select a student first!");
        wrapper.innerHTML = "<p style='text-align:center; padding:20px;'>Fetching parent signatures...</p>";

        db.ref(`homework_status/${dateKey}/${selectedSt}`).once('value', (snap) => {
            const subjects = snap.val();
            if(!subjects) {
                wrapper.innerHTML = "<div class='card' style='margin-top:20px; text-align:center; color:var(--danger); font-weight:bold;'>No signatures found for this student on this date.</div>";
                return;
            }
            let html = `<table class="result-table"><thead><tr><th>Homework Subject</th><th>Acknowledgment</th></tr></thead><tbody>`;
            for(let sub in subjects) {
                const isDone = subjects[sub].verified;
                html += `<tr><td><strong>${sub}</strong></td><td><span class="status-badge ${isDone ? 'status-signed' : 'status-pending'}">${isDone ? '<i class="fas fa-check-circle"></i> SIGNED' : '<i class="far fa-circle"></i> PENDING'}</span></td></tr>`;
            }
            wrapper.innerHTML = html + "</tbody></table>";
        });
    }
</script>
</body>
</html>
