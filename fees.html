<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fee Management | Paramount</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Segoe+UI:wght@400;700&display=swap" rel="stylesheet">
     <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root { --forest: #004d26; --gold: #ffd700; --danger: #e53935; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding: 20px 10px; }
        
        /* INTERNAL SECURITY OVERLAY */
        #lockScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 5000; display: flex; justify-content: center; align-items: center; text-align: center; }
        .auth-box { background: white; padding: 40px 30px; border-radius: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); width: 90%; max-width: 400px; border-bottom: 5px solid var(--forest); }
        
        /* MAIN APP STYLES */
        .container { max-width: 600px; margin: 0 auto; display: none; } /* Hidden until PW entered */
        .card { background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-top: 8px solid var(--forest); margin-bottom: 20px; }
        h3 { color: var(--forest); text-align: center; text-transform: uppercase; font-weight: 800; margin-bottom: 20px; font-family: 'Montserrat'; }
        .staff-badge { text-align: center; font-size: 12px; color: var(--forest); font-weight: 700; background: #e8f5e9; padding: 10px; border-radius: 12px; margin-bottom: 15px; }
        
        label { display: block; font-size: 10px; font-weight: 900; color: #777; margin: 15px 0 5px; text-transform: uppercase; letter-spacing: 1px; }
        select, input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #e0e0e0; font-size: 15px; outline: none; background: #fafafa; box-sizing: border-box; }
        
        .calc-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        .due-box { background: #fff5f5; border: 1px solid #ffcdd2; padding: 15px; border-radius: 15px; text-align: center; margin-top: 20px; }
        .due-box strong { font-size: 24px; color: #d32f2f; }

        .chart-container { margin-top: 25px; padding: 15px; background: #f9f9f9; border-radius: 15px; border: 1px solid #eee; }
        .bar-bg { width: 100%; height: 30px; background: #eee; border-radius: 50px; overflow: hidden; display: flex; }
        .bar-paid { height: 100%; background: linear-gradient(to right, var(--forest), #00b359); transition: width 0.8s ease; width: 0%; }
        
        .btn-submit { width: 100%; background: var(--forest); color: white; border: none; padding: 16px; border-radius: 50px; font-weight: 700; cursor: pointer; margin-top: 25px; font-size: 15px; box-shadow: 0 4px 15px rgba(0,77,38,0.2); }
        .btn-back { display: block; text-align: center; margin-top: 20px; color: #666; text-decoration: none; font-weight: 700; font-size: 13px; padding-top: 15px; border-top: 1px solid #eee; }
    </style>
</head>
<body>

<div id="lockScreen">
    <div class="auth-box">
        <img src="logo.png" style="height:80px; margin-bottom: 15px;">
        <h2 style="font-family: 'Montserrat'; color: var(--forest); margin-bottom: 5px;">PARAMOUNT</h2>
        <p style="color: var(--gold); font-weight: 800; font-size: 11px; text-transform: uppercase; margin-bottom: 25px;">Fee Portal Access</p>
        <button onclick="unlockPortal()" style="background: var(--forest); color: white; border: none; padding: 15px 30px; border-radius: 50px; font-weight: 800; cursor: pointer; width: 100%;">
            UNLOCK PORTAL <i class="fas fa-lock"></i>
        </button>
        <br><br>
        <a href="index.html" style="text-decoration:none; color:#999; font-size:12px;">Cancel & Return</a>
    </div>
</div>

<div class="container" id="mainContainer">
    <div class="card">
        <div id="staffNameDisplay" class="staff-badge"></div>
        <h3><i class="fas fa-file-invoice-dollar"></i> Student Fee Entry</h3>
        
        <label>Class</label>
        <select id="feeClass" onchange="populateStudents()">
            <option value="">-- Choose Class --</option>
            <option value="Pre-KG">Pre-KG</option><option value="KG-1">KG-1</option>
            <option value="KG-2">KG-2</option><option value="Grade-1">Grade-1</option>
            <option value="Grade-2">Grade-2</option><option value="Grade-3">Grade-3</option>
            <option value="Grade-4">Grade-4</option><option value="Grade-5">Grade-5</option>
            <option value="Grade-6">Grade-6</option><option value="Grade-7">Grade-7</option>
            <option value="Grade-8">Grade-8</option>
        </select>

        <label>Student Name</label>
        <select id="feeStudent" onchange="fetchExistingFeeData()">
            <option value="">-- Select Student --</option>
        </select>

        <div class="calc-row">
            <div>
                <label>Total Fee (₹)</label>
                <input type="number" id="totalFee" placeholder="0" oninput="calculateRealTime()">
            </div>
            <div>
                <label>Paid Now (₹)</label>
                <input type="number" id="payingAmount" placeholder="0" oninput="calculateRealTime()">
            </div>
        </div>

        <div class="due-box">
            <span>REMAINING BALANCE DUE</span>
            <strong id="dueDisplay">₹ 0</strong>
        </div>

        <div class="chart-container">
            <div class="bar-bg">
                <div id="barPaid" class="bar-paid"></div>
            </div>
            <p id="percentText" style="text-align: center; font-size: 11px; font-weight: bold; margin-top: 10px; color: #666;">0% Paid</p>
        </div>

        <label>Payment Date</label>
        <input type="date" id="paymentDate">

        <button class="btn-submit" onclick="saveFeeRecord()">
            Update Records <i class="fas fa-save"></i>
        </button>

        <a href="index.html" class="btn-back">
            <i class="fas fa-arrow-left"></i> Return to Teacher Portal
        </a>
    </div>
</div>

    function populateStudents() {
        const cls = document.getElementById('feeClass').value;
        const select = document.getElementById('feeStudent');
        select.innerHTML = '<option value="">-- Select Student --</option>';
        if(studentData[cls]) {
            studentData[cls].forEach(s => select.innerHTML += `<option value="${s}">${s}</option>`);
        }
    }

    async function fetchExistingFeeData() {
        const cls = document.getElementById('feeClass').value;
        const name = document.getElementById('feeStudent').value;
        if(!cls || !name) return;
        const snap = await db.ref(`fee_records/${cls}/${name}`).limitToLast(1).once('value');
        const data = snap.val();
        if(data) {
            const lastEntry = Object.values(data)[0];
            document.getElementById('totalFee').value = lastEntry.total || "";
            calculateRealTime();
        }
    }

    function calculateRealTime() {
        const total = parseFloat(document.getElementById('totalFee').value) || 0;
        const paying = parseFloat(document.getElementById('payingAmount').value) || 0;
        const due = total - paying;
        document.getElementById('dueDisplay').innerText = "₹ " + (due < 0 ? 0 : due);
        let paidPercent = (total > 0) ? (paying / total) * 100 : 0;
        if(paidPercent > 100) paidPercent = 100;
        document.getElementById('barPaid').style.width = paidPercent + "%";
        document.getElementById('percentText').innerText = Math.round(paidPercent) + "% Paid";
    }

    function saveFeeRecord() {
        const cls = document.getElementById('feeClass').value;
        const name = document.getElementById('feeStudent').value;
        const total = document.getElementById('totalFee').value;
        const paid = document.getElementById('payingAmount').value;
        const date = document.getElementById('paymentDate').value;
        const staff = sessionStorage.getItem("feeStaffName");
        if(!cls || !name || !paid || !total) return Swal.fire('Error', 'Missing Data', 'warning');
        
        const record = { total: total, paid: paid, due: total - paid, recordedBy: staff, date: date, timestamp: new Date().toLocaleString() };
        db.ref(`fee_records/${cls}/${name}`).push(record).then(() => {
            Swal.fire('Saved!', 'Record updated.', 'success');
            document.getElementById('payingAmount').value = '';
            calculateRealTime();
        });
    }
    document.getElementById('paymentDate').valueAsDate = new Date();
</script>
</body>
</html>
