<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fee Management | Paramount</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Segoe+UI:wght@400;700&display=swap" rel="stylesheet">
     <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root { --forest: #004d26; --gold: #ffd700; --danger: #e53935; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding: 20px 10px; }
        
        /* Security Shield Layer */
        #securityShield { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        
        .container { max-width: 600px; margin: 0 auto; display: none; }
        .card { background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-top: 8px solid var(--forest); margin-bottom: 20px; }
        
        h3 { color: var(--forest); text-align: center; text-transform: uppercase; font-weight: 800; margin-bottom: 20px; font-family: 'Montserrat'; }
        .staff-badge { text-align: center; font-size: 12px; color: var(--forest); font-weight: 700; background: #e8f5e9; padding: 10px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #c8e6c9; }
        
        label { display: block; font-size: 10px; font-weight: 900; color: #777; margin: 15px 0 5px; text-transform: uppercase; letter-spacing: 1px; }
        select, input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #e0e0e0; font-size: 15px; outline: none; background: #fafafa; box-sizing: border-box; }
        
        .calc-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        .due-box { background: #fff5f5; border: 1px solid #ffcdd2; padding: 15px; border-radius: 15px; text-align: center; margin-top: 20px; }
        .due-box span { display: block; font-size: 10px; color: #d32f2f; font-weight: 800; }
        .due-box strong { font-size: 24px; color: #d32f2f; }

        /* BAR CHART */
        .chart-container { margin-top: 25px; padding: 15px; background: #f9f9f9; border-radius: 15px; border: 1px solid #eee; }
        .chart-label { display: flex; justify-content: space-between; font-size: 12px; font-weight: 700; margin-bottom: 8px; }
        .bar-bg { width: 100%; height: 30px; background: #eee; border-radius: 50px; overflow: hidden; display: flex; box-shadow: inset 0 2px 5px rgba(0,0,0,0.05); }
        .bar-paid { height: 100%; background: linear-gradient(to right, var(--forest), #00b359); transition: width 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); width: 0%; }
        .bar-due { height: 100%; background: #ffcccc; transition: width 0.8s ease; width: 100%; }

        .btn-submit { width: 100%; background: var(--forest); color: white; border: none; padding: 16px; border-radius: 50px; font-weight: 700; cursor: pointer; margin-top: 25px; font-size: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 4px 15px rgba(0,77,38,0.2); }
        .btn-back { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 25px; color: #666; text-decoration: none; font-weight: 700; font-size: 13px; padding-top: 15px; border-top: 1px solid #eee; }
    </style>
</head>
<body>

<div id="securityShield">
    <img src="logo.png" style="height:80px; margin-bottom: 20px;">
    <h2 style="font-family: 'Montserrat'; color: var(--forest);">Authenticating...</h2>
</div>

<div class="container" id="mainContainer">
    <div class="card">
        <div id="staffNameDisplay" class="staff-badge"></div>
        <h3><i class="fas fa-file-invoice-dollar"></i> Student Fee Entry</h3>
        
        <label>Class</label>
        <select id="feeClass" onchange="populateStudents()">
            <option value="">-- Choose Class --</option>
            <option value="Pre-KG">Pre-KG</option><option value="KG-1">KG-1</option>
            <option value="KG-2">KG-2</option><option value="Grade-1">Grade-1</option>
            <option value="Grade-2">Grade-2</option><option value="Grade-3">Grade-3</option>
            <option value="Grade-4">Grade-4</option><option value="Grade-5">Grade-5</option>
            <option value="Grade-6">Grade-6</option><option value="Grade-7">Grade-7</option>
            <option value="Grade-8">Grade-8</option>
        </select>

        <label>Student Name</label>
        <select id="feeStudent" onchange="fetchExistingFeeData()">
            <option value="">-- Select Student --</option>
        </select>

        <div class="calc-row">
            <div>
                <label>Total Fee (₹)</label>
                <input type="number" id="totalFee" placeholder="0" oninput="calculateRealTime()">
            </div>
            <div>
                <label>Paid Now (₹)</label>
                <input type="number" id="payingAmount" placeholder="0" oninput="calculateRealTime()">
            </div>
        </div>

        <div class="due-box">
            <span>REMAINING BALANCE DUE</span>
            <strong id="dueDisplay">₹ 0</strong>
        </div>

        <div class="chart-container">
            <div class="chart-label">
                <span style="color: var(--forest);">PAID: <span id="paidText">₹0</span></span>
                <span style="color: #d32f2f;">DUE: <span id="dueText">₹0</span></span>
            </div>
            <div class="bar-bg">
                <div id="barPaid" class="bar-paid"></div>
                <div id="barDue" class="bar-due"></div>
            </div>
            <p id="percentText" style="text-align: center; font-size: 11px; font-weight: bold; margin-top: 10px; color: #666;">0% Completed</p>
        </div>

        <label>Payment Date</label>
        <input type="date" id="paymentDate">

        <button class="btn-submit" onclick="saveFeeRecord()">
            Update Records <i class="fas fa-save"></i>
        </button>

        <a href="index.html" class="btn-back">
            <i class="fas fa-arrow-left"></i> Return to Portal
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    // 1. SECURITY LOCK-IN

        const staff = sessionStorage.getItem("feeStaffName");
        if (!staff) {
            window.location.href = 'fee_login.html'; // Forces back to login if unauthorized
        } else {
            setTimeout(() => {
                document.getElementById('securityShield').style.display = 'none';
                document.getElementById('mainContainer').style.display = 'block';
                document.getElementById('staffNameDisplay').innerHTML = `<i class="fas fa-user-check"></i> Session: ${staff}`;
            }, 800);
        }
    };

    const firebaseConfig = { apiKey: "AIzaSyDRYk9KOK-ga0c88dnYMsAoifW2NJTd_Y8", databaseURL: "https://paramount-school-d55bc-default-rtdb.firebaseio.com", projectId: "paramount-school-d55bc" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

        "KG-1": ["Aadhya Sri Amaravadi", "Aditya Manda", "Aadhya Jella", "Advaita Gauri Bandi", "Aizah Amna Shaik", "Akshara Singaram", "Bhahuveer Raj Somishetti", "Gayathri Erroju", "Hanvika Mulkalapelli", "Manvith Kondoju", "Sayyad Vajeed", "Mekala Manu sri", "Oliva Grace Vallapu", "Rithwik Oggula", "Rithwika Kandagatla", "Srimahi Chevvu", "Thanvesh Thalla", "Trishul Nanduri", "Yoganshika Nanduri", "Yusra Mohammad", "Zainul Abideen Syed"],
        "KG-2": ["Deekshanth Sammeta", "Hanshith Erroju", "Harika Bandi", "Himarsha Naini", "Karthik Vallepu", "Kruthika Bandi", "Rajavardhan Gampala", "Roshan Kaitha", "Sri Anshu Ayaan Lyadala", "Srihansh Bandi", "Srikshitha Guduri", "Varshith Gonela", "Adyasri Makala", "Anvik Boini", "Anvith Pokanati", "Awais Ur Rehman Mohammad", "Dakshu Pothuganti", "Hansith Reddy Katukuri", "Harshith Pokanati", "Jella Aditya", "Krishank Nallabothula", "Kundana Katkuri", "Munukuntla Revanth Rudhra", "Niraja Nethri Siluveru", "Pranav Mattepelli", "Sreenith Yadav Naini", "Uvan Reddy Dasari", "Zayan Mohammad", "Zoya Mohammed"],

        "Grade-3": ["Nagavelly Manikanta", "Mirja Ismail", "Bandi Aryan", "Dandugula Mahesh Babu", "Bandi Tejasri", "Bandi Harshavardhan", "Gampala Vyshnavi", "Gampala Laxmi", "Garige Harshith", "Katkuri Hanish", "Katukuri Manideep", "MD Abdul Quddus", "Muppa Sathwik Patel", "Nuthanakanti Sansita", "Pasarakonda Ritwin", "Pinninti Rakshith Rao", "Rayi Sriman Adithya"],

        "Grade-5": ["Adya Reddy Vangala", "Kowshik Patel Muppa", "Siri Singaram", "Srikar Mandala", "Abdus Salaam MD", "Akshith Ram Kalvacharla", "Jaffar Anas Shaik", "Khaja Azeemuddin Mohammed", "Nihan Mohammed", "Saif Shaik", "Saketh Renukuntla", "Sreeja Dasari", "Vidhaatri Sahani"],
        "Grade-6": ["Abdul Razzak Mohammad", "Anudeepthi Chintha", "Saketh Ranaveni", "Shiva Sri Katukuri", "Aklees Shaik", "Akshya Kalvacharla", "Prince Katkuri"],
        "Grade-7": ["Manikanta Sannayala", "Sreeyan Reddy Karra", "Jayadhithya Chiluveru"],
        "Grade-8": ["Sathwika Nagavelly", "Vyshnavi Uppala", "Akshaya Gampala", "Ganesh Oggula", "Gayathri Renukuntla", "Khaja Sadeemuddin Mohammed"]
    };

    function populateStudents() {
        const cls = document.getElementById('feeClass').value;
        const select = document.getElementById('feeStudent');
        select.innerHTML = '<option value="">-- Select Student --</option>';
        if(studentData[cls]) {
            studentData[cls].forEach(s => select.innerHTML += `<option value="${s}">${s}</option>`);
        }
    }

    // 3. MEMORY LOGIC: Automatic Total Fee Retrieval
    async function fetchExistingFeeData() {
        const cls = document.getElementById('feeClass').value;
        const name = document.getElementById('feeStudent').value;
        if(!cls || !name) return;
        
        const snap = await db.ref(`fee_records/${cls}/${name}`).limitToLast(1).once('value');
        const data = snap.val();
        if(data) {
            const lastEntry = Object.values(data)[0];
            document.getElementById('totalFee').value = lastEntry.total || "";
            calculateRealTime();
        }
    }

    // 4. CALCULATION & BAR CHART ENGINE
    function calculateRealTime() {
        const total = parseFloat(document.getElementById('totalFee').value) || 0;
        const paying = parseFloat(document.getElementById('payingAmount').value) || 0;
        const due = total - paying;

        document.getElementById('dueDisplay').innerText = "₹ " + (due < 0 ? 0 : due);
        
        let paidPercent = (total > 0) ? (paying / total) * 100 : 0;
        if(paidPercent > 100) paidPercent = 100;
        
        document.getElementById('barPaid').style.width = paidPercent + "%";
        document.getElementById('barDue').style.width = (100 - paidPercent) + "%";
        
        document.getElementById('paidText').innerText = "₹" + paying;
        document.getElementById('dueText').innerText = "₹" + (due < 0 ? 0 : due);
        document.getElementById('percentText').innerText = Math.round(paidPercent) + "% Paid";
    }

    function saveFeeRecord() {
        const cls = document.getElementById('feeClass').value;
        const name = document.getElementById('feeStudent').value;
        const total = document.getElementById('totalFee').value;
        const paid = document.getElementById('payingAmount').value;
        const date = document.getElementById('paymentDate').value;
        const staff = sessionStorage.getItem("feeStaffName");

        if(!cls || !name || !paid || !total) return Swal.fire('Error', 'Missing Data', 'warning');

        const record = { total: total, paid: paid, due: total - paid, recordedBy: staff, date: date, timestamp: new Date().toLocaleString() };

        db.ref(`fee_records/${cls}/${name}`).push(record).then(() => {
            Swal.fire({ title: 'Saved!', text: 'Database Updated.', icon: 'success', confirmButtonColor: '#004d26' });
            document.getElementById('payingAmount').value = '';
            calculateRealTime();
        });
    }

    document.getElementById('paymentDate').valueAsDate = new Date();
</script>
</body>
</html>
