<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fee Management | Paramount</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Segoe+UI:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root { --forest: #006633; --gold: #ffd700; --danger: #e53935; --light: #f4f7f6; --gray: #bdc3c7; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding: 20px 10px; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-top: 8px solid var(--forest); margin-bottom: 20px; }
        
        h3 { color: var(--forest); text-align: center; text-transform: uppercase; font-weight: 800; margin-bottom: 20px; font-size: 1.2rem; }
        label { display: block; font-size: 10px; font-weight: 900; color: #777; margin: 15px 0 5px; text-transform: uppercase; letter-spacing: 1px; }
        select, input { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #eee; font-size: 15px; outline: none; background: #fafafa; box-sizing: border-box; }
        
        /* THE CALCULATION BOX */
        .calc-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        .due-box { background: #fff5f5; border: 1px solid #ffcdd2; padding: 10px; border-radius: 10px; text-align: center; }
        .due-box span { display: block; font-size: 10px; color: #d32f2f; font-weight: 800; }
        .due-box strong { font-size: 18px; color: #d32f2f; }

        /* THE BAR CHART */
        .chart-container { margin-top: 25px; padding: 15px; background: #f9f9f9; border-radius: 15px; }
        .chart-label { display: flex; justify-content: space-between; font-size: 12px; font-weight: 700; margin-bottom: 8px; }
        .bar-bg { width: 100%; height: 25px; background: #eee; border-radius: 50px; overflow: hidden; position: relative; display: flex; }
        .bar-paid { height: 100%; background: linear-gradient(to right, var(--forest), #00b359); transition: width 0.5s ease; width: 0%; }
        .bar-due { height: 100%; background: #ffcccc; transition: width 0.5s ease; width: 100%; }

        .btn-submit { width: 100%; background: linear-gradient(135deg, var(--forest), #004d26); color: white; border: 2px solid var(--gold); padding: 16px; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 25px; font-size: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: var(--forest); text-decoration: none; font-weight: bold; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h3><i class="fas fa-file-invoice-dollar"></i> Student Fee Entry</h3>
        
        <label>Select Class</label>
        <select id="feeClass" onchange="populateStudents()">
            <option value="">-- Choose --</option>
            <option value="Pre-KG">Pre-KG</option><option value="KG-1">KG-1</option>
            <option value="KG-2">KG-2</option><option value="Grade-1">Grade-1</option>
            <option value="Grade-2">Grade-2</option><option value="Grade-3">Grade-3</option>
            <option value="Grade-4">Grade-4</option><option value="Grade-5">Grade-5</option>
            <option value="Grade-6">Grade-6</option><option value="Grade-7">Grade-7</option>
            <option value="Grade-8">Grade-8</option>
        </select>

        <label>Student Name</label>
        <select id="feeStudent" onchange="calculateRealTime()">
            <option value="">-- Select Student --</option>
        </select>

        <div class="calc-row">
            <div>
                <label>Total Fee (₹)</label>
                <input type="number" id="totalFee" placeholder="e.g. 25000" oninput="calculateRealTime()">
            </div>
            <div>
                <label>Paying Now (₹)</label>
                <input type="number" id="payingAmount" placeholder="e.g. 5000" oninput="calculateRealTime()">
            </div>
        </div>

        <div class="due-box" style="margin-top: 20px;">
            <span>REMAINING DUE BALANCE</span>
            <strong id="dueDisplay">₹ 0</strong>
        </div>

        <div class="chart-container">
            <div class="chart-label">
                <span style="color: var(--forest);">Paid: <span id="paidText">₹0</span></span>
                <span style="color: #d32f2f;">Due: <span id="dueText">₹0</span></span>
            </div>
            <div class="bar-bg">
                <div id="barPaid" class="bar-paid"></div>
                <div id="barDue" class="bar-due"></div>
            </div>
            <p id="percentText" style="text-align: center; font-size: 11px; font-weight: bold; margin-top: 10px; color: #666;">0% Collected</p>
        </div>

        <label>Payment Date</label>
        <input type="date" id="paymentDate">

        <button class="btn-submit" onclick="saveFeeRecord()">
            Confirm & Save Payment <i class="fas fa-save"></i>
        </button>
        
        <a href="fee_login.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Login</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    // Config same as portal
    const firebaseConfig = { apiKey: "AIzaSyDRYk9KOK-ga0c88dnYMsAoifW2NJTd_Y8", databaseURL: "https://paramount-school-d55bc-default-rtdb.firebaseio.com", projectId: "paramount-school-d55bc" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const studentData = { "Pre-KG": ["Hanish Macharla", "Arjun Vihaar Illandula"], "Grade-1": ["Dheeraj Gattu", "Preetham Sannayala"], /* ... rest of your student lists ... */ };

    function populateStudents() {
        const cls = document.getElementById('feeClass').value;
        const select = document.getElementById('feeStudent');
        select.innerHTML = '<option value="">-- Select Student --</option>';
        if(studentData[cls]) {
            studentData[cls].forEach(s => select.innerHTML += `<option value="${s}">${s}</option>`);
        }
    }

    function calculateRealTime() {
        const total = parseFloat(document.getElementById('totalFee').value) || 0;
        const paying = parseFloat(document.getElementById('payingAmount').value) || 0;
        
        const due = total - paying;
        document.getElementById('dueDisplay').innerText = "₹ " + (due < 0 ? 0 : due);
        
        // Update Chart
        let paidPercent = (total > 0) ? (paying / total) * 100 : 0;
        if(paidPercent > 100) paidPercent = 100;
        
        document.getElementById('barPaid').style.width = paidPercent + "%";
        document.getElementById('barDue').style.width = (100 - paidPercent) + "%";
        
        document.getElementById('paidText').innerText = "₹" + paying;
        document.getElementById('dueText').innerText = "₹" + (due < 0 ? 0 : due);
        document.getElementById('percentText').innerText = Math.round(paidPercent) + "% Collected";
    }

    function saveFeeRecord() {
        const cls = document.getElementById('feeClass').value;
        const name = document.getElementById('feeStudent').value;
        const total = document.getElementById('totalFee').value;
        const paid = document.getElementById('payingAmount').value;
        const date = document.getElementById('paymentDate').value;
        const staff = sessionStorage.getItem("feeStaffName") || "Unknown Staff";

        if(!cls || !name || !paid || !total) return Swal.fire('Error', 'Complete all fields', 'error');

        const record = {
            totalFee: total,
            amountPaid: paid,
            dueAmount: total - paid,
            date: date,
            recordedBy: staff,
            timestamp: new Date().toLocaleString()
        };

        db.ref(`fee_records/${cls}/${name}`).push(record).then(() => {
            Swal.fire('Success', 'Fee Record Updated!', 'success');
            // Reset fields
            document.getElementById('payingAmount').value = '';
            calculateRealTime();
        });
    }

    document.getElementById('paymentDate').valueAsDate = new Date();
</script>

</body>
</html>
