<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Progress Portal | Paramount School</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Segoe+UI:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root { --forest: #006633; --gold: #ffd700; --danger: #e53935; --light: #f4f7f6; --premium-gradient: linear-gradient(135deg, #006633 0%, #004d26 100%); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f1; margin: 0; padding-bottom: 100px; overflow-x: hidden; }
        
        header { background: var(--forest); color: white; padding: 20px 15px; border-bottom: 4px solid var(--gold); }
        .header-content { display: flex; flex-direction: column; align-items: center; gap: 10px; max-width: 1200px; margin: 0 auto; text-align: center; }
        .header-logo { height: 60px; width: auto; }
        .school-text { display: flex; flex-direction: column; line-height: 1.1; }
        .school-name-main { font-family: 'Montserrat', sans-serif; font-size: 1.4rem; font-weight: 800; letter-spacing: 1px; }
        .school-name-sub { font-family: 'Montserrat', sans-serif; font-size: 0.7rem; color: var(--gold); font-weight: 700; text-transform: uppercase; }
        .divider-v { width: 2px; height: 35px; background: rgba(255,255,255,0.3); display: none; }
        .page-brand { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 1.2rem; color: white; text-transform: uppercase; margin-top: 5px; }

        .container { width: 100%; max-width: 900px; margin: 15px auto; padding: 0 10px; }
        .card { background: white; padding: 20px; border-radius: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.06); margin-bottom: 20px; border-top: 5px solid var(--gold); }
        h3 { color: var(--forest); text-align: center; font-size: 1.1rem; text-transform: uppercase; margin-bottom: 20px; font-weight: 800; }

        .setup-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        label { display: block; font-size: 10px; font-weight: 900; color: #777; margin-bottom: 5px; text-transform: uppercase; }
        select { width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #eee; background: #fafafa; font-weight: 700; outline: none; }

        .student-mark-card { background: white; border: 1px solid #eee; border-radius: 20px; padding: 15px; margin-bottom: 15px; }
        .student-name { font-weight: 800; color: var(--forest); font-size: 1rem; display: block; margin-bottom: 15px; border-bottom: 1px solid #f1f1f1; padding-bottom: 8px; }
        
        .marks-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .subject-box { background: #f9fcf9; padding: 8px; border-radius: 12px; border: 1px solid #f0f0f0; text-align: center; }
        .subject-box label { font-size: 9px; margin-bottom: 5px; color: #555; }
        .subject-box input { width: 100%; text-align: center; padding: 10px 5px; font-weight: 800; border-radius: 8px; border: 2px solid #ddd; font-size: 16px; outline: none; }

        .stats-bar { display: flex; justify-content: space-between; margin-top: 15px; padding: 12px; background: #f1f8f4; border-radius: 12px; font-size: 10px; font-weight: 800; color: var(--forest); }
        
        /* AUDIT FOOTER - COMPLETELY GONE WHEN NOT NEEDED */
        .audit-footer { font-size: 9px; color: #999; font-style: italic; margin-top: 10px; text-align: left; padding-top: 8px; border-top: 1px dashed #eee; display: none; }
        .audit-footer b { color: #555; }

        .btn-fetch { background: var(--forest); color: white; border: none; border-radius: 12px; padding: 15px; font-weight: 800; width: 100%; margin-top: 15px; cursor: pointer; text-transform: uppercase; font-size: 11px; }
        .action-row { display: none; gap: 10px; margin-top: 20px; }
        .btn-save { flex: 2; background: var(--premium-gradient); color: white; border: none; padding: 18px; border-radius: 50px; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 12px; box-shadow: 0 5px 15px rgba(0,102,51,0.2); }
        .btn-delete { flex: 1; background: white; color: var(--danger); border: 2px solid var(--danger); padding: 18px; border-radius: 50px; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 12px; }

        @media (min-width: 768px) {
            .header-content { flex-direction: row; justify-content: center; gap: 20px; text-align: left; }
            .divider-v { display: block; }
            .setup-grid { grid-template-columns: 1fr 1fr; }
            .marks-grid { grid-template-columns: repeat(6, 1fr); }
            .action-row { flex-direction: row; max-width: 500px; margin: 25px auto; }
            .page-brand { margin-top: 0; font-size: 1.5rem; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

    async function verifyStaff() {
        const name = document.getElementById('teacherSelect').value;
        if(!name) return;
        const { value: pw } = await Swal.fire({ title: `Staff Login`, text: `Enter password for ${name}`, input: 'password', showCancelButton: true, confirmButtonColor: '#006633' });
        if(pw === registry[name]) { authenticatedTeacher = name; document.getElementById('selectionCard').style.display = 'block'; Swal.fire('Verified', `Welcome ${name}`, 'success'); } 
        else if(pw) { Swal.fire('Error', 'Incorrect Password', 'error'); document.getElementById('teacherSelect').value = ""; }
    }

    function loadStudentMarksheet() {
        const cls = document.getElementById('examClass').value;
        const list = document.getElementById('marksList');
        if(!cls || !authenticatedTeacher) return;
        list.innerHTML = `<p style="text-align:center; padding:20px; color: #666;">Preparing...</p>`;

        let subjects = ["TEL", "HIN", "ENG", "MAT", "SOC"];
        if (["Grade-6", "Grade-7", "Grade-8"].includes(cls)) subjects.push("PHY", "CHE", "BIO", "IIT");
        else if (cls === "Grade-5") subjects.push("SCI", "IIT");
        else subjects.push("SCI");

        let html = "";
        studentData[cls].forEach((name, index) => {
            const studentId = name.replace(/\s+/g, '');
            html += `<div class="student-mark-card" data-student="${name}">
                <span class="student-name">${index + 1}. ${name}</span>
                <div class="marks-grid">
                    ${subjects.map(sub => `
                        <div class="subject-box">
                            <label>${sub}</label>
                            <input type="number" class="sub-input" data-sub="${sub}" value="0"
                            min="0" max="100" oninput="if(this.value > 100) this.value = 100; calculateStats(this)">
                        </div>`).join('')}
                </div>
                <div class="stats-bar">
                    <span>TOTAL: <span class="res-total">0</span></span>
                    <span>%: <span class="res-perc">0%</span></span>
                    <span>GRADE: <span class="res-grade">-</span></span>
                </div>
                <div class="audit-footer" id="audit-${studentId}" style="display:none;"></div>
            </div>`;
        });
        list.innerHTML = html;
        document.getElementById('actionRow').style.display = 'flex';
    }

    async function fetchExistingData() {
        const cls = document.getElementById('examClass').value;
        const exam = document.getElementById('examType').value;
        if(!cls || !exam) return;

        Swal.fire({ title: 'Fetching Data...', didOpen: () => Swal.showLoading() });

        db.ref(`progress_cards/${cls}/${exam}`).once('value', (snap) => {
            const data = snap.val() || {};
            Swal.close();

            // RESET ALL STUDENT CARDS FIRST
            document.querySelectorAll('.student-mark-card').forEach(card => {
                const name = card.getAttribute('data-student');
                const studentId = name.replace(/\s+/g, '');
                const auditDiv = document.getElementById(`audit-${studentId}`);
                
                // Reset inputs to 0 and hide audit footer initially
                card.querySelectorAll('.sub-input').forEach(inp => inp.value = 0);
                auditDiv.style.display = "none";
                auditDiv.innerHTML = "";

                if(data[name]) {
                    // Populate marks
                    for(let sub in data[name].marks) {
                        const inp = card.querySelector(`input[data-sub="${sub}"]`);
                        if(inp) inp.value = data[name].marks[sub];
                    }
                    calculateStats(card.querySelector('input'));
                    
                    // CRITICAL FIX: Only show audit if this specific student has data
                    if(data[name].updatedBy) {
                        auditDiv.innerHTML = `Last updated by: <b>${data[name].updatedBy}</b> on <b>${data[name].updatedAt}</b>`;
                        auditDiv.style.display = "block";
                    }
                }
            });
            Swal.fire('Ready', 'Database marks loaded.', 'success');
        });
    }

    function calculateStats(input) {
        if(!input) return;
        const card = input.closest('.student-mark-card');
        const inputs = Array.from(card.querySelectorAll('.sub-input'));
        const marks = inputs.map(i => parseInt(i.value) || 0);
        const total = marks.reduce((a, b) => a + b, 0);
        const maxMarks = inputs.length * 100;
        const perc = ((total / maxMarks) * 100).toFixed(1);
        const roundPerc = Math.round(perc);

        let grade = "F";
        if(roundPerc >= 91) grade = "A1"; else if(roundPerc >= 81) grade = "A2"; else if(roundPerc >= 71) grade = "B1";
        else if(roundPerc >= 61) grade = "B2"; else if(roundPerc >= 51) grade = "C1"; else if(roundPerc >= 35) grade = "D";
        
        card.querySelector('.res-total').innerText = total;
        card.querySelector('.res-perc').innerText = perc + "%";
        card.querySelector('.res-grade').innerText = grade;
    }

    async function saveAllMarks() {
        const cls = document.getElementById('examClass').value;
        const exam = document.getElementById('examType').value;
        const cards = document.querySelectorAll('.student-mark-card');
        const updates = {};
        
        const now = new Date();
        const timeStamp = now.toLocaleDateString('en-GB', { day: '2-digit', month: 'long', year: 'numeric' }) + " at " + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

        cards.forEach(card => {
            const name = card.getAttribute('data-student');
            const studentMarks = {};
            let hasInput = false;
            
            card.querySelectorAll('.sub-input').forEach(input => { 
                if(input.value != 0 && input.value !== "") {
                    studentMarks[input.getAttribute('data-sub')] = input.value;
                    hasInput = true;
                }
            });
            
            if(hasInput) {
                updates[`progress_cards/${cls}/${exam}/${name}`] = {
                    marks: studentMarks, 
                    total: card.querySelector('.res-total').innerText,
                    percentage: card.querySelector('.res-perc').innerText, 
                    grade: card.querySelector('.res-grade').innerText,
                    updatedBy: authenticatedTeacher, 
                    updatedAt: timeStamp
                };
                
                const studentId = name.replace(/\s+/g, '');
                const auditDiv = document.getElementById(`audit-${studentId}`);
                auditDiv.innerHTML = `Last updated by: <b>${authenticatedTeacher}</b> on <b>${timeStamp}</b>`;
                auditDiv.style.display = "block";
            }
        });

        if(Object.keys(updates).length === 0) return Swal.fire('Error', 'No marks entered to save.', 'warning');

        Swal.fire({ title: 'Syncing...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        db.ref().update(updates).then(() => Swal.fire('Saved!', 'Database updated.', 'success'));
    }

    async function deleteAllMarks() {
        const cls = document.getElementById('examClass').value;
        const exam = document.getElementById('examType').value;
        if(!cls) return;

        const result = await Swal.fire({
            title: 'Delete Class Records?',
            text: `Remove ALL marks for ${cls} - ${exam}?`,
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#d33',
            confirmButtonText: 'Yes, Wipe'
        });

        if (result.isConfirmed) {
            db.ref(`progress_cards/${cls}/${exam}`).remove().then(() => {
                document.querySelectorAll('.sub-input').forEach(i => i.value = '0');
                document.querySelectorAll('.res-total, .res-perc, .res-grade').forEach(s => s.innerText = '0');
                document.querySelectorAll('.audit-footer').forEach(f => { f.innerHTML = ''; f.style.display = 'none'; });
                Swal.fire('Deleted', 'Data wiped.', 'success');
            });
        }
    }
