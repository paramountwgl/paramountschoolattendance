<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Progress Cards | Paramount School</title>

    <style>
        :root { --forest: #006633; --gold: #ffd700; --danger: #e53935; --light: #f4f7f6; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding-bottom: 50px; }
        
        /* HEADER - MATCHING SCREENSHOT (309) */
        header { background: var(--forest); color: white; padding: 25px 3%; box-shadow: 0 4px 15px rgba(0,0,0,0.15); }
        .header-content { display: flex; align-items: center; justify-content: center; gap: 20px; max-width: 1200px; margin: 0 auto; width: 100%; }
        .header-logo { height: clamp(55px, 8vw, 80px); width: auto; flex-shrink: 0; }
        .divider { width: 2px; height: 50px; background: rgba(255,255,255,0.3); margin: 0 10px; }
        .school-text { display: flex; flex-direction: column; line-height: 1.1; text-align: left; }
        .school-name-main { font-family: 'Montserrat', sans-serif; font-size: clamp(1.2rem, 4vw, 2.2rem); font-weight: 800; letter-spacing: 1px; }
        .school-name-sub { font-family: 'Montserrat', sans-serif; font-size: clamp(0.6rem, 2vw, 0.9rem); color: var(--gold); font-weight: 700; text-transform: uppercase; }
        .page-brand { font-family: 'Montserrat', sans-serif; font-size: clamp(1.2rem, 4vw, 2.2rem); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        .container { max-width: 900px; margin: 30px auto; padding: 0 15px; }
        
        /* CENTERED NAVIGATION */
        .nav-header { display: flex; justify-content: center; margin-bottom: 25px; }
        .btn-back { 
            color: #666; text-decoration: none; font-weight: 700; font-size: 14px; 
            display: flex; align-items: center; gap: 8px; transition: 0.3s;
        }
        .btn-back:hover { color: var(--forest); }

        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-top: 8px solid var(--forest); margin-bottom: 25px; }
        h3 { color: var(--forest); text-align: center; text-transform: uppercase; font-size: 1.2rem; margin: 0 0 20px 0; font-weight: 800; }
        
        label { display: block; font-size: 10px; font-weight: 900; color: #777; margin: 10px 0 5px; text-transform: uppercase; letter-spacing: 1px; }
        select, input { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #eee; font-size: 14px; outline: none; background: #fafafa; }

        .student-mark-card { background: #fff; border: 1px solid #eee; border-radius: 15px; padding: 20px; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.02); }
        .student-name { font-weight: 800; color: var(--forest); margin-bottom: 15px; display: block; border-bottom: 1px solid #f0f0f0; padding-bottom: 10px; font-size: 17px; }
        
        .marks-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(85px, 1fr)); gap: 12px; }
        .subject-box { text-align: center; background: #fdfdfd; padding: 10px; border-radius: 10px; border: 1px solid #f0f0f0; }
        .subject-box label { font-size: 9px; margin-bottom: 5px; color: #555; }
        .subject-box input { text-align: center; padding: 8px; font-weight: 800; border-radius: 6px; border: 1px solid #ddd; width: 100%; }

        .stats-bar { display: flex; justify-content: space-around; margin-top: 15px; padding: 15px; background: #f1f8f4; border-radius: 12px; font-size: 13px; font-weight: 800; color: var(--forest); }
        
        .btn-save { background: linear-gradient(135deg, var(--forest), #004d26); color: white; border: 2px solid var(--gold); padding: 18px; width: 100%; border-radius: 50px; font-weight: 800; cursor: pointer; margin-top: 25px; box-shadow: 0 8px 20px rgba(0,102,51,0.2); display: none; text-transform: uppercase; }
        
        .setup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        @media (max-width: 600px) {
            .divider { display: none; }
            .header-content { flex-direction: column; gap: 10px; }
            .school-text { text-align: center; }
            .setup-grid { grid-template-columns: 1fr; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

    async function verifyStaff() {
        const name = document.getElementById('teacherSelect').value;
        if(!name) return;
        const { value: pw } = await Swal.fire({ 
            title: `Staff Login`, text: `Enter password for ${name}`, 
            input: 'password', showCancelButton: true, confirmButtonColor: '#006633'
        });

        if(pw === registry[name]) { 
            authenticatedTeacher = name;
            document.getElementById('selectionCard').style.display = 'block';
            Swal.fire('Verified', `Welcome ${name}`, 'success');
        } else if(pw) { 
            Swal.fire('Error', 'Incorrect Password', 'error'); 
            document.getElementById('teacherSelect').value = ""; 
        }
    }

    function loadStudentMarksheet() {
        const cls = document.getElementById('examClass').value;
        const list = document.getElementById('marksList');
        if(!cls || !authenticatedTeacher) return;

        list.innerHTML = `<p style="text-align:center; padding:20px; color: #666;">Generating sheet for ${cls}...</p>`;

        let subjects = ["TEL", "HIN", "ENG", "MAT", "SOC"];
        if (["Grade-6", "Grade-7", "Grade-8"].includes(cls)) subjects.push("PHY", "CHE", "BIO", "IIT");
        else if (cls === "Grade-5") subjects.push("SCI", "IIT");
        else subjects.push("SCI");

        let html = "";
        studentData[cls].forEach((name, index) => {
            html += `
            <div class="student-mark-card" data-student="${name}">
                <span class="student-name">${index + 1}. ${name}</span>
                <div class="marks-grid">
                    ${subjects.map(sub => `
                        <div class="subject-box"><label>${sub}</label>
                        <input type="number" class="sub-input" data-sub="${sub}" placeholder="0" oninput="calculateStats(this)"></div>
                    `).join('')}
                </div>
                <div class="stats-bar">
                    <span>TOTAL: <span class="res-total">0</span></span>
                    <span>%: <span class="res-perc">0%</span></span>
                    <span>GRADE: <span class="res-grade">-</span></span>
                </div>
            </div>`;
        });

        list.innerHTML = html;
        document.getElementById('saveAllBtn').style.display = 'block';
    }

    function calculateStats(input) {
        const card = input.closest('.student-mark-card');
        const inputs = Array.from(card.querySelectorAll('.sub-input'));
        const marks = inputs.map(i => parseInt(i.value) || 0);
        const total = marks.reduce((a, b) => a + b, 0);
        const maxMarks = inputs.length * 100;
        const perc = ((total / maxMarks) * 100).toFixed(1);

        let grade = "F";
        if(perc >= 91) grade = "A1"; else if(perc >= 81) grade = "A2"; else if(perc >= 71) grade = "B1";
        else if(perc >= 61) grade = "B2"; else if(perc >= 51) grade = "C1"; else if(perc >= 35) grade = "D";

        card.querySelector('.res-total').innerText = total;
        card.querySelector('.res-perc').innerText = perc + "%";
        card.querySelector('.res-grade').innerText = grade;
    }

    async function saveAllMarks() {
        const cls = document.getElementById('examClass').value;
        const exam = document.getElementById('examType').value;
        const cards = document.querySelectorAll('.student-mark-card');
        const updates = {};
        const now = new Date();
        const timeStamp = now.toLocaleDateString() + " " + now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

        cards.forEach(card => {
            const name = card.getAttribute('data-student');
            const studentMarks = {};
            card.querySelectorAll('.sub-input').forEach(input => { studentMarks[input.getAttribute('data-sub')] = input.value || 0; });
            updates[`progress_cards/${cls}/${exam}/${name}`] = {
                marks: studentMarks, total: card.querySelector('.res-total').innerText,
                percentage: card.querySelector('.res-perc').innerText, grade: card.querySelector('.res-grade').innerText,
                updatedBy: authenticatedTeacher, updatedAt: timeStamp
            };
        });

        Swal.fire({ title: 'Uploading...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });
        db.ref().update(updates).then(() => { Swal.fire('Success!', 'Progress cards saved.', 'success'); });
    }
</script>
