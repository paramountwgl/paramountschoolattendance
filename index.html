<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Paramount School | Teacher Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Segoe+UI:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root { --forest: #006633; --gold: #ffd700; --danger: #e53935; --light: #f4f7f6; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding-bottom: 50px; overflow-x: hidden; }
        
        header { background: var(--forest); color: white; padding: 20px 3%; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header-content { display: flex; align-items: center; justify-content: center; gap: 12px; max-width: 1400px; margin: 0 auto; width: 100%; }
        .header-logo { height: clamp(55px, 8vw, 75px); width: auto; flex-shrink: 0; }
        .school-text { display: flex; flex-direction: column; line-height: 1.1; white-space: nowrap; text-align: left; }
        .school-name-main { font-family: 'Montserrat', sans-serif; font-size: clamp(1.2rem, 3.5vw, 2.2rem); font-weight: 800; }
        .school-name-sub { font-family: 'Montserrat', sans-serif; font-size: clamp(0.6rem, 2vw, 0.9rem); color: var(--gold); font-weight: 700; text-transform: uppercase; }

        .container { max-width: 850px; margin: 20px auto; padding: 0 15px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-bottom: 25px; border-top: 6px solid var(--forest); }
        h3 { color: var(--forest); margin: 0 0 20px; font-size: 1.4rem; display: flex; align-items: center; gap: 10px; border-bottom: 2px solid #eee; padding-bottom: 10px; justify-content: center; text-transform: uppercase; }
        label { display: block; font-size: 11px; font-weight: bold; color: #666; margin: 15px 0 5px; text-transform: uppercase; }
        select, input, textarea { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid #ddd; font-size: 15px; outline: none; }
        
        .row-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .btn { flex: 1; background: linear-gradient(135deg, var(--forest), #004d26); color: white; border: none; padding: 15px; border-radius: 50px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 14px; margin-top: 15px; width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn.warning { background: linear-gradient(135deg, #fb8c00, #ef6c00); }
        .btn.blue { background: linear-gradient(135deg, #2196f3, #1976d2); }

        .student-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-bottom: 1px solid #eee; }
        .student-item input[type="checkbox"] { width: 22px; height: 22px; accent-color: var(--forest); }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

<input type="text" style="display:none"><input type="password" style="display:none">

<header>
    <div class="header-content">
        <img src="logo.png" class="header-logo" onerror="this.style.display='none'">
        <div class="school-text">
            <span class="school-name-main">PARAMOUNT</span>
            <span class="school-name-sub">ENGLISH MEDIUM SCHOOL</span>
        </div>
    </div>
</header>

<div class="container">
    <div style="display:flex; justify-content:center; gap:15px; margin-bottom:20px;">
        <a href="admin.html" style="text-decoration:none; color:var(--forest); font-weight:bold; border:1px solid; padding:8px 15px; border-radius:20px;">Admin Dashboard</a>
        <a href="Parents Checkbox.html" style="text-decoration:none; color:var(--gold); font-weight:bold; border:1px solid; padding:8px 15px; border-radius:20px;">Parents Portal</a>
    </div>

    <div class="card" style="border-top-color: var(--gold);">
        <h3>Daily Homework Tool</h3>
        <div class="row-grid">
            <div><label>Class</label><select id="hwClass" onchange="updateHWSubjects()">
                <option value="Pre-KG">Pre-KG</option><option value="KG-1">KG-1</option><option value="KG-2">KG-2</option>
                <option value="Grade-1">Grade-1</option><option value="Grade-2">Grade-2</option><option value="Grade-3">Grade-3</option>
                <option value="Grade-4">Grade-4</option><option value="Grade-5">Grade-5</option><option value="Grade-6">Grade-6</option>
                <option value="Grade-7">Grade-7</option><option value="Grade-8">Grade-8</option>
            </select></div>
            <div><label>Date</label><input type="date" id="hwDate" onchange="fetchExistingHW()"></div>
        </div>
        <label>Subject</label><select id="hwSubSelect" onchange="fetchExistingHW()"></select>
        <label>Task Details</label><textarea id="hwTask" rows="3" placeholder="Type instructions..."></textarea>
        
        <div style="display:flex; gap:12px;">
            <button class="btn" onclick="postHomework()">
                <i class="fas fa-cloud-upload-alt"></i> Publish / Update
            </button>
            <button class="btn warning" style="flex:0.5;" onclick="clearHomeworkField()">
                <i class="fas fa-eraser"></i> Clear Task
            </button>
        </div>
    </div>

    </div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDRYk9KOK-ga0c88dnYMsAoifW2NJTd_Y8", databaseURL: "https://paramount-school-d55bc-default-rtdb.firebaseio.com", projectId: "paramount-school-d55bc" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // RESTORED HOMEWORK FUNCTIONS
    function updateHWSubjects() { 
        const cls = document.getElementById('hwClass').value; 
        const common = ["TELUGU", "HINDI", "ENGLISH", "MATHS", "SOCIAL STUDIES"]; 
        let subs = (["Grade-6", "Grade-7", "Grade-8"].includes(cls)) ? [...common, "PHYSICS", "CHEMISTRY", "BIOLOGY"] : [...common, "SCIENCE"]; 
        document.getElementById('hwSubSelect').innerHTML = subs.map(s => `<option value="${s}">${s}</option>`).join(''); 
        fetchExistingHW(); 
    }

    function fetchExistingHW() { 
        const d = document.getElementById('hwDate').value; 
        const c = document.getElementById('hwClass').value; 
        const s = document.getElementById('hwSubSelect').value; 
        if(!d) return; 
        db.ref(`homework/${d}/${c}/${s}`).once('value', (snap) => { 
            document.getElementById('hwTask').value = snap.val() || ""; 
        }); 
    }

    function postHomework() { 
        const d = document.getElementById('hwDate').value; 
        const c = document.getElementById('hwClass').value; 
        const s = document.getElementById('hwSubSelect').value; 
        const t = document.getElementById('hwTask').value; 
        if(!d || !t) return Swal.fire('Error', 'Details required!', 'error'); 
        db.ref(`homework/${d}/${c}`).update({ [s]: t, lastUpdated: new Date().toLocaleTimeString() })
          .then(() => Swal.fire('Updated!', 'Homework is now visible to parents.', 'success')); 
    }

    function clearHomeworkField() {
        document.getElementById('hwTask').value = "";
        Swal.fire({
            title: 'Cleared!',
            text: 'The homework input has been reset.',
            icon: 'info',
            timer: 1500,
            showConfirmButton: false
        });
    }

    // Initialize dates
    document.getElementById('hwDate').valueAsDate = new Date();
    updateHWSubjects();
</script>
</body>
</html>
