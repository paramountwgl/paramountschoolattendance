<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Paramount School | Attendance Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root { --forest: #006633; --gold: #ffd700; --light-bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: var(--light-bg); color: #333; }
        
        header { background: var(--forest); color: white; padding: 25px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .container { max-width: 500px; margin: 20px auto; padding: 15px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        
        h2 { color: var(--forest); text-align: center; border-bottom: 2px solid var(--gold); padding-bottom: 10px; margin-top: 0; }
        label { display: block; font-size: 11px; font-weight: bold; color: #888; margin: 15px 0 5px; text-transform: uppercase; }
        
        select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; background: #fafafa; outline: none; transition: 0.3s; }
        select:focus { border-color: var(--forest); }

        /* Attendance List Styles */
        #listContainer { margin-top: 25px; border-top: 1px solid #eee; }
        .student-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 5px; border-bottom: 1px solid #f9f9f9; }
        .student-name { font-weight: 600; color: #444; }
        .present-toggle { width: 28px; height: 28px; accent-color: var(--forest); cursor: pointer; }

        /* Calculation Summary Box */
        .summary-report { 
            background: #e8f5e9; 
            padding: 20px; 
            border-radius: 12px; 
            margin-top: 25px; 
            border: 1px solid #c8e6c9;
            text-align: center;
            display: none; /* Hidden until class is selected */
        }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-item { padding: 10px; background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .stat-item span { display: block; font-size: 10px; color: #888; text-transform: uppercase; }
        .stat-item strong { font-size: 18px; color: var(--forest); }

        .whatsapp-btn { 
            background: #25D366; 
            color: white; 
            border: none; 
            padding: 16px; 
            border-radius: 35px; 
            width: 100%; 
            font-weight: bold; 
            font-size: 16px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
            transition: transform 0.2s;
        }
        .whatsapp-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0; letter-spacing: 1px;">PARAMOUNT SCHOOL</h1>
    <p style="margin:5px 0 0; opacity:0.9; font-size: 14px;">Daily Teacher Attendance Portal</p>
</header>

<div class="container">
    <div class="card">
        <h2>Mark Attendance</h2>
        
        <label>Teacher Name</label>
        <select id="teacherName">
            <option value="">-- Select Your Name --</option>
            <option value="Mr. Shaik Ahmad">Mr. Shaik Ahmad</option>
            <option value="Ms. Geethika">Ms. Geethika</option>
        </select>

        <label>Class / Section</label>
        <select id="classSelect" onchange="generateStudentList()">
            <option value="">-- Choose Class --</option>
            <option value="10th-A">10th Grade - A</option>
            <option value="9th-B">9th Grade - B</option>
        </select>

        <div id="listContainer"></div>

        <div id="reportSection" class="summary-report">
            <div class="stats-grid">
                <div class="stat-item"><span>Total</span><strong id="countTotal">0</strong></div>
                <div class="stat-item"><span>Present</span><strong id="countPresent">0</strong></div>
                <div class="stat-item"><span>Absent</span><strong id="countAbsent" style="color: #d32f2f;">0</strong></div>
            </div>

            <button class="whatsapp-btn" onclick="sendToWhatsApp()">
                <i class="fab fa-whatsapp"></i> Send Detailed Report
            </button>
        </div>
    </div>
</div>

<script>
// Student Database
const schoolData = {
    "10th-A": ["Shaik Tauseef Ali", "Rahul Sharma", "Zoya Khan", "Abhishek Das", "Anjali Singh"],
    "9th-B": ["Shaik Minhaj Ali", "Sana Khan", "Aryan Raj", "Priya Verma"]
};

function generateStudentList() {
    const cls = document.getElementById('classSelect').value;
    const listDiv = document.getElementById('listContainer');
    const reportBox = document.getElementById('reportSection');
    
    listDiv.innerHTML = ""; // Clear existing list
    
    if (schoolData[cls]) {
        schoolData[cls].forEach((name, index) => {
            listDiv.innerHTML += `
                <div class="student-row">
                    <span class="student-name">${index + 1}. ${name}</span>
                    <input type="checkbox" class="present-toggle" checked onchange="calculateStats()">
                </div>`;
        });
        
        // Make the report and send button visible
        reportBox.style.display = "block";
        calculateStats(); // Initial count
    } else {
        reportBox.style.display = "none";
    }
}

function calculateStats() {
    const total = document.querySelectorAll('.present-toggle').length;
    const present = document.querySelectorAll('.present-toggle:checked').length;
    const absent = total - present;
    
    document.getElementById('countTotal').innerText = total;
    document.getElementById('countPresent').innerText = present;
    document.getElementById('countAbsent').innerText = absent;
}

function sendToWhatsApp() {
    const teacher = document.getElementById('teacherName').value;
    const cls = document.getElementById('classSelect').value;
    
    if(!teacher || !cls) {
        alert("Please select Teacher Name and Class before sending!");
        return;
    }

    const total = document.getElementById('countTotal').innerText;
    const present = document.getElementById('countPresent').innerText;
    const absent = document.getElementById('countAbsent').innerText;
    
    let absentNames = [];
    document.querySelectorAll('.student-row').forEach(row => {
        if(!row.querySelector('input').checked) {
            // Get name and remove the "1. " numbering
            let name = row.querySelector('.student-name').innerText.split(". ")[1];
            absentNames.push(name);
        }
    });

    const absenteeString = absentNames.length > 0 ? absentNames.join(", ") : "None (All Present)";
    const date = new Date().toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });

    // Detailed Report Formatting
    const finalReport = `*PARAMOUNT SCHOOL ATTENDANCE*%0A` +
                        `----------------------------%0A` +
                        `*Teacher:* ${teacher}%0A` +
                        `*Class:* ${cls}%0A` +
                        `*Date:* ${date}%0A` +
                        `----------------------------%0A` +
                        `*Total Students:* ${total}%0A` +
                        `*Present:* ${present}%0A` +
                        `*Absent:* ${absent}%0A%0A` +
                        `*Absentees:* ${absenteeString}%0A` +
                        `----------------------------`;

    window.open(`https://wa.me/919550791538?text=${finalReport}`, '_blank');
}
</script>

</body>
</html>
