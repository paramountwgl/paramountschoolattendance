<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Portal | Paramount School</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Segoe+UI:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root { --forest: #006633; --gold: #ffd700; --danger: #c62828; --light: #f4f7f6; --accent: #2196f3; }
        * { box-sizing: border-box; } 
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding-bottom: 120px; }
        
        /* AUTHENTICATION STYLING */
        .overlay-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--light); z-index: 9999; display: flex; justify-content: center; align-items: center; padding: 15px; }
        .auth-box { background: white; padding: 40px 25px; border-radius: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); width: 100%; max-width: 400px; border-bottom: 8px solid var(--forest); text-align: center; position: relative; }
        .auth-logo { height: 60px; margin-bottom: 15px; }

        /* HEADER & NOTIFICATIONS */
        header { background: linear-gradient(135deg, var(--forest), #004d26); color: white; padding: 15px 5%; box-shadow: 0 4px 15px rgba(0,0,0,0.15); position: sticky; top: 0; z-index: 1000; }
        .header-content { display: flex; align-items: center; justify-content: space-between; max-width: 1200px; margin: 0 auto; width: 100%; }
        .school-brand { display: flex; align-items: center; gap: 12px; }
        .header-logo { height: 55px; border-radius: 50%; background: white; padding: 2px; }
        
        .notif-bell-container { position: relative; cursor: pointer; background: rgba(255,255,255,0.15); padding: 10px; border-radius: 12px; transition: 0.3s; }
        .notif-bell-container:hover { background: rgba(255,255,255,0.25); transform: scale(1.1); }
        #notifBadge { position: absolute; top: -5px; right: -5px; background: #ff3b30; color: white; border-radius: 50%; padding: 3px 7px; font-size: 10px; font-weight: 800; border: 2px solid var(--forest); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }

        /* CARDS & BUTTONS */
        .container { max-width: 900px; margin: 30px auto; padding: 0 15px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 30px; border-left: 8px solid var(--forest); }
        .card.gold-border { border-left-color: var(--gold); }
        h3 { color: var(--forest); font-family: 'Montserrat', sans-serif; font-weight: 800; display: flex; align-items: center; gap: 12px; margin-top: 0; }
        
        .btn-action { background: var(--forest); color: white; border: none; padding: 14px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(0, 102, 51, 0.2); display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-action:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0, 102, 51, 0.4); }
        .btn-warning { background: var(--gold); color: #333; }

        /* NOTIFICATION BOX */
        #notifDropdown { display: none; position: absolute; top: 65px; right: 0; width: 320px; background: white; border-radius: 18px; box-shadow: 0 15px 50px rgba(0,0,0,0.25); z-index: 5000; overflow: hidden; border: 1px solid #eee; }
        .notif-header { padding: 15px; background: #f9f9f9; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; font-weight: 800; color: var(--forest); }
        .notif-item { padding: 15px; border-bottom: 1px solid #f5f5f5; display: flex; flex-direction: column; gap: 8px; }
        .notif-item:hover { background: #fffcf0; }
    </style>
</head>
<body>

<div id="loginScreen" class="overlay-screen">
    <div class="auth-box">
        <img src="logo.png" class="auth-logo" onerror="this.style.display='none'">
        <h2 class="auth-title" style="color: var(--forest); font-weight: 800;">ADMIN ACCESS</h2>
        <input type="password" id="adminPass" class="auth-input" placeholder="Enter Secure Password" style="width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #eee; margin: 20px 0; text-align: center;">
        <button onclick="login()" class="btn-action" style="width: 100%;">Unlock Portal <i class="fas fa-unlock"></i></button>
    </div>
</div>

<div id="mainApp" style="display:none;">
    <header>
        <div class="header-content">
            <div class="school-brand">
                <img src="logo.png" class="header-logo" onerror="this.style.display='none'">
                <div style="line-height: 1.2;">
                    <b style="font-size: 1.4rem; letter-spacing: 1px;">PARAMOUNT</b><br>
                    <small style="color: var(--gold); font-weight: 700; font-size: 0.7rem;">ADMIN DASHBOARD</small>
                </div>
            </div>

            <div class="notif-bell-container" onclick="toggleNotif()">
                <i class="fas fa-bell" style="font-size: 24px;"></i>
                <span id="notifBadge" style="display:none;">0</span>
                <div id="notifDropdown">
                    <div class="notif-header">Quiz Requests <i class="fas fa-paper-plane"></i></div>
                    <div id="notifList"><p style="padding:20px; color:#999; font-size:13px;">No new notifications</p></div>
                </div>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="card gold-border">
            <h3><i class="fas fa-bullhorn" style="color: var(--danger);"></i> Broadcast Center</h3>
            <textarea id="annMsg" style="width:100%; height:80px; border:2px solid #eee; border-radius:15px; padding:15px; margin-bottom:15px;" placeholder="What's happening at school today?"></textarea>
            <div style="display:flex; gap:10px;">
                <button onclick="postAnn()" class="btn-action" style="flex:1;">Publish <i class="fas fa-check"></i></button>
                <button onclick="clearAnn()" class="btn-action btn-warning" style="flex:0.5;">Clear <i class="fas fa-eraser"></i></button>
            </div>
        </div>

        <div class="card">
            <h3><i class="fas fa-chart-line" style="color: var(--accent);"></i> Attendance Insights</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
                <select id="clsPick" style="padding:12px; border-radius:12px; border:2px solid #eee;">
                    <option value="">-- Select Class --</option>
                    <option value="Pre-KG">Pre-KG</option><option value="KG-1">KG-1</option><option value="KG-2">KG-2</option>
                    <option value="Grade-1">Grade-1</option><option value="Grade-2">Grade-2</option><option value="Grade-3">Grade-3</option>
                    <option value="Grade-4">Grade-4</option><option value="Grade-5">Grade-5</option><option value="Grade-6">Grade-6</option>
                    <option value="Grade-7">Grade-7</option><option value="Grade-8">Grade-8</option>
                </select>
                <input type="month" id="monthInput" style="padding:12px; border-radius:12px; border:2px solid #eee;">
            </div>
            <button onclick="viewAtt()" class="btn-action" style="width:100%; background: var(--accent);">View Analytics <i class="fas fa-eye"></i></button>
            <div id="attBody" style="margin-top:20px;"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDRYk9KOK-ga0c88dnYMsAoifW2NJTd_Y8", databaseURL: "https://paramount-school-d55bc-default-rtdb.firebaseio.com", projectId: "paramount-school-d55bc" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function login() {
        db.ref('admin/password').once('value', (snap) => {
            if(document.getElementById('adminPass').value === (snap.val() || "Ahmad@07")) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
            } else { Swal.fire('Denied', 'Incorrect Admin Password', 'error'); }
        });
    }

    function toggleNotif() {
        const d = document.getElementById('notifDropdown');
        d.style.display = (d.style.display === 'none' || d.style.display === '') ? 'block' : 'none';
    }

    // REAL-TIME QUIZ REQUESTS
    db.ref('quiz_requests').on('value', (snap) => {
        const reqs = snap.val();
        const list = document.getElementById('notifList');
        const badge = document.getElementById('notifBadge');
        let count = 0; list.innerHTML = "";

        if(!reqs) { badge.style.display = 'none'; list.innerHTML = '<p style="padding:20px; text-align:center; color:#999;">All caught up!</p>'; return; }

        Object.keys(reqs).forEach(id => {
            const r = reqs[id];
            if(r.status === 'pending') {
                count++;
                list.innerHTML += `
                    <div class="notif-item">
                        <b style="color:var(--forest); font-size:14px;">${r.teacher}</b>
                        <small style="color:#666;">Requested quiz access for <b>${r.class}</b> - ${r.subject}</small>
                        <div style="display:flex; gap:10px; margin-top:5px;">
                            <button onclick="approveReq('${id}')" style="flex:1; background:var(--forest); color:white; border:none; padding:8px; border-radius:8px; font-size:11px; cursor:pointer;">Accept</button>
                            <button onclick="rejectReq('${id}')" style="flex:0.5; background:#f5f5f5; color:#333; border:none; padding:8px; border-radius:8px; font-size:11px; cursor:pointer;">Ignore</button>
                        </div>
                    </div>`;
            }
        });

        if(count > 0) { badge.innerText = count; badge.style.display = 'block'; }
        else { badge.style.display = 'none'; list.innerHTML = '<p style="padding:20px; text-align:center; color:#999;">No pending requests</p>'; }
    });

    function approveReq(id) { db.ref(`quiz_requests/${id}`).update({ status: 'approved' }); }
    function rejectReq(id) { db.ref(`quiz_requests/${id}`).remove(); }
    function postAnn() { db.ref('announcement').set(document.getElementById('annMsg').value).then(() => Swal.fire('Done', 'Announcement is live', 'success')); }
    function clearAnn() { db.ref('announcement').remove().then(() => { document.getElementById('annMsg').value = ""; Swal.fire('Cleared', '', 'info'); }); }
</script>
</body>
</html>
