<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paramount School | Teachers Portal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root { --forest: #006633; --gold: #ffd700; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 0; }
        
        header { 
            background: var(--forest); 
            color: white; 
            padding: 30px 5%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 20px;
        }
        .logo-img { height: 85px; width: auto; display: block; }
        .school-info { text-align: left; }
        .school-name { font-size: 2.2rem; font-weight: 900; margin: 0; white-space: nowrap; }
        .school-tagline { font-size: 1.1rem; opacity: 0.9; margin-top: 5px; font-weight: 500; }

        .container { max-width: 500px; margin: 15px auto; padding: 10px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { color: var(--forest); text-align: center; border-bottom: 2px solid var(--gold); padding-bottom: 10px; margin-top: 0; }
        
        label { display: block; font-size: 13px; font-weight: bold; color: #666; margin-top: 15px; }
        select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; margin-top: 5px; }
        
        .student-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 5px; border-bottom: 1px solid #f0f0f0; }
        .name-text { font-weight: 600; font-size: 16px; }
        .present-toggle { width: 28px; height: 28px; accent-color: var(--forest); cursor: pointer; }

        .submit-btn { 
            background: #1D6F42; color: white; border: none; padding: 18px; 
            border-radius: 35px; width: 100%; font-weight: bold; font-size: 16px; 
            cursor: pointer; margin-top: 25px; display: none; align-items: center; 
            justify-content: center; gap: 10px;
        }

        /* THANK YOU MESSAGE STYLING */
        #thankYouMessage {
            display: none;
            text-align: center;
            padding: 20px;
            background: #e8f5e9;
            color: #2e7d32;
            border-radius: 10px;
            margin-top: 20px;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            header { flex-direction: column; text-align: center; gap: 10px; padding: 20px; }
            .school-name { font-size: 1.5rem; white-space: normal; }
            .school-info { text-align: center; }
            .logo-img { height: 70px; }
        }

        #exportTableWrapper { display: none; }
    </style>
</head>
<body>

<header>
    <img src="logo.png" alt="Logo" class="logo-img" id="webLogo" onerror="this.style.display='none'">
    <div class="school-info">
        <h1 class="school-name">PARAMOUNT ENGLISH MEDIUM SCHOOL</h1>
        <p class="school-tagline">Teachers Official Attendance Portal</p>
    </div>
</header>

<div class="container">
    <div class="card" id="mainCard">
        <h2>Mark Attendance</h2>
        
        <label>Teacher Name</label>
        <select id="teacherName">
            <option value="">-- Select Teacher --</option>
            <option value="Mr. Shaik Ahmad">Mr. Shaik Ahmad</option>
            <option value="Ms. Geethika">Ms. Geethika</option>
        </select>

        <label>Class</label>
        <select id="classSelect" onchange="generateList()">
            <option value="">-- Choose Class --</option>
            <option value="10th-A">10th Grade - A</option>
            <option value="9th-B">9th Grade - B</option>
        </select>

        <div id="listContainer"></div>

        <button id="submitBtn" class="submit-btn" onclick="submitAttendance()">
            <i class="fas fa-file-excel"></i> Submit Attendance
        </button>

        <div id="thankYouMessage">
            <i class="fas fa-check-circle" style="font-size: 24px; margin-bottom: 10px;"></i><br>
            Thank you for submitting!<br>
            <span style="font-size: 12px; font-weight: normal;">Your Excel report is downloading...</span>
        </div>
    </div>
</div>

<div id="exportTableWrapper">
    <table id="attendanceExcelTable" border="1" style="border-collapse: collapse;">
        <thead>
            <tr>
                <th colspan="4" style="background-color: #006633; color: #ffffff; font-size: 18pt; height: 45pt; text-align: center;">PARAMOUNT ENGLISH MEDIUM SCHOOL</th>
            </tr>
            <tr>
                <th colspan="4" style="background-color: #ffd700; color: #000000; font-size: 12pt; height: 25pt; text-align: center;">TEACHERS OFFICIAL ATTENDANCE PORTAL</th>
            </tr>
            <tr>
                <th colspan="2" id="xl-date" style="text-align: left; padding: 5px;">Date: </th>
                <th colspan="2" id="xl-teacher" style="text-align: left; padding: 5px;">Teacher: </th>
            </tr>
            <tr>
                <th colspan="2" id="xl-class" style="text-align: left; padding: 5px;">Class: </th>
                <th colspan="2" style="text-align: left; padding: 5px;">Status: FINALIZED</th>
            </tr>
            <tr style="background-color: #eeeeee; font-weight: bold;">
                <th style="width: 50px;">S.No</th>
                <th style="width: 250px;">STUDENT NAME</th>
                <th style="width: 100px;">STATUS</th>
                <th style="width: 150px;">REMARKS</th>
            </tr>
        </thead>
        <tbody id="xl-body"></tbody>
    </table>
</div>

<script>
const schoolData = {
    "10th-A": ["Shaik Tauseef Ali", "Rahul Sharma", "Zoya Khan", "Abhishek Das"],
    "9th-B": ["Shaik Minhaj Ali", "Sana Khan", "Aryan Raj"]
};

function generateList() {
    const cls = document.getElementById('classSelect').value;
    const listDiv = document.getElementById('listContainer');
    const submitBtn = document.getElementById('submitBtn');
    const thanks = document.getElementById('thankYouMessage');
    
    listDiv.innerHTML = "";
    thanks.style.display = "none"; // Hide message if changing class
    
    if (schoolData[cls]) {
        schoolData[cls].forEach(name => {
            listDiv.innerHTML += `
                <div class="student-row">
                    <span class="name-text">${name}</span>
                    <input type="checkbox" class="present-toggle" checked>
                </div>`;
        });
        submitBtn.style.display = "flex";
    } else { submitBtn.style.display = "none"; }
}

function submitAttendance() {
    const teacher = document.getElementById('teacherName').value;
    const cls = document.getElementById('classSelect').value;
    const today = new Date();
    const dateStr = today.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });

    if(!teacher || !cls) return alert("Select Teacher and Class First!");

    // Display Thank You Message
    document.getElementById('submitBtn').style.display = "none";
    document.getElementById('thankYouMessage').style.display = "block";

    // Prepare Hidden Table for Export
    document.getElementById('xl-date').innerText = "Date: " + dateStr;
    document.getElementById('xl-teacher').innerText = "Teacher: " + teacher;
    document.getElementById('xl-class').innerText = "Class: " + cls;

    const xlBody = document.getElementById('xl-body');
    xlBody.innerHTML = "";

    document.querySelectorAll('.student-row').forEach((row, index) => {
        const name = row.querySelector('.name-text').innerText;
        const isPresent = row.querySelector('.present-toggle').checked;
        const status = isPresent ? "PRESENT" : "ABSENT";
        const color = isPresent ? "#c8e6c9" : "#ffcdd2";

        xlBody.innerHTML += `
            <tr>
                <td style="text-align: center;">${index + 1}</td>
                <td>${name}</td>
                <td style="text-align: center; background-color: ${color}; font-weight: bold;">${status}</td>
                <td></td>
            </tr>`;
    });

    // Mobile Optimized Download Method
    const table = document.getElementById("attendanceExcelTable");
    const html = table.outerHTML;
    const template = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="UTF-8"></head><body>${html}</body></html>`;

    const blob = new Blob([template], { type: 'application/vnd.ms-excel' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.href = url;
    link.download = `Attendance_${cls}_${dateStr.replace(/ /g, '-')}.xls`;
    
    // Slight delay to ensure UI update before download starts
    setTimeout(() => {
        link.click();
    }, 800);
}
</script>
</body>
</html>
