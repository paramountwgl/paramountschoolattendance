<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Paramount School | Teacher Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Segoe+UI:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root { --forest: #006633; --gold: #ffd700; --danger: #e53935; --light: #f4f7f6; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding-bottom: 50px; overflow-x: hidden; }
        
        /* SIDE-BY-SIDE ATTRACTION HEADER */
        header { background: var(--forest); color: white; padding: 20px 3%; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header-content { display: flex; align-items: center; justify-content: center; gap: 12px; max-width: 1400px; margin: 0 auto; width: 100%; }
        .header-logo { height: clamp(55px, 8vw, 75px); width: auto; flex-shrink: 0; }
        .school-text { display: flex; flex-direction: column; line-height: 1.1; white-space: nowrap; text-align: left; }
        .school-name-main { font-family: 'Montserrat', sans-serif; font-size: clamp(1.2rem, 3.5vw, 2.2rem); font-weight: 800; letter-spacing: 0.5px; }
        .school-name-sub { font-family: 'Montserrat', sans-serif; font-size: clamp(0.6rem, 2vw, 0.9rem); color: var(--gold); font-weight: 700; text-transform: uppercase; }
        .portal-subtitle { color: white; font-size: clamp(0.7rem, 2.5vw, 1rem); font-weight: 600; opacity: 0.9; margin-top: 4px; display: block; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 4px; }

        /* PULSING ANNOUNCEMENT BAR */
        #announcementBar { 
            background: var(--danger); color: white; padding: 15px; text-align: center; font-weight: bold; 
            display: none; align-items: center; justify-content: center; gap: 12px; margin: 15px auto;
            width: 90%; max-width: 800px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            animation: pulse-brightness 2s infinite ease-in-out;
        }
        @keyframes pulse-brightness { 0%, 100% { filter: brightness(0.9); } 50% { filter: brightness(1.2); } }

        .container { max-width: 850px; margin: 0 auto; padding: 0 15px; }
        
        /* ADMIN LINK FIX */
        .admin-link-wrapper { width: 100%; display: flex; justify-content: center; margin: 20px 0; }
        .admin-btn { background: #e8f5e9; color: var(--forest); border: 2px solid var(--forest); padding: 12px 25px; text-decoration: none; border-radius: 50px; font-weight: bold; font-size: 14px; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .admin-btn:hover { background: var(--forest); color: white; transform: translateY(-2px); }

        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-bottom: 25px; border-top: 6px solid var(--forest); }
        h3 { color: var(--forest); margin: 0 0 20px; font-size: 1.4rem; display: flex; align-items: center; gap: 10px; border-bottom: 2px solid #eee; padding-bottom: 10px; justify-content: center; text-transform: uppercase; }
        label { display: block; font-size: 11px; font-weight: bold; color: #666; margin: 15px 0 5px; text-transform: uppercase; }
        select, input, textarea { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid #ddd; font-size: 15px; outline: none; box-sizing: border-box; font-family: inherit; }
        .btn { background: linear-gradient(135deg, var(--forest), #004d26); color: white; border: none; padding: 15px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 20px; font-size: 16px; transition: 0.3s; }

        .student-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-bottom: 1px solid #eee; }
        .student-item input[type="checkbox"] { width: 22px; height: 22px; cursor: pointer; accent-color: var(--forest); }

        @media (max-width: 600px) {
            .header-content { gap: 10px; }
            .card { padding: 15px; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

<header>
    <div class="header-content">
        <img src="logo.png" alt="Logo" class="header-logo" onerror="this.style.display='none'">
        <div class="school-text">
            <span class="school-name-main">PARAMOUNT</span>
            <span class="school-name-sub">ENGLISH MEDIUM SCHOOL</span>

        </div>
    </div>
</header>

<div id="announcementBar">

</div>

<div class="container">
    <div class="admin-link-wrapper">
        <a href="admin.html" class="admin-btn"><i class="fas fa-user-shield"></i> Go to Admin Dashboard</a>
    </div>

    <div class="card">
        <h3>Mark Attendance</h3>
        <label>Select Teacher</label>
        <select id="teacherSelect" onchange="verifyTeacher()">
            <option value="">-- Select Teacher --</option>
            <option value="Mr. Shaik Ahmad">Mr. Shaik Ahmad</option>
            <option value="Ms. Roqiya Begum">Ms. Roqiya Begum</option>
            <option value="Ms. G.Rajitha">Ms. G.Rajitha</option>
            <option value="Ms. Ameena Tabassum">Ms. Ameena Tabassum</option>
            <option value="Ms. Shaik Shabana">Ms. Shaik Shabana</option>
            <option value="Ms. B.Ravali">Ms. B.Ravali</option>
            <option value="Ms. L.Kalyani">Ms. L.Kalyani</option>
            <option value="Ms. J.Alaya Sree">Ms. J.Alaya Sree</option>
            <option value="Ms. S.Sujatha">Ms. S.Sujatha</option>
            <option value="Ms. J.Prathibha">Ms. J.Prathibha</option>
            <option value="Ms. P.Shailaja">Ms. P.Shailaja</option>
            <option value="Ms. A.Jhansi Rani">Ms. A.Jhansi Rani</option>
            <option value="Ms. S. Neelima">Ms. S. Neelima</option>
        </select>

        <div id="classGroup" style="display:none; margin-top:15px;">
            <label>Select Class</label>
            <select id="attClass" onchange="loadStudents()">
                <option value="">-- Choose Class --</option>
                <option value="Pre-KG">Pre-KG</option><option value="KG-1">KG-1</option><option value="KG-2">KG-2</option>
                <option value="Grade-1">Grade-1</option><option value="Grade-2">Grade-2</option><option value="Grade-3">Grade-3</option>
                <option value="Grade-4">Grade-4</option><option value="Grade-5">Grade-5</option><option value="Grade-6">Grade-6</option>
                <option value="Grade-7">Grade-7</option><option value="Grade-8">Grade-8</option>
            </select>
        </div>
        <div id="studentList" style="margin-top:20px;"></div>
        <button id="submitAtt" class="btn" style="display:none;" onclick="saveAndDownload()">Submit & Download Attendance</button>
    </div>

    <div class="card" style="border-top-color: var(--gold);">
        <h3>Daily Homework</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div><label>Class</label><select id="hwClass" onchange="updateHWSubjects()">
                <option value="Pre-KG">Pre-KG</option><option value="KG-1">KG-1</option><option value="KG-2">KG-2</option>
                <option value="Grade-1">Grade-1</option><option value="Grade-2">Grade-2</option><option value="Grade-3">Grade-3</option>
                <option value="Grade-4">Grade-4</option><option value="Grade-5">Grade-5</option><option value="Grade-6">Grade-6</option>
                <option value="Grade-7">Grade-7</option><option value="Grade-8">Grade-8</option>
            </select></div>
            <div><label>Date</label><input type="date" id="hwDate"></div>
        </div>
        <label>Subject</label><select id="hwSubSelect"></select>
        <label>Task Details</label><textarea id="hwTask" rows="4" placeholder="Enter instructions..."></textarea>
        <button class="btn" onclick="postHomework()">Post to Student Portal</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDRYk9KOK-ga0c88dnYMsAoifW2NJTd_Y8", databaseURL: "https://paramount-school-d55bc-default-rtdb.firebaseio.com", projectId: "paramount-school-d55bc" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const teacherRegistry = {
        "Mr. Shaik Ahmad": "Ahmad@07", "Ms. Roqiya Begum": "Roqiya@01", "Ms. G.Rajitha": "Rajitha@02",
        "Ms. Ameena Tabassum": "Ameena@03", "Ms. Shaik Shabana": "Shabana@04", "Ms. B.Ravali": "Ravali@05",
        "Ms. L.Kalyani": "Kalyani@06", "Ms. J.Alaya Sree": "Alaya@07", "Ms. S.Sujatha": "Sujatha@08",
        "Ms. J.Prathibha": "Prathibha@09", "Ms. P.Shailaja": "Shailaja@10", "Ms. A.Jhansi Rani": "Jhansi@11", "Ms. S. Neelima": "Neelima@12"
    };

    const studentData = { /* Standard Data from */ };

    /* PERSONALIZED VERIFICATION */
    async function verifyTeacher() {
        const name = document.getElementById('teacherSelect').value; if(!name) return;
        
        const { value: pw } = await Swal.fire({ 
            title: `Welcome, ${name}!`, 
            text: 'Please enter your password to proceed.',
            input: 'password', 
            inputPlaceholder: 'Enter Password',
            showCancelButton: true 
        });

        if(pw === teacherRegistry[name]) { 
            document.getElementById('classGroup').style.display = 'block'; 
            Swal.fire('Success', 'Access Granted', 'success'); 
        } else { 
            document.getElementById('teacherSelect').value = ""; 
            document.getElementById('classGroup').style.display = 'none'; 
            if(pw) Swal.fire('Error', 'Incorrect Password', 'error'); 
        }
    }

    db.ref('announcement').on('value', (snap) => {
        const msg = snap.val(); const bar = document.getElementById('announcementBar');
        if(msg) { document.getElementById('announcementText').innerText = msg; bar.style.display = 'flex'; } 
        else { bar.style.display = 'none'; }
    });

    function loadStudents() { /* Standard Logic from */ }
    function saveAndDownload() { /* Standard Logic from */ }
    function updateHWSubjects() { /* Standard Logic from */ }
    function postHomework() { /* Standard Logic from */ }
</script>
</body>
</html>
