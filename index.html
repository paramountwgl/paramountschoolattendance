<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paramount School | Attendance to Excel</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root { --forest: #006633; --gold: #ffd700; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 0; }
        header { background: var(--forest); color: white; padding: 20px; text-align: center; }
        .container { max-width: 500px; margin: 20px auto; padding: 15px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { color: var(--forest); text-align: center; border-bottom: 2px solid var(--gold); padding-bottom: 10px; }
        
        select { width: 100%; padding: 12px; margin: 10px 0 20px; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; }
        .student-row { display: flex; justify-content: space-between; padding: 12px 5px; border-bottom: 1px solid #f0f0f0; }
        .present-toggle { width: 25px; height: 25px; accent-color: var(--forest); cursor: pointer; }

        .summary-report { background: #e8f5e9; padding: 20px; border-radius: 12px; margin-top: 25px; display: none; text-align: center; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-item { background: white; padding: 10px; border-radius: 8px; font-weight: bold; }
        
        .action-btn { 
            border: none; padding: 15px; border-radius: 35px; width: 100%; 
            font-weight: bold; font-size: 16px; cursor: pointer; margin-bottom: 10px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .excel-btn { background: #1D6F42; color: white; } /* Excel Green */
        .whatsapp-btn { background: #25D366; color: white; }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0;">PARAMOUNT ENGLISH MEDIUM SCHOOL</h1>
    <p style="margin:5px 0 0; opacity:0.9;">Teachers Official Attendance Portal</p>
</header>

<div class="container">
    <div class="card">
        <h2>Mark Attendance</h2>
        
        <label>Teacher Name</label>
        <select id="teacherName">
            <option value="">-- Select Teacher --</option>
            <option value="Mr. Shaik Ahmad">Mr. Shaik Ahmad</option>
            <option value="Ms. Geethika">Ms. Geethika</option>
        </select>

        <label>Class</label>
        <select id="classSelect" onchange="generateList()">
            <option value="">-- Choose Class --</option>
            <option value="10th-A">10th Grade - A</option>
            <option value="9th-B">9th Grade - B</option>
        </select>

        <div id="listContainer"></div>

        <div id="reportSection" class="summary-report">
            <div class="stats-grid">
                <div class="stat-item">T: <span id="countTotal">0</span></div>
                <div class="stat-item">P: <span id="countPresent">0</span></div>
                <div class="stat-item">A: <span id="countAbsent">0</span></div>
            </div>

            <button class="action-btn excel-btn" onclick="exportToExcel()">
                <i class="fas fa-file-excel"></i> 1. Generate Excel Sheet
            </button>

            <button class="action-btn whatsapp-btn" onclick="openWhatsApp()">
                <i class="fab fa-whatsapp"></i> 2. Open WhatsApp to Attach
            </button>
            <p style="font-size: 11px; color: #666;">Generate the Excel first, then attach it in WhatsApp.</p>
        </div>
    </div>
</div>

<script>
const schoolData = {
    "10th-A": ["Shaik Tauseef Ali", "Rahul Sharma", "Zoya Khan", "Abhishek Das"],
    "9th-B": ["Shaik Minhaj Ali", "Sana Khan", "Aryan Raj"]
};

function generateList() {
    const cls = document.getElementById('classSelect').value;
    const listDiv = document.getElementById('listContainer');
    const reportBox = document.getElementById('reportSection');
    listDiv.innerHTML = "";
    
    if (schoolData[cls]) {
        schoolData[cls].forEach(name => {
            listDiv.innerHTML += `
                <div class="student-row">
                    <span class="name-text">${name}</span>
                    <input type="checkbox" class="present-toggle" checked onchange="updateStats()">
                </div>`;
        });
        reportBox.style.display = "block";
        updateStats();
    } else { reportBox.style.display = "none"; }
}

function updateStats() {
    const total = document.querySelectorAll('.present-toggle').length;
    const present = document.querySelectorAll('.present-toggle:checked').length;
    document.getElementById('countTotal').innerText = total;
    document.getElementById('countPresent').innerText = present;
    document.getElementById('countAbsent').innerText = total - present;
}

function exportToExcel() {
    const teacher = document.getElementById('teacherName').value;
    const cls = document.getElementById('classSelect').value;
    const date = new Date().toLocaleDateString();

    if(!teacher || !cls) return alert("Select Teacher and Class");

    // Prepare Data for Excel
    let rows = [
        ["PARAMOUNT ENGLISH MEDIUM SCHOOL"],
        ["Attendance Report"],
        ["Date:", date],
        ["Teacher:", teacher],
        ["Class:", cls],
        [],
        ["S.No", "Student Name", "Status"]
    ];

    document.querySelectorAll('.student-row').forEach((row, index) => {
        const name = row.querySelector('.name-text').innerText;
        const status = row.querySelector('.present-toggle').checked ? "Present" : "Absent";
        rows.push([index + 1, name, status]);
    });

    // Create Worksheet
    const ws = XLSX.utils.aoa_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Attendance");

    // Download File
    const filename = `Attendance_${cls}_${date.replace(/\//g, '-')}.xlsx`;
    XLSX.writeFile(wb, filename);
}

function openWhatsApp() {
    const teacher = document.getElementById('teacherName').value;
    const cls = document.getElementById('classSelect').value;
    const msg = `*PARAMOUNT ATTENDANCE*%0A*Teacher:* ${teacher}%0A*Class:* ${cls}%0A_Excel report generated. Please attach the downloaded file below._`;
    window.open(`https://wa.me/919550791538?text=${msg}`, '_blank');
}
</script>
</body>
</html>
