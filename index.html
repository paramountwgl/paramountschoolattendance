<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paramount School | Attendance Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --forest: #006633; --gold: #ffd700; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; }
        header { background: var(--forest); color: white; padding: 25px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .container { max-width: 500px; margin: 20px auto; padding: 15px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { color: var(--forest); text-align: center; border-bottom: 2px solid var(--gold); padding-bottom: 10px; margin-top: 0; }
        label { display: block; font-size: 11px; font-weight: bold; color: #888; margin: 15px 0 5px; text-transform: uppercase; }
        select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; background: #fafafa; }
        .student-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
        .present-toggle { width: 25px; height: 25px; accent-color: var(--forest); cursor: pointer; }
        .whatsapp-btn { background: #25D366; color: white; border: none; padding: 15px; border-radius: 35px; width: 100%; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0;">PARAMOUNT SCHOOL</h1>
    <p style="margin:5px 0 0; opacity:0.9;">Official Teacher Attendance Portal</p>
</header>

<div class="container">
    <div class="card">
        <h2>Daily Attendance</h2>
        
        <label>Teacher Name</label>
        <select id="teacher">
            <option value="">-- Select Teacher --</option>
            <option value="Mr. Shaik Ahmad">Mr. Shaik Ahmad</option>
            <option value="Ms. Geethika">Ms. Geethika</option>
        </select>

        <label>Class</label>
        <select id="class" onchange="loadStudents()">
            <option value="">-- Select Class --</option>
            <option value="10th-A">10th Grade - A</option>
            <option value="9th-B">9th Grade - B</option>
        </select>

        <div id="list" style="margin-top:20px;"></div>

        <button class="whatsapp-btn" onclick="sendReport()">
            <i class="fab fa-whatsapp"></i> Send Report to Correspondent
        </button>
    </div>
</div>

<script>
const students = {
    "10th-A": ["Shaik Tauseef Ali", "Rahul Sharma", "Zoya Khan"],
    "9th-B": ["Shaik Minhaj Ali", "Sana Khan", "Aryan Raj"]
};

function loadStudents() {
    const cls = document.getElementById('class').value;
    const listDiv = document.getElementById('list');
    listDiv.innerHTML = "";
    if(students[cls]) {
        students[cls].forEach(name => {
            listDiv.innerHTML += `<div class="student-row"><span>${name}</span><input type="checkbox" checked class="present-toggle"></div>`;
        });
    }
}

function sendReport() {
    const t = document.getElementById('teacher').value;
    const c = document.getElementById('class').value;
    if(!t || !c) return alert("Select Teacher and Class");

    let absents = [];
    document.querySelectorAll('.student-row').forEach(row => {
        if(!row.querySelector('input').checked) absents.push(row.querySelector('span').innerText);
    });

    const msg = `*PARAMOUNT ATTENDANCE REPORT*%0A*Teacher:* ${t}%0A*Class:* ${c}%0A*Absentees:* ${absents.length > 0 ? absents.join(", ") : "None"}`;
    window.open(`https://wa.me/919550791538?text=${msg}`);
}
</script>
</body>
</html>
