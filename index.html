<!DOCTYPE html>

        :root { --forest: #006633; --gold: #ffd700; --danger: #c62828; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding-bottom: 50px; }
        header { background: var(--forest); color: white; padding: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .container { max-width: 850px; margin: 20px auto; padding: 0 15px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; }
        h3 { color: var(--forest); margin-top: 0; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; }
        label { display: block; font-size: 12px; font-weight: bold; color: #666; margin: 10px 0 5px; text-transform: uppercase; }
        select, input, textarea { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid #ddd; font-size: 15px; outline: none; box-sizing: border-box; }
        .btn { background: var(--forest); color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .student-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
        .student-item input[type="checkbox"] { width: 22px; height: 22px; cursor: pointer; accent-color: var(--forest); }
        #classSelectionGroup, #attendanceListArea, #submitAttBtn { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; }
    </style>

                    <option value="Ms. S. Neelima">Ms. S. Neelima</option>

            </div>
            <div id="classSelectionGroup">
                <label>Select Class</label>
                <select id="attClass" onchange="loadStudents()">
                    <option value="">-- Choose Class --</option>
                    <option value="Pre-KG">Pre-KG (Diamond)</option>
                    <option value="KG-1">KG-1 (Ruby)</option>
                    <option value="KG-2">KG-2 (Amber)</option>
                    <option value="Grade-1">Grade-1 (Opal)</option>
                    <option value="Grade-2">Grade-2 (Emerald)</option>
                    <option value="Grade-3">Grade-3 (Crystal)</option>
                    <option value="Grade-4">Grade-4 (Citrine)</option>
                    <option value="Grade-5">Grade-5 (Moonstone)</option>
                    <option value="Grade-6">Grade-6 (Alluri)</option>
                    <option value="Grade-7">Grade-7 (Kalam)</option>
                    <option value="Grade-8">Grade-8 (Bhagat)</option>
                </select>
            </div>
        </div>
        
        <div id="attendanceListArea"></div>
        <button id="submitAttBtn" class="btn" style="width:100%; margin-top:20px;" onclick="saveAttendance()">Submit Attendance</button>
    </div>

    <div class="card" style="border-top: 6px solid var(--gold);">
        <h3><i class="fas fa-edit"></i> Step 2: Post Homework</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div>
                <label>Target Class</label>
                <select id="hwClass" onchange="updateHWSubjects()">
                    <option value="Pre-KG">Pre-KG</option>
                    <option value="KG-1">KG-1</option>
                    <option value="KG-2">KG-2</option>
                    <option value="Grade-1">Grade-1</option>
                    <option value="Grade-2">Grade-2</option>
                    <option value="Grade-3">Grade-3</option>
                    <option value="Grade-4">Grade-4</option>
                    <option value="Grade-5">Grade-5</option>
                    <option value="Grade-6">Grade-6</option>
                    <option value="Grade-7">Grade-7</option>
                    <option value="Grade-8">Grade-8</option>
                </select>
            </div>
            <div><label>Date</label><input type="date" id="hwDate"></div>
        </div>
        <label>Subject</label>
        <select id="hwSubjectSelect"></select>
        <label>Task Details</label>
        <textarea id="hwTaskInput" placeholder="Enter instructions..."></textarea>
        <button class="btn" style="margin-top:15px; width:100%;" onclick="publishDiary()">Publish to Diary</button>
    </div>
</div>

    async function verifyTeacher() {
        const name = document.getElementById('teacherSelect').value;
        if(!name) return;
        const correctPassword = teacherRegistry[name];
        const { value: password } = await Swal.fire({
            title: 'Verify Identity',
            input: 'password',
            inputLabel: `Enter password for ${name}`,
            showCancelButton: true
        });
        if (password === correctPassword) {
            document.getElementById('classSelectionGroup').style.display = "block";
            Swal.fire('Verified', `Welcome, ${name}`, 'success');
        } else {
            document.getElementById('teacherSelect').value = "";
            document.getElementById('classSelectionGroup').style.display = "none";
            if(password) Swal.fire('Error', 'Incorrect Password', 'error');
        }
    }

    function loadStudents() {
        const cls = document.getElementById('attClass').value;
        const area = document.getElementById('attendanceListArea');
        const students = studentData[cls] || [];
        if(!cls) return area.innerHTML = "";
        area.innerHTML = students.map(name => `
            <div class="student-item">
                <span style="font-weight:bold;">${name}</span>
                <input type="checkbox" class="att-check" data-name="${name}" checked>
            </div>`).join('');
        area.style.display = "block";
        document.getElementById('submitAttBtn').style.display = "block";
    }

    function saveAttendance() {
        Swal.fire('Success', 'Attendance marked successfully.', 'success');
    }

    function updateHWSubjects() {
        const cls = document.getElementById('hwClass').value;
        const subSelect = document.getElementById('hwSubjectSelect');
        const common = ["TELUGU", "HINDI", "ENGLISH", "MATHS", "SOCIAL STUDIES"];
        const subjects = (["Grade-6", "Grade-7", "Grade-8"].includes(cls)) ? [...common, "PHYSICS", "CHEMISTRY", "BIOLOGY"] : [...common, "SCIENCE"];
        subSelect.innerHTML = subjects.map(s => `<option value="${s}">${s}</option>`).join('');
    }

    function publishDiary() {
        const date = document.getElementById('hwDate').value;
        const sub = document.getElementById('hwSubjectSelect').value;
        const task = document.getElementById('hwTaskInput').value;
        if(!date || !task) return;
        const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        db.ref(`homework/${date}`).update({ [sub]: task, lastUpdated: now }).then(() => {
            Swal.fire('Published!', `${sub} task is now live.`, 'success');
            document.getElementById('hwTaskInput').value = "";
        });
    }

    updateHWSubjects();
</script>

</html>
