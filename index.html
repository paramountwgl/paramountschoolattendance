        header { background: var(--forest); color: white; padding: 30px 5%; display: flex; justify-content: center; align-items: center; gap: 20px; }
        .logo-img { height: 85px; width: auto; display: block; }

        .school-tagline { font-size: 1.1rem; opacity: 0.9; margin-top: 5px; font-weight: 500; }

        label { display: block; font-size: 13px; font-weight: bold; color: #666; margin-top: 15px; }
        select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; margin-top: 5px; }
        .student-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 5px; border-bottom: 1px solid #f0f0f0; }
        .name-text { font-weight: 600; font-size: 16px; }

        .percent-good { background: #e8f5e9; color: #2e7d32; }

        .submit-btn, .reset-btn, .admin-btn { border: none; padding: 18px; border-radius: 35px; width: 100%; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 25px; display: flex; align-items: center; justify-content: center; gap: 10px; }

        .reset-btn { background: var(--forest); color: white; margin-top: 15px; }

        #thankYouSection { display: none; text-align: center; padding: 30px 20px; background: #e8f5e9; color: #2e7d32; border-radius: 15px; margin-top: 20px; }
        @media (max-width: 768px) { header { flex-direction: column; text-align: center; gap: 10px; padding: 20px; } .school-name { font-size: 1.5rem; white-space: normal; } .school-info { text-align: center; } .logo-img { height: 70px; } }
        #exportTableWrapper { display: none; }
    </style>

<body>

        </thead>
        <tbody id="xl-body"></tbody>
    </table>
</div>

<script>
// --- FIREBASE INITIALIZATION ---
const firebaseConfig = {
  apiKey: "AIzaSyDRYk9KOK-ga0c88dnYMsAoifW2NJTd_Y8",
  authDomain: "paramount-school-d55bc.firebaseapp.com",
  databaseURL: "https://paramount-school-d55bc-default-rtdb.firebaseio.com",
  projectId: "paramount-school-d55bc",
  storageBucket: "paramount-school-d55bc.firebasestorage.app",
  messagingSenderId: "130979432562",
  appId: "1:130979432562:web:4cd94787b23f9daba51aeb"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Listen for Live Announcements
db.ref('announcement').on('value', (snap) => {
    const msg = snap.val();
    const banner = document.getElementById('liveAnnouncementBanner');
    if (msg) { document.getElementById('announcementMessageText').innerText = msg; banner.style.display = 'block'; } 
    else { banner.style.display = 'none'; }

const schoolData = {
    "Pre-KG": ["Hanish Macharla", "Arjun Vihaar Illandula", "Thanu sree Allakunta", "Aadhya Gangaraboina", "Aadhya Sri Oggula", "Aadhyasri Shivagoni", "Afraha Begum", "Aliya Sultana", "Anvika Bandi", "Aradana Devara konda", "Devansh Bandi", "Hanvitha Mulkalapelli", "Harsha Vardhan Seenapelli", "Hiranya Bandi", "Jashritha Boina", "Konreddy Shreyanvi", "Kriyansh Sammeta", "Mohammed Mohiuddin Sayyad", "Nethra Narkurthi", "Reeyansh Bandi", "Rishi Manupati", "Rudransh Bandi", "Sanvika Bandi", "Shanvith Khatha", "Shishira Jalagam", "Shiva Sai Mekala", "Shree Rudhraveer Chevvu", "Shreyansh Gangaraboina", "Sreeja Thalla", "Srikrithini Myakala", "Srivatsav Vanam", "Sriyansh Mekala", "Thanvika Lakka", "Thrilokansh Vudari", "Ujjwal Chekka", "Vaishnavi Lakka", "Vedansh Myakala", "Vishnu Priya Molugu", "Vyshnav Tej Boina", "Yafiah Mohammad"],
    "KG-1": ["Aadhya Sri Amaravadi", "Aditya Manda", "Aadhya Jella", "Advaita Gauri Bandi", "Aizah Amna Shaik", "Akshara Singaram", "Bhahuveer Raj Somishetti", "Gayathri Erroju", "Hanvika Mulkalapelli", "Manvith Kondoju", "Sayyad Vajeed", "Mekala Manu sri", "Oliva Grace Vallapu", "Rithwik Oggula", "Rithwika Kandagatla", "Srimahi Chevvu", "Thanvesh Thalla", "Trishul Nanduri", "Yoganshika Nanduri", "Yusra Mohammad", "Zainul Abideen Syed"],
    "KG-2": ["Deekshanth Sammeta", "Hanshith Erroju", "Harika Bandi", "Himarsha Naini", "Karthik Vallepu", "Kruthika Bandi", "Rajavardhan Gampala", "Roshan Kaitha", "Sri Anshu Ayaan Lyadala", "Srihansh Bandi", "Srikshitha Guduri", "Varshith Gonela", "Adyasri Makala", "Anvik Boini", "Anvith Pokanati", "Awais Ur Rehman Mohammad", "Dakshu Pothuganti", "Hansith Reddy Katukuri", "Harshith Pokanati", "Jella Aditya", "Krishank Nallabothula", "Kundana Katkuri", "Munukuntla Revanth Rudhra", "Niraja Nethri Siluveru", "Pranav Mattepelli", "Sreenith Yadav Naini", "Uvan Reddy Dasari", "Zayan Mohammad", "Zoya Mohammed"],
    "Grade-1": ["Dheeraj Gattu", "Preetham Sannayala", "Shiva nandu Gonela", "Shrayan Nuthanakanti", "Sriyanksha Mandala", "Advitha Garige", "Harika Bandi", "Himansi Kondoju", "Izhaan Rahamath Syed", "Jaisurya Myakala", "Khadeeja Fathima", "Manaswini Dandugula", "Manusri Bandi", "Rithwik krishna Amaravadi", "Rohan Bandi", "Shiva Junnu", "Shivanandh Bandi", "Sridha Thalla", "Srinika Chengelly", "Sriyanshi Oggula", "Vishwak Chekka"],
    "Grade-2": ["Aliza Manha Shaik", "Dhruvan Reddy Katukuri", "Druthika Enugala", "Manaswini Bandi", "Rakshith Macharla", "Sathwika Katkuri", "Shalini Uppala", "Chandu Devarakonda", "Gnaneshwar Pokanati", "Hasnain Syed", "Koushik Siluveru", "Senen Desabattula", "Shivarajan Pothuganti"],
    // REMOVED THE PERIOD FROM MD ABDUL QUDDUS
    "Grade-3": ["Nagavelly Manikanta", "Mirja Ismail", "Bandi Aryan", "Dandugula Mahesh Babu", "Bandi Tejasri", "Bandi Harshavardhan", "Gampala Vyshnavi", "Gampala Laxmi", "Garige Harshith", "Katkuri Hanish", "Katukuri Manideep", "MD Abdul Quddus", "Muppa Sathwik Patel", "Nuthanakanti Sansita", "Pasarakonda Ritwin", "Pinninti Rakshith Rao", "Rayi Sriman Adithya"],
    "Grade-4": ["Abdul Saqib Mohammad", "Anudeep Chintha", "Bhavan Bandi", "Harshavardhan Gonela", "Jayadev Chiluveru", "Mahaboob Syed", "Nandith Reddy Enugala", "Sai Charan Goud Mandala", "Sai Prasanna Keerthi", "Ajmeri Shaik", "Akshith Chiluveru", "Jayasri Mykala", "Rahul Kanjarla", "Saketh Devarakonda"],
    // REMOVED THE PERIOD FROM ABDUS SALAAM MD
    "Grade-5": ["Adya Reddy Vangala", "Kowshik Patel Muppa", "Siri Singaram", "Srikar Mandala", "Abdus Salaam MD", "Akshith Ram Kalvacharla", "Jaffar Anas Shaik", "Khaja Azeemuddin Mohammed", "Nihan Mohammed", "Saif Shaik", "Saketh Renukuntla", "Sreeja Dasari", "Vidhaatri Sahani"],
    "Grade-6": ["Abdul Razzak Mohammad", "Anudeepthi Chintha", "Saketh Ranaveni", "Shiva Sri Katukuri", "Aklees Shaik", "Akshya Kalvacharla", "Prince Katkuri"],
    "Grade-7": ["Manikanta Sannayala", "Sreeyan Reddy Karra", "Jayadhithya Chiluveru"],
    "Grade-8": ["Akshaya Gampala", "Ganesh Oggula", "Gayathri Renukuntla", "Khaja Sadeemuddin Mohammed", "Sathwika Nagavelly", "Vyshnavi Uppala"]
};

let attendanceRecords = {};

// Listen for Cloud Data
db.ref('attendance').on('value', (snapshot) => {
    attendanceRecords = snapshot.val() || {};
    let needsInit = false;
    
    for (let cls in schoolData) {
        if (!attendanceRecords[cls]) { attendanceRecords[cls] = { lastSubmittedDate: null, students: {} }; needsInit = true; }
        schoolData[cls].forEach(name => {
            if (!attendanceRecords[cls].students[name]) {
                attendanceRecords[cls].students[name] = { presentDays: 0, totalDays: 0, months: {} };
                needsInit = true;
            }
        });
    }
    
    // SAFETY CATCH ADDED HERE
    if (needsInit) {
        db.ref('attendance').set(attendanceRecords).catch(error => {
            console.error("Firebase Init Error:", error);
        });
    }
    
    if (document.getElementById('classSelect').value !== "" && document.getElementById('submitBtn').style.display === "flex") {
        generateList();
    }
});

function generateList() {
    const cls = document.getElementById('classSelect').value;
    const listDiv = document.getElementById('listContainer');
    const submitBtn = document.getElementById('submitBtn');
    listDiv.innerHTML = "";
    
    if (schoolData[cls] && attendanceRecords[cls]) {
        schoolData[cls].forEach(name => {
            const stats = attendanceRecords[cls].students[name];
            let percentText = "New"; let badgeClass = "percent-new";
            if (stats && stats.totalDays > 0) {
                const percent = Math.round((stats.presentDays / stats.totalDays) * 100);
                percentText = percent + "%";
                badgeClass = percent >= 50 ? "percent-good" : "percent-bad";
            }
            listDiv.innerHTML += `<div class="student-row" data-name="${name}"><div><span class="name-text">${name}</span><span class="percent-badge ${badgeClass}">${percentText}</span></div><input type="checkbox" class="present-toggle" checked></div>`;
        });
        submitBtn.style.display = "flex";
    } else { submitBtn.style.display = "none"; }
}

function submitAttendance() {
    const teacher = document.getElementById('teacherName').value;
    const cls = document.getElementById('classSelect').value;
    const dateStr = new Date().toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
    const monthKey = new Date().toISOString().slice(0, 7); 

    if(!teacher || !cls) return alert("Select Teacher and Class First!");
    
    if (attendanceRecords[cls].lastSubmittedDate === dateStr) {
        if (!confirm("Attendance for " + cls + " was already marked today. Mark again as a new day?")) return; 
    }

    document.getElementById('formContent').style.display = "none";
    document.getElementById('thankYouSection').style.display = "block";

    const xlBody = document.getElementById('xl-body');
    xlBody.innerHTML = "";
    document.getElementById('xl-date').innerText = "Date: " + dateStr;
    document.getElementById('xl-teacher').innerText = "Teacher: " + teacher;
    document.getElementById('xl-class').innerText = "Class: " + cls;

    document.querySelectorAll('.student-row').forEach((row, index) => {
        const name = row.getAttribute('data-name');
        const isPresent = row.querySelector('.present-toggle').checked;
        
        if (attendanceRecords[cls].students[name]) {
            attendanceRecords[cls].students[name].totalDays += 1; 
            if (isPresent) attendanceRecords[cls].students[name].presentDays += 1; 
            if (!attendanceRecords[cls].students[name].months) attendanceRecords[cls].students[name].months = {};
            if (!attendanceRecords[cls].students[name].months[monthKey]) attendanceRecords[cls].students[name].months[monthKey] = { present: 0, total: 0 };
            attendanceRecords[cls].students[name].months[monthKey].total += 1;
            if (isPresent) attendanceRecords[cls].students[name].months[monthKey].present += 1;
        }

        const stats = attendanceRecords[cls].students[name];
        const newPercent = Math.round((stats.presentDays / stats.totalDays) * 100) + "%";
        const status = isPresent ? "PRESENT" : "ABSENT";
        xlBody.innerHTML += `<tr><td style="text-align: center;">${index+1}</td><td>${name}</td><td style="text-align: center; font-weight: bold;">${status}</td><td style="text-align: center;">${newPercent}</td><td></td></tr>`;
    });

    attendanceRecords[cls].lastSubmittedDate = dateStr;
    
    // UPLOAD TO FIREBASE CLOUD (WITH SAFETY ALERT ADDED)
    db.ref('attendance').set(attendanceRecords).then(() => {
        const html = document.getElementById("attendanceExcelTable").outerHTML;
        const blob = new Blob([`<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="UTF-8"></head><body>${html}</body></html>`], { type: 'application/vnd.ms-excel' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `Attendance_${cls}_${dateStr.replace(/ /g, '-')}.xls`;
        setTimeout(() => link.click(), 500);
    }).catch(error => {
        alert("FIREBASE ERROR: The data was blocked from saving. Reason: " + error.message);
    });
}

function resetForm() {
    document.getElementById('teacherName').value = "";
    document.getElementById('classSelect').value = "";
    document.getElementById('listContainer').innerHTML = "";
    document.getElementById('submitBtn').style.display = "none";
    document.getElementById('thankYouSection').style.display = "none";
    document.getElementById('formContent').style.display = "block";
}
</script>
</body>
</html>
