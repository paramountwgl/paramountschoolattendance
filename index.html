<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Paramount School | Teacher Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Segoe+UI:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root { --forest: #006633; --gold: #ffd700; --danger: #e53935; --light: #f4f7f6; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding-bottom: 50px; overflow-x: hidden; }
        header { background: var(--forest); color: white; padding: 25px 3%; box-shadow: 0 4px 15px rgba(0,0,0,0.15); }
        .header-content { display: flex; align-items: center; justify-content: center; gap: 15px; max-width: 1400px; margin: 0 auto; width: 100%; }
        .header-logo { height: clamp(60px, 8vw, 85px); width: auto; flex-shrink: 0; }
        .school-text { display: flex; flex-direction: column; line-height: 1.1; text-align: left; }
        .school-name-main { font-family: 'Montserrat', sans-serif; font-size: clamp(1.4rem, 4vw, 2.2rem); font-weight: 800; letter-spacing: 1px; }
        .school-name-sub { font-family: 'Montserrat', sans-serif; font-size: clamp(0.7rem, 2vw, 1rem); color: var(--gold); font-weight: 700; text-transform: uppercase; }
        .container { max-width: 850px; margin: 0 auto; padding: 0 15px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 25px; border-top: 8px solid var(--forest); }
        h3 { color: var(--forest); margin: 0 0 25px; font-size: 1.5rem; text-align: center; border-bottom: 2px solid #f0f0f0; padding-bottom: 15px; text-transform: uppercase; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 10px; }
        label { display: block; font-size: 11px; font-weight: 900; color: #777; margin: 15px 0 8px; text-transform: uppercase; letter-spacing: 1px; }
        select, input, textarea { width: 100%; padding: 14px; border-radius: 10px; border: 2px solid #ddd; font-size: 15px; outline: none; }
        .row-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .btn { flex: 1; background: linear-gradient(135deg, var(--forest), #004d26); color: white; border: 2px solid var(--gold); padding: 15px; border-radius: 50px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 14px; margin-top: 15px; width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn.warning { background: linear-gradient(135deg, #fb8c00, #ef6c00); border-color: white; }
        .student-item { display: flex; align-items: center; justify-content: space-between; padding: 14px; border-bottom: 1px solid #eee; }
        input[type="checkbox"] { width: 22px; height: 22px; accent-color: var(--forest); cursor: pointer; }
        .hw-info-bar { font-size: 12px; color: #555; margin-top: 8px; font-style: italic; padding: 8px; background: #f0f4f2; border-radius: 8px; border-left: 4px solid var(--gold); display: none; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

<header>
    <div class="header-content">
        <img src="logo.png" class="header-logo" alt="Logo">
        <div class="school-text">
            <span class="school-name-main">PARAMOUNT</span>
            <span class="school-name-sub">ENGLISH MEDIUM SCHOOL</span>
        </div>
    </div>
</header>

<div class="container" style="margin-top: 30px;">
    <div class="card">
        <h3><i class="fas fa-id-badge"></i> Staff Selection</h3>
        <select id="teacherSelect" onchange="verifyAccess()">
            <option value="">-- Choose Name --</option>
            <option value="Mr. Shaik Ahmad">Mr. Shaik Ahmad</option>
            <option value="Ms. Riha">Ms. Riha (IIT)</option>
            <option value="Ms. Raniya Zainab">Ms. Raniya Zainab (Physics)</option>
            <option value="Ms. Roqiya Begum">Ms. Roqiya Begum</option>
            <option value="Ms. G.Rajitha">Ms. G.Rajitha</option>
            <option value="Ms. Ameena Tabassum">Ms. Ameena Tabassum</option>
            <option value="Ms. Shaik Shabana">Ms. Shaik Shabana</option>
            <option value="Ms. B.Ravali">Ms. B.Ravali</option>
            <option value="Ms. L.Kalyani">Ms. L.Kalyani</option>
            <option value="Ms. J.Alaya Sree">Ms. J.Alaya Sree</option>
            <option value="Ms. S.Sujatha">Ms. S.Sujatha</option>
            <option value="Ms. J.Prathibha">Ms. J.Prathibha</option>
            <option value="Ms. P.Shailaja">Ms. P.Shailaja</option>
            <option value="Ms. A.Jhansi Rani">Ms. A.Jhansi Rani</option>
            <option value="Ms. S. Neelima">Ms. S. Neelima</option>
        </select>
    </div>

    <div class="card" id="attCard" style="display:none;">
        <h3>Mark Attendance</h3>
        <div class="row-grid">
            <div><label>Class</label><select id="attClass" onchange="loadStudents()">
                <option value="">-- Select --</option>
                <option value="Pre-KG">Pre-KG</option><option value="KG-1">KG-1</option>
                <option value="KG-2">KG-2</option><option value="Grade-1">Grade-1</option>
                <option value="Grade-2">Grade-2</option><option value="Grade-3">Grade-3</option>
                <option value="Grade-4">Grade-4</option><option value="Grade-5">Grade-5</option>
                <option value="Grade-6">Grade-6</option><option value="Grade-7">Grade-7</option>
                <option value="Grade-8">Grade-8</option>
            </select></div>
            <div><label>Date</label><input type="date" id="attDate" onchange="loadStudents()"></div>
        </div>
        <div id="studentList" style="margin-top:15px;"></div>
        <button id="submitAtt" class="btn" style="display:none;" onclick="saveAttendance()">Update Attendance <i class="fas fa-check-double"></i></button>
    </div>

    <div class="card" id="hwCard" style="border-top-color: var(--gold); display:none;">
        <h3>Daily Homework Tool</h3>
        <div class="row-grid">
            <div><label>Class</label><select id="hwClass" onchange="updateHWSubjects()">
                <option value="Pre-KG">Pre-KG</option><option value="KG-1">KG-1</option>
                <option value="KG-2">KG-2</option><option value="Grade-1">Grade-1</option>
                <option value="Grade-2">Grade-2</option><option value="Grade-3">Grade-3</option>
                <option value="Grade-4">Grade-4</option><option value="Grade-5">Grade-5</option>
                <option value="Grade-6">Grade-6</option><option value="Grade-7">Grade-7</option>
                <option value="Grade-8">Grade-8</option>
            </select></div>
            <div><label>Date</label><input type="date" id="hwDate" onchange="fetchExistingHW()"></div>
        </div>
        <label>Subject</label><select id="hwSubSelect" onchange="fetchExistingHW()"></select>
        <label>Task Details</label><textarea id="hwTask" rows="3" placeholder="Type instructions..."></textarea>
        <div id="hwAuditTrail" class="hw-info-bar"><i class="fas fa-history"></i> <span id="auditText"></span></div>
        <div style="display:flex; gap:12px; margin-top:15px;">
            <button class="btn" onclick="postHomework()"><i class="fas fa-upload"></i> Publish / Update</button>
            <button class="btn warning" style="flex:0.5;" onclick="clearHomework()"><i class="fas fa-eraser"></i> Clear & Remove</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDRYk9KOK-ga0c88dnYMsAoifW2NJTd_Y8", databaseURL: "https://paramount-school-d55bc-default-rtdb.firebaseio.com", projectId: "paramount-school-d55bc" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let authenticatedTeacher = "";

    const registry = {
        "Mr. Shaik Ahmad": "Ahmad@123", "Ms. Roqiya Begum": "Roqiya@123", "Ms. G.Rajitha": "Rajitha@123",
        "Ms. Ameena Tabassum": "Ameena@123", "Ms. Shaik Shabana": "Shabana@123", "Ms. B.Ravali": "Ravali@123",
        "Ms. L.Kalyani": "Kalyani@123", "Ms. J.Alaya Sree": "Alaya@123", "Ms. S.Sujatha": "Sujatha@123",
        "Ms. J.Prathibha": "Prathibha@123", "Ms. P.Shailaja": "Shailaja@123", "Ms. A.Jhansi Rani": "Jhansi@123", 
        "Ms. S. Neelima": "Neelima@123", "Ms. Riha": "Riha@123", "Ms. Raniya Zainab": "Raniya@123"
    };

    const studentData = {
        "Pre-KG": ["Hanish Macharla", "Arjun Vihaar Illandula", "Thanu sree Allakunta", "Aadhya Gangaraboina", "Aadhya Sri Oggula", "Aadhyasri Shivagoni", "Afraha Begum", "Aliya Sultana", "Anvika Bandi", "Aradana Devara konda", "Devansh Bandi", "Hanvitha Mulkalapelli", "Harsha Vardhan Seenapelli", "Hiranya Bandi", "Jashritha Boina", "Konreddy Shreyanvi", "Kriyansh Sammeta", "Mohammed Mohiuddin Sayyad", "Nethra Narkurthi", "Reeyansh Bandi", "Rishi Manupati", "Rudransh Bandi", "Sanvika Bandi", "Shanvith Khatha", "Shishira Jalagam", "Shiva Sai Mekala", "Shree Rudhraveer Chevvu", "Shreyansh Gangaraboina", "Sreeja Thalla", "Srikrithini Myakala", "Srivatsav Vanam", "Sriyansh Mekala", "Thanvika Lakka", "Thrilokansh Vudari", "Ujjwal Chekka", "Vaishnavi Lakka", "Vedansh Myakala", "Vishnu Priya Molugu", "Vyshnav Tej Boina", "Yafiah Mohammad"],
        "KG-1": ["Aadhya Sri Amaravadi", "Aditya Manda", "Aadhya Jella", "Advaita Gauri Bandi", "Aizah Amna Shaik", "Akshara Singaram", "Bhahuveer Raj Somishetti", "Gayathri Erroju", "Hanvika Mulkalapelli", "Manvith Kondoju", "Sayyad Vajeed", "Mekala Manu sri", "Oliva Grace Vallapu", "Rithwik Oggula", "Rithwika Kandagatla", "Srimahi Chevvu", "Thanvesh Thalla", "Trishul Nanduri", "Yoganshika Nanduri", "Yusra Mohammad", "Zainul Abideen Syed"],
        "KG-2": ["Deekshanth Sammeta", "Hanshith Erroju", "Harika Bandi", "Himarsha Naini", "Karthik Vallepu", "Kruthika Bandi", "Rajavardhan Gampala", "Roshan Kaitha", "Sri Anshu Ayaan Lyadala", "Srihansh Bandi", "Srikshitha Guduri", "Varshith Gonela", "Adyasri Makala", "Anvik Boini", "Anvith Pokanati", "Awais Ur Rehman Mohammad", "Dakshu Pothuganti", "Hansith Reddy Katukuri", "Harshith Pokanati", "Jella Aditya", "Krishank Nallabothula", "Kundana Katkuri", "Munukuntla Revanth Rudhra", "Niraja Nethri Siluveru", "Pranav Mattepelli", "Sreenith Yadav Naini", "Uvan Reddy Dasari", "Zayan Mohammad", "Zoya Mohammed"],
        "Grade-1": ["Dheeraj Gattu", "Preetham Sannayala", "Shiva nandu Gonela", "Shrayan Nuthanakanti", "Sriyanksha Mandala", "Advitha Garige", "Harika Bandi", "Himansi Kondoju", "Izhaan Rahamath Syed", "Jaisurya Myakala", "Khadeeja Fathima", "Manaswini Dandugula", "Manusri Bandi", "Rithwik krishna Amaravadi", "Rohan Bandi", "Shiva Junnu", "Shivanandh Bandi", "Sridha Thalla", "Srinika Chengelly", "Sriyanshi Oggula", "Vishwak Chekka"],
        "Grade-2": ["Aliza Manha Shaik", "Dhruvan Reddy Katukuri", "Druthika Enugala", "Manaswini Bandi", "Rakshith Macharla", "Sathwika Katkuri", "Shalini Uppala", "Chandu Devarakonda", "Gnaneshwar Pokanati", "Hasnain Syed", "Koushik Siluveru", "Senen Desabattula", "Shivarajan Pothuganti"],
        "Grade-3": ["Nagavelly Manikanta", "Mirja Ismail", "Bandi Aryan", "Dandugula Mahesh Babu", "Bandi Tejasri", "Bandi Harshavardhan", "Gampala Vyshnavi", "Gampala Laxmi", "Garige Harshith", "Katkuri Hanish", "Katukuri Manideep", "MD Abdul Quddus", "Muppa Sathwik Patel", "Nuthanakanti Sansita", "Pasarakonda Ritwin", "Pinninti Rakshith Rao", "Rayi Sriman Adithya"],
        "Grade-4": ["Abdul Saqib Mohammad", "Anudeep Chintha", "Bhavan Bandi", "Harshavardhan Gonela", "Jayadev Chiluveru", "Mahaboob Syed", "Nandith Reddy Enugala", "Sai Charan Goud Mandala", "Sai Prasanna Keerthi", "Ajmeri Shaik", "Akshith Chiluveru", "Jayasri Myakala", "Rahul Kanjarla", "Saketh Devarakonda"],
        "Grade-5": ["Adya Reddy Vangala", "Kowshik Patel Muppa", "Siri Singaram", "Srikar Mandala", "Abdus Salaam MD", "Akshith Ram Kalvacharla", "Jaffar Anas Shaik", "Khaja Azeemuddin Mohammed", "Nihan Mohammed", "Saif Shaik", "Saketh Renukuntla", "Sreeja Dasari", "Vidhaatri Sahani"],
        "Grade-6": ["Abdul Razzak Mohammad", "Anudeepthi Chintha", "Saketh Ranaveni", "Shiva Sri Katukuri", "Aklees Shaik", "Akshya Kalvacharla", "Prince Katkuri"],
        "Grade-7": ["Manikanta Sannayala", "Sreeyan Reddy Karra", "Jayadhithya Chiluveru"],
        "Grade-8": ["Sathwika Nagavelly", "Vyshnavi Uppala", "Akshaya Gampala", "Ganesh Oggula", "Gayathri Renukuntla", "Khaja Sadeemuddin Mohammed"]
    };

    async function verifyAccess() {
        const name = document.getElementById('teacherSelect').value;
        if(!name) return;
        const { value: pw } = await Swal.fire({ 
            title: `Staff Login`, text: `Enter password for ${name}`, 
            input: 'password', showCancelButton: true
        });

        if(pw === registry[name]) { 
            authenticatedTeacher = name;
            const isPartTime = (name === "Ms. Riha" || name === "Ms. Raniya Zainab");
            if(isPartTime) {
                document.getElementById('attCard').style.display = 'none';
                document.getElementById('hwCard').style.display = 'block';
                Swal.fire('Welcome', `Hello ${authenticatedTeacher}. Access granted to Homework Tool.`, 'success');
            } else {
                document.getElementById('attCard').style.display = 'block';
                document.getElementById('hwCard').style.display = 'block';
                Swal.fire('Welcome', `Hello ${authenticatedTeacher}. Full portal access granted.`, 'success');
            }
            updateHWSubjects(); 
        } else if(pw) { 
            Swal.fire('Error', 'Incorrect Password', 'error'); 
            document.getElementById('teacherSelect').value = ""; 
        }
    }

    async function loadStudents() {
        const cls = document.getElementById('attClass').value; const date = document.getElementById('attDate').value; const list = document.getElementById('studentList');
        if(!cls || !date) return; list.innerHTML = "Loading Students...";
        const snap = await db.ref(`daily_attendance/${date}/${cls}`).once('value');
        const existing = snap.val() || {};
        list.innerHTML = (studentData[cls] || []).map(n => {
            const isP = (existing[n] !== undefined) ? (existing[n] ? "checked" : "") : "checked";
            return `<div class="student-item"><span>${n}</span><input type="checkbox" class="att-check" data-name="${n}" ${isP}></div>`;
        }).join('');
        document.getElementById('submitAtt').style.display = 'block';
    }

    function saveAttendance() {
        const cls = document.getElementById('attClass').value; const date = document.getElementById('attDate').value;
        const updates = {};
        document.querySelectorAll('.att-check').forEach(cb => { updates[`daily_attendance/${date}/${cls}/${cb.getAttribute('data-name')}`] = cb.checked; });
        db.ref().update(updates).then(() => Swal.fire('Success', 'Attendance Updated!', 'success'));
    }

    function updateHWSubjects() { 
        const cls = document.getElementById('hwClass').value; 
        const common = ["TELUGU", "HINDI", "ENGLISH", "MATHS", "SOCIAL STUDIES"]; 
        let subs = [];

        if (["Grade-6", "Grade-7", "Grade-8"].includes(cls)) {
            subs = [...common, "PHYSICS", "CHEMISTRY", "BIOLOGY", "IIT"];
        } else if (cls === "Grade-5") {
            subs = [...common, "SCIENCE", "IIT"];
        } else {
            subs = [...common, "SCIENCE"];
        }
        document.getElementById('hwSubSelect').innerHTML = subs.map(s => `<option value="${s}">${s}</option>`).join(''); 
        fetchExistingHW(); 
    }
    
    function fetchExistingHW() { 
        const d = document.getElementById('hwDate').value; 
        const c = document.getElementById('hwClass').value; 
        const s = document.getElementById('hwSubSelect').value; 
        if(!d || !s) return; 

        db.ref(`homework/${d}/${c}/${s}`).once('value', (snap) => { 
            const data = snap.val();
            const auditDiv = document.getElementById('hwAuditTrail');
            if(data && typeof data === 'object') {
                document.getElementById('hwTask').value = data.task || "";
                auditDiv.style.display = "block";
                document.getElementById('auditText').innerText = `Last update: ${data.updatedBy} at ${data.updatedAt}`;
            } else {
                document.getElementById('hwTask').value = data || ""; 
                auditDiv.style.display = data ? "block" : "none";
                document.getElementById('auditText').innerText = data ? "Historical entry." : "";
            }
        }); 
    }

    function postHomework() { 
        const d = document.getElementById('hwDate').value; 
        const c = document.getElementById('hwClass').value; 
        const s = document.getElementById('hwSubSelect').value; 
        const t = document.getElementById('hwTask').value; 
        if(!d || !t) return;
        const now = new Date();
        const timeStamp = now.toLocaleDateString() + " " + now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        db.ref(`homework/${d}/${c}/${s}`).set({
            task: t, updatedBy: authenticatedTeacher, updatedAt: timeStamp
        }).then(() => {
            Swal.fire('Updated!', 'Homework is live.', 'success');
            fetchExistingHW();
        }); 
    }

    async function clearHomework() {
        const d = document.getElementById('hwDate').value;
        const c = document.getElementById('hwClass').value;
        const s = document.getElementById('hwSubSelect').value;
        if (!d || !s) return;
        const result = await Swal.fire({
            title: 'Delete Homework?',
            text: `This will remove ${s} homework for ${c} from the portal.`,
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#006633',
            cancelButtonColor: '#d33',
            confirmButtonText: 'Yes, remove it!'
        });
        if (result.isConfirmed) {
            db.ref(`homework/${d}/${c}/${s}`).remove().then(() => {
                document.getElementById('hwTask').value = '';
                document.getElementById('hwAuditTrail').style.display = 'none';
                Swal.fire('Removed', 'Data cleared from portal.', 'success');
            });
        }
    }

    document.getElementById('hwDate').valueAsDate = new Date();
    document.getElementById('attDate').valueAsDate = new Date();
    updateHWSubjects();
</script>
</body>
</html>
