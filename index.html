<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Portal | Paramount School</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --forest: #006633; --gold: #ffd700; --danger: #c62828; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding-bottom: 50px; }
        header { background: var(--forest); color: white; padding: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h3 { color: var(--forest); margin-top: 0; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; }
        label { display: block; font-size: 12px; font-weight: bold; color: #666; margin: 10px 0 5px; text-transform: uppercase; }
        select, input, textarea { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid #ddd; font-size: 15px; outline: none; box-sizing: border-box; }
        .btn { background: var(--forest); color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; display: inline-block; }
        .btn-danger { background: var(--danger); }
        
        /* EDITING LIST STYLE */
        .hw-edit-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; background: #fafafa; border-radius: 5px; margin-top: 5px; }
        .hw-edit-item span { font-weight: bold; font-size: 14px; color: #333; }
        .edit-controls { display: flex; gap: 10px; }
        .icon-btn { cursor: pointer; border: none; background: none; font-size: 16px; }
        .icon-edit { color: var(--forest); }
        .icon-delete { color: var(--danger); }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

<header>
    <h1 style="margin:0;">TEACHER PORTAL</h1>
    <p style="margin:5px 0 0; opacity:0.9;">Paramount English Medium School</p>
</header>

<div class="container">
    <div class="card" style="border-top: 5px solid var(--forest);">
        <h3><i class="fas fa-plus-circle"></i> Post New Homework</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div>
                <label>Class</label>
                <select id="hwClass" onchange="updateHWSubjects()">
                    <option value="Pre-KG">Pre-KG</option><option value="Grade-1">Grade-1</option>
                    <option value="Grade-6">Grade-6</option><option value="Grade-7">Grade-7</option><option value="Grade-8">Grade-8</option>
                </select>
            </div>
            <div><label>Date</label><input type="date" id="hwDate"></div>
        </div>
        <label>Subject</label>
        <select id="hwSubject"></select>
        <label>Instructions</label>
        <textarea id="hwTask" placeholder="Enter assignment details..."></textarea>
        <button class="btn" onclick="postHomework()" style="margin-top:10px;"><i class="fas fa-paper-plane"></i> Publish</button>
    </div>

    <div class="card" style="border-top: 5px solid var(--danger);">
        <h3><i class="fas fa-edit"></i> Manage Posted Homework</h3>
        <p style="font-size: 12px; color: #666;">Select a date to view and edit current assignments.</p>
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <input type="date" id="manageDate" style="flex: 1;">
            <button class="btn" onclick="loadHomeworkForEditing()" style="background: #333;">Load Diary</button>
        </div>
        <div id="editListArea"></div>
    </div>

    <div class="card" style="border-top: 5px solid var(--gold);">
        <h3><i class="fas fa-user-check"></i> Parent Verification</h3>
        <input type="date" id="verifyDate" style="margin-bottom:10px;">
        <button class="btn" onclick="checkParentStatus()" style="background: #333; width:100%;">Check Status</button>
        <div id="verifyBodyArea" style="margin-top:15px;"></div>
    </div>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyDRYk9KOK-ga0c88dnYMsAoifW2NJTd_Y8", 
        databaseURL: "https://paramount-school-d55bc-default-rtdb.firebaseio.com", 
        projectId: "paramount-school-d55bc" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function updateHWSubjects() {
        const cls = document.getElementById('hwClass').value;
        const subSelect = document.getElementById('hwSubject');
        const common = ["TELUGU", "HINDI", "ENGLISH", "MATHS", "SOCIAL STUDIES"];
        const subjects = (["Grade-6", "Grade-7", "Grade-8"].includes(cls)) ? [...common, "PHYSICS", "CHEMISTRY", "BIOLOGY"] : [...common, "SCIENCE"];
        subSelect.innerHTML = subjects.map(s => `<option value="${s}">${s}</option>`).join('');
    }

    function postHomework() {
        const date = document.getElementById('hwDate').value;
        const sub = document.getElementById('hwSubject').value;
        const task = document.getElementById('hwTask').value;
        if(!date || !task) return Swal.fire('Error', 'Date and Details required', 'error');
        const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        db.ref(`homework/${date}`).update({ [sub]: task, lastUpdated: now }).then(() => {
            Swal.fire('Posted!', `${sub} added.`, 'success');
            document.getElementById('hwTask').value = "";
        });
    }

    // NEW: EDITING LOGIC
    function loadHomeworkForEditing() {
        const date = document.getElementById('manageDate').value;
        const area = document.getElementById('editListArea');
        if(!date) return;
        db.ref(`homework/${date}`).once('value', (snap) => {
            const data = snap.val();
            area.innerHTML = "";
            if(!data) { area.innerHTML = "<p style='color:red; text-align:center;'>No homework found for this date.</p>"; return; }
            for(let sub in data) {
                if(sub === 'lastUpdated') continue;
                area.innerHTML += `
                <div class="hw-edit-item">
                    <span>${sub}</span>
                    <div class="edit-controls">
                        <button class="icon-btn icon-edit" onclick="editTask('${date}', '${sub}', '${data[sub]}')"><i class="fas fa-pen"></i></button>
                        <button class="icon-btn icon-delete" onclick="deleteTask('${date}', '${sub}')"><i class="fas fa-trash"></i></button>
                    </div>
                </div>`;
            }
        });
    }

    async function editTask(date, sub, oldTask) {
        const { value: newTask } = await Swal.fire({
            title: `Edit ${sub}`,
            input: 'textarea',
            inputValue: oldTask,
            showCancelButton: true
        });
        if (newTask) {
            const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            db.ref(`homework/${date}`).update({ [sub]: newTask, lastUpdated: now }).then(() => {
                Swal.fire('Updated!', '', 'success');
                loadHomeworkForEditing();
            });
        }
    }

    function deleteTask(date, sub) {
        Swal.fire({
            title: 'Delete this subject?',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#d33',
            confirmButtonText: 'Yes, delete'
        }).then((result) => {
            if (result.isConfirmed) {
                db.ref(`homework/${date}/${sub}`).remove().then(() => {
                    loadHomeworkForEditing();
                });
            }
        });
    }

    updateHWSubjects();
</script>
</body>
</html>
