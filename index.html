<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Paramount School | Teacher Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Segoe+UI:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root { --forest: #006633; --gold: #ffd700; --danger: #e53935; --light: #f4f7f6; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding-bottom: 50px; overflow-x: hidden; }
        
        header { background: var(--forest); color: white; padding: 20px 3%; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header-content { display: flex; align-items: center; justify-content: center; gap: 12px; max-width: 1400px; margin: 0 auto; width: 100%; }
        .header-logo { height: clamp(55px, 8vw, 75px); width: auto; flex-shrink: 0; }
        .school-text { display: flex; flex-direction: column; line-height: 1.1; white-space: nowrap; text-align: left; }
        .school-name-main { font-family: 'Montserrat', sans-serif; font-size: clamp(1.2rem, 3.5vw, 2.2rem); font-weight: 800; letter-spacing: 0.5px; }
        .school-name-sub { font-family: 'Montserrat', sans-serif; font-size: clamp(0.6rem, 2vw, 0.9rem); color: var(--gold); font-weight: 700; text-transform: uppercase; }
        .portal-subtitle { color: white; font-size: clamp(0.7rem, 2.5vw, 1rem); font-weight: 600; opacity: 0.9; margin-top: 4px; display: block; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 4px; }

        #announcementBar { background: var(--danger); color: white; padding: 15px; text-align: center; font-weight: bold; display: none; align-items: center; justify-content: center; gap: 12px; margin: 15px auto; width: 90%; max-width: 800px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); animation: pulse-brightness 2s infinite ease-in-out; }
        @keyframes pulse-brightness { 0%, 100% { filter: brightness(0.9); } 50% { filter: brightness(1.2); } }

        .container { max-width: 850px; margin: 0 auto; padding: 0 15px; }
        .nav-buttons-wrapper { display: flex; justify-content: center; gap: 15px; margin: 20px 0; flex-wrap: wrap; }
        .nav-btn { background: #e8f5e9; color: var(--forest); border: 2px solid var(--forest); padding: 12px 25px; text-decoration: none; border-radius: 50px; font-weight: bold; font-size: 14px; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .nav-btn:hover { background: var(--forest); color: white; transform: translateY(-2px); }
        .nav-btn.gold { background: #fffde7; border-color: var(--gold); color: #856404; }
        .nav-btn.gold:hover { background: var(--gold); color: var(--forest); }

        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-bottom: 25px; border-top: 6px solid var(--forest); }
        h3 { color: var(--forest); margin: 0 0 20px; font-size: 1.4rem; display: flex; align-items: center; gap: 10px; border-bottom: 2px solid #eee; padding-bottom: 10px; justify-content: center; text-transform: uppercase; }
        label { display: block; font-size: 11px; font-weight: bold; color: #666; margin: 15px 0 5px; text-transform: uppercase; }
        select, input, textarea { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid #ddd; font-size: 15px; outline: none; box-sizing: border-box; font-family: inherit; }
        
        /* FIX FOR HOMEWORK TOOL BOX OVERFLOW */
        .homework-row { 
            display: grid; 
            grid-template-columns: 1.1fr 0.9fr; /* Proportions to keep side-by-side */
            gap: 8px; 
            width: 100%; 
        }
        .homework-row div { min-width: 0; overflow: hidden; } /* Prevents overflow */
        
        .tools-btn-row { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; background: linear-gradient(135deg, var(--forest), #004d26); color: white; border: none; padding: 15px; border-radius: 50px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 14px; }
        .btn.danger { background: linear-gradient(135deg, #d32f2f, #b71c1c); }
        .btn:hover { transform: translateY(-2px); opacity: 0.9; }

        .student-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-bottom: 1px solid #eee; }
        .student-item input[type="checkbox"] { width: 22px; height: 22px; cursor: pointer; accent-color: var(--forest); }
        
        @media (max-width: 600px) { 
            .header-content { gap: 10px; } 
            .card { padding: 15px; } 
            .tools-btn-row { flex-direction: column; } 
            /* Kept side-by-side but refined for small screens */
            .homework-row { gap: 5px; } 
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
</head>
<body>

<header>
    <div class="header-content">
        <img src="logo.png" alt="Logo" class="header-logo" onerror="this.style.display='none'">
        <div class="school-text">
            <span class="school-name-main">PARAMOUNT</span>

    <div class="card">

        <label>Select Teacher</label>
        <select id="teacherSelect" onchange="verifyTeacher()">
            <option value="">-- Select Teacher --</option>

            <option value="Ms. B.Ravali">Ms. B.Ravali</option>
            <option value="Ms. L.Kalyani">Ms. L.Kalyani</option>
            <option value="Ms. J.Alaya Sree">Ms. J.Alaya Sree</option>
            <option value="Ms. S.Sujatha">Ms. S.Sujatha</option>
            <option value="Ms. J.Prathibha">Ms. J.Prathibha</option>
            <option value="Ms. P.Shailaja">Ms. P.Shailaja</option>
            <option value="Ms. A.Jhansi Rani">Ms. A.Jhansi Rani</option>

        <div id="classGroup" style="display:none; margin-top:15px;">

            <select id="attClass" onchange="loadStudents()">
                <option value="">-- Choose Class --</option>
                <option value="Pre-KG">Pre-KG</option><option value="KG-1">KG-1</option><option value="KG-2">KG-2</option>
                <option value="Grade-1">Grade-1</option><option value="Grade-2">Grade-2</option><option value="Grade-3">Grade-3</option>
                <option value="Grade-4">Grade-4</option><option value="Grade-5">Grade-5</option><option value="Grade-6">Grade-6</option>

        </div>

        <button id="submitAtt" class="btn" style="display:none; width:100%;" onclick="saveAndDownload()">Submit & Download Attendance</button>
    </div>

    <div class="card" style="border-top-color: var(--gold);">
        <h3>Daily Homework Tool</h3>
        <div class="homework-row">
            <div><label>Class</label><select id="hwClass" onchange="updateHWSubjects(); fetchExistingHW();">
                <option value="Pre-KG">Pre-KG</option><option value="KG-1">KG-1</option><option value="KG-2">KG-2</option>
                <option value="Grade-1">Grade-1</option><option value="Grade-2">Grade-2</option><option value="Grade-3">Grade-3</option>
                <option value="Grade-4">Grade-4</option><option value="Grade-5">Grade-5</option><option value="Grade-6">Grade-6</option>
                <option value="Grade-7">Grade-7</option><option value="Grade-8">Grade-8</option>
            </select></div>
            <div><label>Date</label><input type="date" id="hwDate" onchange="fetchExistingHW()"></div>
        </div>
        <label>Subject</label><select id="hwSubSelect" onchange="fetchExistingHW()"></select>
        <label>Task Details</label><textarea id="hwTask" rows="5" placeholder="Enter instructions..."></textarea>
        <div class="tools-btn-row">
            <button class="btn" onclick="postHomework()"><i class="fas fa-paper-plane"></i> Publish / Update</button>
            <button class="btn danger" onclick="clearSubject()"><i class="fas fa-eraser"></i> Clear Task</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDRYk9KOK-ga0c88dnYMsAoifW2NJTd_Y8", databaseURL: "https://paramount-school-d55bc-default-rtdb.firebaseio.com", projectId: "paramount-school-d55bc" };

        "KG-1": ["Aadhya Sri Amaravadi", "Aditya Manda", "Aadhya Jella", "Advaita Gauri Bandi", "Aizah Amna Shaik", "Akshara Singaram", "Bhahuveer Raj Somishetti", "Gayathri Erroju", "Hanvika Mulkalapelli", "Manvith Kondoju", "Sayyad Vajeed", "Mekala Manu sri", "Oliva Grace Vallapu", "Rithwik Oggula", "Rithwika Kandagatla", "Srimahi Chevvu", "Thanvesh Thalla", "Trishul Nanduri", "Yoganshika Nanduri", "Yusra Mohammad", "Zainul Abideen Syed"],
        "KG-2": ["Deekshanth Sammeta", "Hanshith Erroju", "Harika Bandi", "Himarsha Naini", "Karthik Vallepu", "Kruthika Bandi", "Rajavardhan Gampala", "Roshan Kaitha", "Sri Anshu Ayaan Lyadala", "Srihansh Bandi", "Srikshitha Guduri", "Varshith Gonela", "Adyasri Makala", "Anvik Boini", "Anvith Pokanati", "Awais Ur Rehman Mohammad", "Dakshu Pothuganti", "Hansith Reddy Katukuri", "Harshith Pokanati", "Jella Aditya", "Krishank Nallabothula", "Kundana Katkuri", "Munukuntla Revanth Rudhra", "Niraja Nethri Siluveru", "Pranav Mattepelli", "Sreenith Yadav Naini", "Uvan Reddy Dasari", "Zayan Mohammad", "Zoya Mohammed"],
        "Grade-1": ["Dheeraj Gattu", "Preetham Sannayala", "Shiva nandu Gonela", "Shrayan Nuthanakanti", "Sriyanksha Mandala", "Advitha Garige", "Harika Bandi", "Himansi Kondoju", "Izhaan Rahamath Syed", "Jaisurya Myakala", "Khadeeja Fathima", "Manaswini Dandugula", "Manusri Bandi", "Rithwik krishna Amaravadi", "Rohan Bandi", "Shiva Junnu", "Shivanandh Bandi", "Sridha Thalla", "Srinika Chengelly", "Sriyanshi Oggula", "Vishwak Chekka"],
        "Grade-2": ["Aliza Manha Shaik", "Dhruvan Reddy Katukuri", "Druthika Enugala", "Manaswini Bandi", "Rakshith Macharla", "Sathwika Katkuri", "Shalini Uppala", "Chandu Devarakonda", "Gnaneshwar Pokanati", "Hasnain Syed", "Koushik Siluveru", "Senen Desabattula", "Shivarajan Pothuganti"],

        "Grade-5": ["Adya Reddy Vangala", "Kowshik Patel Muppa", "Siri Singaram", "Srikar Mandala", "Abdus Salaam MD", "Akshith Ram Kalvacharla", "Jaffar Anas Shaik", "Khaja Azeemuddin Mohammed", "Nihan Mohammed", "Saif Shaik", "Saketh Renukuntla", "Sreeja Dasari", "Vidhaatri Sahani"],
        "Grade-6": ["Abdul Razzak Mohammad", "Anudeepthi Chintha", "Saketh Ranaveni", "Shiva Sri Katukuri", "Aklees Shaik", "Akshya Kalvacharla", "Prince Katkuri"],

        "Grade-8": ["Sathwika Nagavelly", "Vyshnavi Uppala", "Akshaya Gampala", "Ganesh Oggula", "Gayathri Renukuntla", "Khaja Sadeemuddin Mohammed"]
    };

    async function verifyTeacher() {
        const name = document.getElementById('teacherSelect').value; if(!name) return;
        const { value: pw } = await Swal.fire({ title: `Welcome, ${name}!`, text: 'Please enter your password to proceed.', input: 'password', showCancelButton: true });
        if(pw === teacherRegistry[name]) { document.getElementById('classGroup').style.display = 'block'; Swal.fire('Verified', 'Access Granted', 'success'); } 
        else { document.getElementById('teacherSelect').value = ""; document.getElementById('classGroup').style.display = 'none'; if(pw) Swal.fire('Error', 'Incorrect Password', 'error'); }
    }

    function loadStudents() {
        const cls = document.getElementById('attClass').value; const list = document.getElementById('studentList');
        const students = studentData[cls] || [];
        list.innerHTML = students.map(name => `<div class="student-item"><span>${name}</span><input type="checkbox" class="att-check" data-name="${name}" checked></div>`).join('');
        document.getElementById('submitAtt').style.display = students.length ? 'block' : 'none';
    }

    async function saveAndDownload() {
        const cls = document.getElementById('attClass').value; 
        const teacher = document.getElementById('teacherSelect').value;
        const checks = document.querySelectorAll('.att-check'); 
        const date = new Date().toLocaleDateString('en-GB'); 
        const monthKey = new Date().toISOString().slice(0, 7);

        const workbook = new ExcelJS.Workbook();
        const sheet = workbook.addWorksheet('Attendance');

        sheet.columns = [
            { key: 'spacerA', width: 8 }, 
            { key: 'spacerB', width: 8 }, 
            { key: 'spacerC', width: 8 }, 
            { key: 'sno', width: 12 },    
            { key: 'name', width: 40 },   
            { key: 'status', width: 18 }, 
            { key: 'remarks', width: 25 } 
        ];

        sheet.getRow(6).height = 35; 
        sheet.mergeCells('D6:G6');
        const schoolHeader = sheet.getCell('D6');
        schoolHeader.value = 'PARAMOUNT ENGLISH MEDIUM SCHOOL';
        schoolHeader.fill = { type: 'pattern', pattern:'solid', fgColor:{argb:'FF006633'} };
        schoolHeader.font = { color: { argb: 'FFFFFFFF' }, bold: true, size: 16 };
        schoolHeader.alignment = { vertical: 'middle', horizontal: 'center' };

        sheet.getRow(7).height = 25; 
        sheet.mergeCells('D7:G7');
        const portalLabel = sheet.getCell('D7');
        portalLabel.value = 'TEACHERS OFFICIAL ATTENDANCE PORTAL';
        portalLabel.fill = { type: 'pattern', pattern:'solid', fgColor:{argb:'FFFFD700'} };
        portalLabel.font = { color: { argb: 'FF000000' }, bold: true, size: 12 };
        portalLabel.alignment = { vertical: 'middle', horizontal: 'center' };

        sheet.getRow(8).height = 20;
        sheet.getRow(9).height = 20;
        sheet.getCell('D8').value = `Date: ${date}`;
        sheet.getCell('F8').value = `Teacher: ${teacher}`;
        sheet.getCell('D9').value = `Class: ${cls}`;
        sheet.getCell('F9').value = `Status: FINALIZED`;
        
        [8, 9].forEach(rowNum => { 
            const row = sheet.getRow(rowNum);
            row.font = { bold: true };
            row.eachCell(cell => { cell.alignment = { vertical: 'middle' }; });
        });

        sheet.getRow(10).height = 25;
        const headerRow = sheet.getRow(10);
        headerRow.values = ['', '', '', 'S.No', 'STUDENT NAME', 'STATUS', 'REMARKS'];
        headerRow.eachCell((cell, colNum) => {
            if (colNum >= 4) { 
                cell.fill = { type: 'pattern', pattern:'solid', fgColor:{argb:'FFE0E0E0'} };
                cell.font = { bold: true };
                cell.alignment = { horizontal: 'center', vertical: 'middle' };
                cell.border = { top: {style:'thin'}, left: {style:'thin'}, bottom: {style:'thin'}, right: {style:'thin'} };
            }
        });

        checks.forEach((cb, index) => {
            const name = cb.getAttribute('data-name'); 
            const isP = cb.checked;
            const statusStr = isP ? 'PRESENT' : 'ABSENT';
            const rowNumber = 11 + index;

            db.ref(`attendance/${cls}/students/${name}`).transaction(c => {
                if(!c) return { presentDays: isP?1:0, totalDays: 1, months: {[monthKey]: {present: isP?1:0, total: 1}} };
                c.presentDays += isP?1:0; c.totalDays += 1; return c;
            });

            const row = sheet.getRow(rowNumber);
            row.height = 20;
            row.values = ['', '', '', index + 1, name, statusStr, ''];
            
            row.eachCell((cell, colNumber) => {
                if (colNumber >= 4) { 
                    cell.alignment = { 
                        vertical: 'middle', 
                        horizontal: (colNumber === 5 || colNumber === 7) ? 'left' : 'center' 
                    };
                    cell.border = { top: {style:'thin'}, left: {style:'thin'}, bottom: {style:'thin'}, right: {style:'thin'} };
                }
            });

            const statusCell = sheet.getCell(`F${rowNumber}`);
            if (isP) {
                statusCell.fill = { type: 'pattern', pattern:'solid', fgColor:{argb:'FFC8E6C9'} };
                statusCell.font = { color: { argb: 'FF2E7D32' }, bold: true };
            } else {
                statusCell.fill = { type: 'pattern', pattern:'solid', fgColor:{argb:'FFF8BBD0'} };
                statusCell.font = { color: { argb: 'FFC62828' }, bold: true };
            }
        });

        sheet.pageSetup.horizontalCentered = false; 
        sheet.pageSetup.verticalCentered = false; 

        const buffer = await workbook.xlsx.writeBuffer();
        const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `Attendance_${cls}_${date.replace(/\//g, '-')}.xlsx`;
        link.click();
        
        Swal.fire('Success', 'Attendance saved and Excel downloaded.', 'success');
    }

    function updateHWSubjects() {
        const cls = document.getElementById('hwClass').value;
        const common = ["TELUGU", "HINDI", "ENGLISH", "MATHS", "SOCIAL STUDIES"];
        let subjects = (["Grade-6", "Grade-7", "Grade-8"].includes(cls)) ? [...common, "PHYSICS", "CHEMISTRY", "BIOLOGY"] : [...common, "SCIENCE"];
        document.getElementById('hwSubSelect').innerHTML = subjects.map(s => `<option value="${s}">${s}</option>`).join('');
    }

    function fetchExistingHW() {
        const date = document.getElementById('hwDate').value;
        const cls = document.getElementById('hwClass').value;
        const sub = document.getElementById('hwSubSelect').value;
        if(!date) return;
        db.ref(`homework/${date}/${cls}/${sub}`).once('value', (snap) => {
            document.getElementById('hwTask').value = snap.val() || "";
        });
    }

    function postHomework() {
        const date = document.getElementById('hwDate').value; 
        const cls = document.getElementById('hwClass').value;
        const sub = document.getElementById('hwSubSelect').value; 
        const task = document.getElementById('hwTask').value;
        if(!date || !task) return Swal.fire('Error', 'Fill details', 'error');
        db.ref(`homework/${date}/${cls}`).update({ [sub]: task, lastUpdated: new Date().toLocaleTimeString() }).then(() => Swal.fire('Updated!', 'Homework is live.', 'success'));
    }

    function clearSubject() {
        const date = document.getElementById('hwDate').value;
        const cls = document.getElementById('hwClass').value;
        const sub = document.getElementById('hwSubSelect').value;
        if(!date) return;
        Swal.fire({ title: 'Clear Task?', text: `Delete ${sub} for ${cls}?`, icon: 'warning', showCancelButton: true }).then((res) => {
            if(res.isConfirmed) {
                db.ref(`homework/${date}/${cls}/${sub}`).remove().then(() => {
                    document.getElementById('hwTask').value = "";
                    Swal.fire('Cleared', 'Task removed.', 'success');
                });
            }
        });
    }

    db.ref('announcement').on('value', (snap) => {
        const msg = snap.val(); const bar = document.getElementById('announcementBar');
        if(msg) { document.getElementById('announcementText').innerText = msg; bar.style.display = 'flex'; } 
        else { bar.style.display = 'none'; }
    });

    document.getElementById('hwDate').valueAsDate = new Date();
    updateHWSubjects();
</script>
</body>
</html>
