<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paramount School | Professional Attendance</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root { --forest: #006633; --gold: #ffd700; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 0; }
        
        header { 
            background: var(--forest); 
            color: white; 
            padding: 30px 5%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 20px;
        }
        .logo-img { height: 85px; width: auto; display: block; }
        .school-name { font-size: 2.2rem; font-weight: 900; margin: 0; white-space: nowrap; }

        .container { max-width: 500px; margin: 20px auto; padding: 15px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { color: var(--forest); text-align: center; border-bottom: 2px solid var(--gold); padding-bottom: 10px; }
        
        select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; margin-bottom: 15px; }
        .student-row { display: flex; justify-content: space-between; padding: 12px 5px; border-bottom: 1px solid #f0f0f0; }
        .present-toggle { width: 25px; height: 25px; accent-color: var(--forest); cursor: pointer; }

        .summary-report { background: #e8f5e9; padding: 20px; border-radius: 12px; margin-top: 25px; display: none; text-align: center; }
        .action-btn { border: none; padding: 15px; border-radius: 35px; width: 100%; font-weight: bold; font-size: 16px; cursor: pointer; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .excel-btn { background: #1D6F42; color: white; }
        .whatsapp-btn { background: #25D366; color: white; }
    </style>
</head>
<body>

<header>
    <img src="logo.png" alt="Logo" class="logo-img" onerror="this.style.display='none'">
    <div class="school-info">
    <h1 class="school-name">PARAMOUNT ENGLISH MEDIUM SCHOOL</h1>
    <p class="school-tagline">Teachers Official Attendance Portal</p>
        </div>
</header>

<div class="container">
    <div class="card">
        <h2>Mark Attendance</h2>
        
        <label style="font-size: 12px; font-weight: bold; color: #666;">Teacher Name</label>
        <select id="teacherName">
            <option value="">-- Select Teacher --</option>
            <option value="Mr. Shaik Ahmad">Mr. Shaik Ahmad</option>
            <option value="Ms. Geethika">Ms. Geethika</option>
        </select>

        <label style="font-size: 12px; font-weight: bold; color: #666;">Class</label>
        <select id="classSelect" onchange="generateList()">
            <option value="">-- Choose Class --</option>
            <option value="10th-A">10th Grade - A</option>
            <option value="9th-B">9th Grade - B</option>
        </select>

        <div id="listContainer"></div>

        <div id="reportSection" class="summary-report">
            <button class="action-btn excel-btn" onclick="exportToExcel()">
                <i class="fas fa-file-excel"></i> 1. Download Professional Excel
            </button>
            <button class="action-btn whatsapp-btn" onclick="openWhatsApp()">
                <i class="fab fa-whatsapp"></i> 2. Send to Correspondent
            </button>
        </div>
    </div>
</div>

<script>
const schoolData = {
    "10th-A": ["Shaik Tauseef Ali", "Rahul Sharma", "Zoya Khan", "Abhishek Das"],
    "9th-B": ["Shaik Minhaj Ali", "Sana Khan", "Aryan Raj"]
};

function generateList() {
    const cls = document.getElementById('classSelect').value;
    const listDiv = document.getElementById('listContainer');
    const reportBox = document.getElementById('reportSection');
    listDiv.innerHTML = "";
    if (schoolData[cls]) {
        schoolData[cls].forEach(name => {
            listDiv.innerHTML += `<div class="student-row"><span class="name-text" style="font-weight: 600;">${name}</span><input type="checkbox" class="present-toggle" checked></div>`;
        });
        reportBox.style.display = "block";
    } else { reportBox.style.display = "none"; }
}

function exportToExcel() {
    const teacher = document.getElementById('teacherName').value;
    const cls = document.getElementById('classSelect').value;
    const dateFormatted = new Date().toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });

    if(!teacher || !cls) return alert("Select Teacher and Class First!");

    // Create Data Array with Professional Layout
    let data = [
        ["PARAMOUNT ENGLISH MEDIUM SCHOOL"],
        ["OFFICIAL ATTENDANCE REPORT"],
        [""],
        ["DATE:", dateFormatted, "", "TEACHER:", teacher],
        ["CLASS:", cls, "", "STATUS:", "FINALIZED"],
        [""],
        ["S.No", "STUDENT NAME", "STATUS", "REMARKS"]
    ];

    document.querySelectorAll('.student-row').forEach((row, index) => {
        const name = row.querySelector('.name-text').innerText;
        const status = row.querySelector('.present-toggle').checked ? "PRESENT" : "ABSENT";
        data.push([index + 1, name, status, ""]);
    });

    const ws = XLSX.utils.aoa_to_sheet(data);

    // Professional Formatting: Set Column Widths
    ws['!cols'] = [
        { wch: 8 },  // S.No
        { wch: 25 }, // Student Name
        { wch: 12 }, // Status
        { wch: 15 }  // Remarks
    ];

    // Merge Header Cells for School Name
    ws['!merges'] = [
        { s: { r: 0, c: 0 }, e: { r: 0, c: 3 } }, // Merge School Name row
        { s: { r: 1, c: 0 }, e: { r: 1, c: 3 } }  // Merge Subheader row
    ];

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Attendance");

    const filename = `Attendance_${cls}_${dateFormatted.replace(/ /g, '-')}.xlsx`;
    XLSX.writeFile(wb, filename);
}

function openWhatsApp() {
    const teacher = document.getElementById('teacherName').value;
    const cls = document.getElementById('classSelect').value;
    const msg = `*PARAMOUNT ATTENDANCE REPORT*%0A*Teacher:* ${teacher}%0A*Class:* ${cls}%0A_Excel report attached below._`;
    window.open(`https://wa.me/919550791538?text=${msg}`, '_blank');
}
</script>
</body>
</html>
