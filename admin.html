<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Dashboard | Paramount School</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Segoe+UI:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root { --forest: #006633; --gold: #ffd700; --danger: #c62828; --light: #f4f7f6; --sky: #2196f3; }
        * { box-sizing: border-box; } 
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding-bottom: 120px; overflow-x: hidden; }
        
        /* LOGIN SCREEN */
        .overlay-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--light); z-index: 100; display: flex; justify-content: center; align-items: center; padding: 15px; }
        .auth-box { background: white; padding: 40px 25px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 420px; border-bottom: 5px solid var(--forest); text-align: center; }
        .auth-header-row { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; margin-bottom: 25px; }
        .auth-logo { height: 75px; width: auto; }
        .auth-branding-text h2 { margin: 5px 0 0; font-family: 'Montserrat', sans-serif; font-size: 1.6rem; font-weight: 800; color: var(--forest); }
        .auth-branding-text p { margin: 0; font-size: 0.75rem; font-weight: 700; color: var(--gold); text-transform: uppercase; }
        .auth-input { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #eee; margin-bottom: 15px; text-align: center; font-size: 16px; outline: none; }
        .auth-links { margin-top: 15px; display: flex; flex-direction: column; gap: 10px; }
        .auth-links span { color: #666; font-size: 13px; text-decoration: underline; cursor: pointer; font-weight: 600; }

        /* HEADER BRANDING */
        header { background: var(--forest); color: white; padding: 20px 3%; box-shadow: 0 4px 10px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 50; }
        .header-content { display: flex; align-items: center; justify-content: center; max-width: 1400px; margin: 0 auto; width: 100%; gap: 15px; }
        .header-logo { height: clamp(50px, 8vw, 65px); width: auto; }
        .school-branding { display: flex; flex-direction: column; line-height: 1; text-align: left; }
        .school-name-main { font-family: 'Montserrat', sans-serif; font-size: clamp(1.1rem, 3vw, 2.2rem); font-weight: 800; letter-spacing: 1px; }
        .school-name-sub { font-family: 'Montserrat', sans-serif; font-size: clamp(0.55rem, 1.5vw, 0.9rem); color: var(--gold); font-weight: 700; text-transform: uppercase; }
        .divider-gold { width: 3px; height: 40px; background-color: var(--gold); flex-shrink: 0; margin: 0 5px; border-radius: 5px; }
        .admin-portal-text { font-family: 'Montserrat', sans-serif; font-size: clamp(0.9rem, 2.5vw, 2.2rem); font-weight: 800; text-transform: uppercase; }

        /* CARDS & FILTERS */
        .container { max-width: 900px; margin: 20px auto; padding: 0 10px; }
        .card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-bottom: 20px; border-top: 6px solid var(--forest); }
        h3 { color: var(--forest); margin: 0 0 15px; font-size: 1.1rem; border-bottom: 1px solid #eee; padding-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .filter-row { display: flex; gap: 8px; align-items: center; margin-top: 10px; width: 100%; }
        .filter-row input, .filter-row select { flex: 1.5; padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 13px; height: 44px; outline: none; }
        .btn-attract { background: linear-gradient(135deg, var(--forest), #004d26); color: white; padding: 0 15px; border-radius: 50px; font-weight: bold; border: 2px solid var(--gold); cursor: pointer; font-size: 13px; display: inline-flex; align-items: center; justify-content: center; gap: 6px; height: 44px; flex: 1; box-shadow: 0 5px 15px rgba(0,0,0,0.1); transition: 0.3s; }
        
        /* MOBILE OPTIMIZED TABLE */
        .table-container { width: 100%; overflow: hidden; margin-top: 15px; border-radius: 10px; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background: var(--forest); color: white; padding: 8px 4px; text-transform: uppercase; font-size: 9px; text-align: center; }
        td { padding: 10px 4px; border-bottom: 1px solid #eee; text-align: center; font-size: 11px; word-break: break-word; }
        th:nth-child(1), td:nth-child(1) { width: 40%; text-align: left; padding-left: 8px; font-weight: 700; }
        th:nth-child(2), td:nth-child(2) { width: 12%; }
        th:nth-child(3), td:nth-child(3) { width: 12%; }
        th:nth-child(4), td:nth-child(4) { width: 16%; }
        th:nth-child(5), td:nth-child(5) { width: 20%; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; padding: 15px; background: white; display: flex; justify-content: center; z-index: 50; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); }
        .btn-premium { background: linear-gradient(135deg, #004d26, var(--forest)); color: white; padding: 14px 30px; border-radius: 60px; font-weight: 800; text-decoration: none; font-size: 14px; border: 2px solid var(--gold); transition: 0.3s; display: inline-flex; align-items: center; gap: 10px; box-shadow: 0 8px 20px rgba(0, 102, 51, 0.3); }
    </style>
</head>

</div>

    db.ref('admin/password').on('value', snap => { if(snap.exists()) currentAdminPass = snap.val(); });

    function toggleFilterInputs() { 
        const type = document.getElementById('viewType').value; 
        document.getElementById('monthlyFilter').style.display = (type === 'monthly') ? 'flex' : 'none'; 
        document.getElementById('dailyFilter').style.display = (type === 'daily') ? 'flex' : 'none';

    function postAnn() { 
        const msg = document.getElementById('annMsg').value;
        if(!msg.trim()) return Swal.fire('Error', 'Empty message', 'warning');
        db.ref('announcement').set(msg).then(() => Swal.fire('Published!', 'Announcement live.', 'success'));
    }
    
    function clearAnn() { db.ref('announcement').remove().then(() => { document.getElementById('annMsg').value = ""; Swal.fire('Cleared', 'Announcement removed.', 'info'); }); }

    // THE FIX: DYNAMIC CALCULATION ENGINE
    async function viewAtt() {
        const cls = document.getElementById('clsPick').value;
        const type = document.getElementById('viewType').value;
        const body = document.getElementById('attBody');
        const head = document.getElementById('tableHead');
        
        if(!cls) return Swal.fire('Error', 'Pick a class', 'info');
        body.innerHTML = '<tr><td colspan="5">Loading...</td></tr>';

        if(type === 'daily') {
            const date = document.getElementById('dateInput').value;
            if(!date) return Swal.fire('Error', 'Pick Date', 'warning');
            head.innerHTML = `<tr><th>Student Name</th><th colspan="4">Status</th></tr>`;
            
            db.ref(`daily_attendance/${date}/${cls}`).once('value', (snap) => {
                const data = snap.val() || {};
                body.innerHTML = studentDataMaster[cls].map(n => {
                    let text = '-', color = '#888';
                    if(data[n] === true) { text = 'PRESENT'; color = 'green'; }
                    else if(data[n] === false) { text = 'ABSENT'; color = 'red'; }
                    return `<tr><td>${n}</td><td colspan="4" style="color:${color}; font-weight:bold">${text}</td></tr>`;
                }).join('');
            });
            
        } else {
            // MONTHLY AND OVERALL - PULLS FROM TEACHER SUBMISSIONS DIRECTLY
            head.innerHTML = `<tr><th>Student Name</th><th>P</th><th>A</th><th>Tot</th><th>%</th></tr>`;
            const m = document.getElementById('monthInput').value;
            if(type === 'monthly' && !m) return Swal.fire('Error', 'Pick Month', 'warning');

            db.ref(`daily_attendance`).once('value', (snap) => {
                const allData = snap.val() || {};
                const stats = {};
                studentDataMaster[cls].forEach(n => stats[n] = { p: 0, t: 0 });

                Object.keys(allData).forEach(date => {
                    if(type === 'monthly' && !date.startsWith(m)) return; // Filter by month if needed
                    const classData = allData[date][cls];
                    if(classData) {
                        Object.keys(classData).forEach(student => {
                            if(stats[student] !== undefined) {
                                stats[student].t++;
                                if(classData[student] === true) stats[student].p++;
                            }
                        });
                    }
                });

                body.innerHTML = studentDataMaster[cls].map(n => {
                    const p = stats[n].p; const t = stats[n].t; const a = t - p;
                    const pct = t > 0 ? Math.round((p/t)*100) : 0;
                    return `<tr><td>${n}</td><td>${p}</td><td>${a}</td><td>${t}</td><td>${pct}%</td></tr>`;
                }).join('');
            });
        }
    }

    async function exportToExcel() {
        const cls = document.getElementById('clsPick').value;
        const m = document.getElementById('monthInput').value;
        if(!cls || !m) return Swal.fire('Error', 'Pick Class & Month', 'info');
        
        Swal.fire({title: 'Processing...', text: 'Generating Excel Report.', icon: 'info', showConfirmButton: false});

        const workbook = new ExcelJS.Workbook();
        const sheet = workbook.addWorksheet('Monthly Report');
        
        sheet.mergeCells('A1:F3');
        const h = sheet.getCell('A1'); h.value = 'PARAMOUNT ENGLISH MEDIUM SCHOOL';
        h.fill = { type:'pattern', pattern:'solid', fgColor:{argb:'006633'} }; h.font = {color:{argb:'FFFFFF'}, bold:true, size:16};
        h.alignment = {vertical:'middle', horizontal:'center'};

        sheet.mergeCells('A4:F5');
        const subH = sheet.getCell('A4');
        subH.value = `MONTHLY ATTENDANCE SUMMARY - ${m} (${cls})`;
        subH.fill = { type:'pattern', pattern:'solid', fgColor:{argb:'FFD700'} }; subH.font = {color:{argb:'000000'}, bold:true};
        subH.alignment = {vertical:'middle', horizontal:'center'};

        sheet.getRow(7).values = ['S.No', 'Student Name', 'Present', 'Absent', 'Total', '%'];
        sheet.getRow(7).font = {bold:true};
        
        // DYNAMIC EXCEL CALCULATION
        const snap = await db.ref(`daily_attendance`).once('value');
        const allData = snap.val() || {};
        const stats = {};
        studentDataMaster[cls].forEach(n => stats[n] = { p: 0, t: 0 });

        Object.keys(allData).forEach(date => {
            if(date.startsWith(m)) {
                const classData = allData[date][cls];
                if(classData) {
                    Object.keys(classData).forEach(student => {
                        if(stats[student] !== undefined) {
                            stats[student].t++;
                            if(classData[student] === true) stats[student].p++;
                        }
                    });
                }
            }
        });

        studentDataMaster[cls].forEach((n, i) => {
            const p = stats[n].p; const t = stats[n].t; const a = t - p;
            const pct = t > 0 ? Math.round((p/t)*100) + '%' : '0%';
            sheet.addRow([i+1, n, p, a, t, pct]);
        });
        
        sheet.getColumn(2).width = 30;
        const buf = await workbook.xlsx.writeBuffer();
        saveAs(new Blob([buf]), `Paramount_${cls}_${m}.xlsx`);
        Swal.close();
    }

    async function secureReset(mode) {
        const { value: pass } = await Swal.fire({ title: 'Authentication', text: 'Enter Admin Password to Backup & Clear.', input: 'password', showCancelButton: true });
        if(pass === "Ahmad@07") {
            Swal.fire({title: 'Processing...', text: 'Generating spreadsheet backup.', icon: 'info', showConfirmButton: false});

            // GENERATE BRANDED BACKUP
            const workbook = new ExcelJS.Workbook();
            const sheet = workbook.addWorksheet('System Backup');
            sheet.mergeCells('A1:F3');
            const h = sheet.getCell('A1'); h.value = 'PARAMOUNT ENGLISH MEDIUM SCHOOL';
            h.fill = { type:'pattern', pattern:'solid', fgColor:{argb:'006633'} }; h.font = {color:{argb:'FFFFFF'}, bold:true, size:16};
            h.alignment = {vertical:'middle', horizontal:'center'};

            sheet.mergeCells('A4:F5');
            const subH = sheet.getCell('A4');
            subH.value = mode === 'master' ? 'FULL SYSTEM BACKUP' : 'MONTHLY DATA BACKUP';
            subH.fill = { type:'pattern', pattern:'solid', fgColor:{argb:'FFD700'} }; subH.font = {color:{argb:'000000'}, bold:true};
            subH.alignment = {vertical:'middle', horizontal:'center'};

            sheet.getRow(7).values = ['Class', 'Student Name', 'Present', 'Absent', 'Total', '%'];
            sheet.getRow(7).font = {bold:true};

            const snap = await db.ref('daily_attendance').once('value');
            const allData = snap.val() || {};
            const monthFilter = document.getElementById('monthInput').value;

            Object.keys(studentDataMaster).forEach(c => {
                studentDataMaster[c].forEach(n => {
                    let p=0, t=0;
                    Object.keys(allData).forEach(date => {
                        if(mode === 'monthly' && !date.startsWith(monthFilter)) return;
                        if(allData[date][c] && allData[date][c][n] !== undefined) {
                            t++;
                            if(allData[date][c][n] === true) p++;
                        }
                    });
                    sheet.addRow([c, n, p, t-p, t, t>0?Math.round((p/t)*100)+'%':'0%']);
                });
            });

            sheet.getColumn(2).width = 30;
            const buffer = await workbook.xlsx.writeBuffer();
            saveAs(new Blob([buffer]), `Paramount_Backup_${new Date().toISOString().slice(0,10)}.xlsx`);

            // WIPE DATABASE AFTER DOWNLOAD
            if(mode === 'master') { 
                await db.ref('daily_attendance').remove(); 
            } else {
                if(!monthFilter) { Swal.fire('Error', 'Pick Month to reset first', 'error'); return; }
                const updates = {};
                Object.keys(allData).forEach(date => {
                    if(date.startsWith(monthFilter)) updates[`daily_attendance/${date}`] = null;
                });
                await db.ref().update(updates);
            }
            
            Swal.fire('Complete!', 'Database cleared and backed up successfully.', 'success');
        } else if (pass) {
            Swal.fire('Error', 'Incorrect Password', 'error');
        }
    }
</script>
