<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Dashboard | Paramount School</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Segoe+UI:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root { --forest: #006633; --gold: #ffd700; --danger: #c62828; --light: #f4f7f6; }
        * { box-sizing: border-box; } 
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding-bottom: 120px; overflow-x: hidden; }
        
        /* LOGIN SCREEN */
        .overlay-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--light); z-index: 9999; display: flex; justify-content: center; align-items: center; padding: 15px; }
        .auth-box { background: white; padding: 40px 25px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 400px; border-bottom: 5px solid var(--forest); position: relative; text-align: center; }
        .secure-icon { font-size: 50px; color: var(--forest); margin: 0 auto 15px auto; display: block; }
        .auth-title { color: var(--forest); margin: 0; font-family: 'Montserrat', sans-serif; font-size: 1.5rem; font-weight: 800; }
        .auth-input { width: 100%; max-width: 320px; padding: 12px; border-radius: 10px; border: 2px solid #eee; margin: 20px auto; text-align: center; font-size: 16px; outline: none; display: block; }
        
        /* HEADER & BRANDING BOX */
        header { background: var(--forest); color: white; padding: 20px 3%; box-shadow: 0 4px 10px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; }
        .header-content { display: flex; align-items: center; justify-content: flex-start; max-width: 1400px; margin: 0 auto; width: 100%; }
        
        /* LOGO & ICON COMBINED IN BOX (Left Corner) */
        .admin-access-box { 
            background: rgba(255, 255, 255, 0.1); 
            padding: 8px 18px; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            border: 1px solid rgba(255, 215, 0, 0.3); 
        }
        .header-logo { height: 50px; width: auto; flex-shrink: 0; }
        .shield-icon { color: var(--gold); font-size: 1.3rem; }
        .school-text { display: flex; flex-direction: column; line-height: 1.1; white-space: nowrap; }
        .school-name-main { font-family: 'Montserrat', sans-serif; font-size: clamp(1rem, 3vw, 1.4rem); font-weight: 800; }
        .admin-label { font-family: 'Montserrat', sans-serif; font-size: 0.7rem; color: var(--gold); font-weight: 700; text-transform: uppercase; margin-top: 2px; }

        /* DASHBOARD CONTENT */
        .container { max-width: 850px; margin: 30px auto; padding: 0 15px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-bottom: 25px; border-top: 6px solid var(--forest); }
        h3 { color: var(--forest); margin: 0 0 20px; font-size: 1.3rem; border-bottom: 1px solid #eee; padding-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        
        .btn-attract { background: linear-gradient(135deg, var(--forest), #004d26); color: white; padding: 14px 35px; border-radius: 50px; font-weight: bold; border: 2px solid rgba(255, 215, 0, 0.3); cursor: pointer; font-size: 14px; transition: 0.3s; box-shadow: 0 5px 15px rgba(0, 102, 51, 0.3); display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-attract:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0, 102, 51, 0.5); border-color: var(--gold); }
        .btn-attract.danger { background: linear-gradient(135deg, #d32f2f, #b71c1c); }
        .btn-attract.warning { background: linear-gradient(135deg, #fb8c00, #ef6c00); }
        
        .class-select { flex: 1; min-width: 150px; padding: 12px; border-radius: 10px; border: 2px solid #eee; font-size: 15px; outline: none; }
        .table-container { width: 100%; overflow-x: auto; border-radius: 10px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; min-width: 500px; }
        th { background: var(--forest); color: white; text-transform: uppercase; padding: 12px 10px; font-size: 11px; font-weight: 800; text-align: center; }
        th:first-child { border-top-left-radius: 10px; text-align: left; }
        th:last-child { border-top-right-radius: 10px; }
        td { padding: 12px 10px; text-align: center; border-bottom: 1px solid #eee; font-size: 13px; }
        td:first-child { text-align: left; font-weight: 600; }

        .status-p { color: #2e7d32; font-weight: 800; }
        .status-a { color: #c62828; font-weight: 800; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; padding: 25px 0; background: white; display: flex; justify-content: center; z-index: 1000; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div id="loginScreen" class="overlay-screen">
    <div class="auth-box">
        <i class="fas fa-user-shield secure-icon"></i>
        <h2 class="auth-title">Admin Access</h2>
        <input type="password" id="adminPass" class="auth-input" placeholder="Admin Password">
        <button onclick="login()" class="btn-attract" style="width:100%;">Unlock Dashboard <i class="fas fa-unlock-alt"></i></button>
        <div style="margin-top:15px;">
            <span style="color:#666; font-size:13px; text-decoration:underline; cursor:pointer;" onclick="window.location.href='index.html'">Return to Home</span>
        </div>
    </div>
</div>

<div id="mainApp" style="display:none;">
    <header>
        <div class="header-content">
            <div class="admin-access-box">

                <div class="school-text">
                    <span class="school-name-main">PARAMOUNT</span>
                    <span class="admin-label">Admin Dashboard</span>
                </div>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="card" style="border-top-color: var(--gold);">
            <h3><i class="fas fa-bullhorn"></i> School Announcement</h3>
            <textarea id="annMsg" style="width:100%; height:110px; padding:15px; border-radius:10px; border:2px solid #eee; outline:none; margin-bottom:20px; resize:none;" placeholder="Type broadcast message for teachers..."></textarea>
            <div style="display:flex; gap:12px;">
                <button onclick="postAnn()" class="btn-attract">Publish Now <i class="fas fa-check-circle"></i></button>
                <button onclick="clearAnn()" style="background:#eee; color:#666; border:none; padding:14px 25px; border-radius:50px; font-weight:bold; cursor:pointer;">Clear</button>
            </div>
        </div>

        <div class="card">
            <h3><i class="fas fa-calendar-check"></i> Attendance Monitoring</h3>
            <div style="display:flex; flex-direction:column; gap:15px; margin-bottom:25px;">
                <div style="display:flex; gap:10px; flex-wrap:wrap;">
                    <select id="clsPick" class="class-select">
                        <option value="">-- Choose Class --</option>
                        <option value="Pre-KG">Pre-KG</option><option value="KG-1">KG-1</option><option value="KG-2">KG-2</option>
                        <option value="Grade-1">Grade-1</option><option value="Grade-2">Grade-2</option><option value="Grade-3">Grade-3</option>
                        <option value="Grade-4">Grade-4</option><option value="Grade-5">Grade-5</option><option value="Grade-6">Grade-6</option>
                        <option value="Grade-7">Grade-7</option><option value="Grade-8">Grade-8</option>
                    </select>
                    <input type="month" id="monthInput" class="auth-input" style="margin:0; flex:1;">
                </div>
                <div style="display:flex; gap:10px;">
                    <button onclick="viewAtt()" class="btn-attract" style="flex:1;">View Report <i class="fas fa-file-invoice"></i></button>
                    <button onclick="downloadFilteredReport()" id="dlBtn" class="btn-attract warning" style="display:none; flex:1;"><i class="fas fa-file-excel"></i> Export Excel</button>
                </div>
            </div>
            <div class="table-container">
                <table id="resultsTable">
                    <thead><tr><th>Student</th><th>P</th><th>A</th><th>Total</th><th>%</th></tr></thead>
                    <tbody id="attBody"></tbody>
                </table>
            </div>
        </div>

        <div class="card" style="border-top-color: var(--danger);">
            <h3><i class="fas fa-tools"></i> Maintenance</h3>
            <button onclick="resetAttendanceData()" class="btn-admin danger" style="width:100%; border-radius:50px; padding:15px; background:linear-gradient(135deg, #d32f2f, #b71c1c); color:white; font-weight:bold; border:none; cursor:pointer;">Master Database Reset</button>
        </div>
    </div>

    <div class="bottom-nav">
        <button onclick="window.location.href='attendance.html'" class="btn-attract" style="width: 90%; max-width: 400px; background: #2196f3;">
            <i class="fas fa-arrow-left"></i> Open Teacher Portal
        </button>
    </div>
</div>

    async function login() {
        const snap = await db.ref('admin/password').once('value');
        const correct = snap.val() || "Ahmad@07";
        if(document.getElementById('adminPass').value === correct) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
        } else { Swal.fire('Error', 'Incorrect Password', 'error'); }
    }

    function postAnn() { db.ref('announcement').set(document.getElementById('annMsg').value).then(() => Swal.fire('Published!', '', 'success')); }
    function clearAnn() { db.ref('announcement').remove().then(() => { document.getElementById('annMsg').value = ""; Swal.fire('Cleared!', '', 'info'); }); }

    async function viewAtt() {
        const cls = document.getElementById('clsPick').value;
        const month = document.getElementById('monthInput').value;
        if(!cls || !month) return Swal.fire('Error', 'Select Class & Month', 'info');
        
        const body = document.getElementById('attBody');
        body.innerHTML = '<tr><td colspan="5">Loading...</td></tr>';

        db.ref(`attendance/${cls}/students`).once('value', (snap) => {
            const data = snap.val(); body.innerHTML = "";
            if(!data) { document.getElementById('dlBtn').style.display = 'none'; return body.innerHTML = '<tr><td colspan="5">No data</td></tr>'; }
            document.getElementById('dlBtn').style.display = 'inline-flex';
            for(let name in data) {
                const mData = (data[name].months && data[name].months[month]) ? data[name].months[month] : {present:0, total:0};
                const a = mData.total - mData.present;
                const pct = mData.total > 0 ? Math.round((mData.present/mData.total)*100) : 0;
                body.innerHTML += `<tr><td>${name}</td><td>${mData.present}</td><td>${a}</td><td>${mData.total}</td><td>${pct}%</td></tr>`;
            }
        });
    }

    async function downloadFilteredReport() {
        const cls = document.getElementById('clsPick').value;
        const month = document.getElementById('monthInput').value;
        const workbook = new ExcelJS.Workbook();
        const sheet = workbook.addWorksheet('Report');
        sheet.columns = [{header:'STUDENT',key:'n',width:30},{header:'P',key:'p',width:10},{header:'A',key:'a',width:10},{header:'TOTAL',key:'t',width:10}];
        document.querySelectorAll('#attBody tr').forEach(r => sheet.addRow({n:r.cells[0].innerText, p:r.cells[1].innerText, a:r.cells[2].innerText, t:r.cells[3].innerText}));
        const buffer = await workbook.xlsx.writeBuffer();
        const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
        const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = `Paramount_${cls}_${month}.xlsx`; link.click();
    }

    async function resetAttendanceData() {
        const confirm = await Swal.fire({ title: 'MASTER RESET', text: "Delete all attendance logs?", icon: 'warning', showCancelButton: true });
        if(confirm.isConfirmed) {
            const { value: pw } = await Swal.fire({ title: 'Admin Password', input: 'password' });
            if(pw === "Ahmad@07") { db.ref('attendance').remove(); db.ref('daily_attendance').remove(); Swal.fire('Success', 'Cleared', 'success'); }
        }
    }

    document.getElementById('monthInput').value = new Date().toISOString().slice(0, 7);
