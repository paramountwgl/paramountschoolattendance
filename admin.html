<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Dashboard | Paramount School</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Segoe+UI:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root { --forest: #006633; --gold: #ffd700; --danger: #c62828; --light: #f4f7f6; }
        * { box-sizing: border-box; } 
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding-bottom: 120px; overflow-x: hidden; }
        
        .overlay-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--light); z-index: 9999; display: flex; justify-content: center; align-items: center; padding: 15px; }
        .auth-box { background: white; padding: 40px 25px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 400px; border-bottom: 5px solid var(--forest); position: relative; text-align: center; }
        .auth-logo-corner { position: absolute; top: 20px; left: 20px; height: 45px; width: auto; }
        .secure-icon { font-size: 50px; color: var(--forest); margin: 0 auto 15px auto; display: block; }
        .auth-title { color: var(--forest); margin: 0; font-family: 'Montserrat', sans-serif; font-size: 1.5rem; font-weight: 800; }
        .auth-input { width: 100%; max-width: 320px; padding: 12px; border-radius: 10px; border: 2px solid #eee; margin: 20px auto; text-align: center; font-size: 16px; outline: none; display: block; }
        
        header { background: var(--forest); color: white; padding: 20px 3%; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header-content { display: flex; align-items: center; justify-content: center; gap: 10px; max-width: 1400px; margin: 0 auto; width: 100%; }
        .header-logo { height: 65px; width: auto; flex-shrink: 0; }
        .school-text { display: flex; flex-direction: column; line-height: 1.1; white-space: nowrap; margin-left: 5px; }
        .school-name-main { font-family: 'Montserrat', sans-serif; font-size: clamp(1.2rem, 3.5vw, 2.2rem); font-weight: 800; }
        .school-name-sub { font-family: 'Montserrat', sans-serif; font-size: clamp(0.6rem, 2vw, 0.9rem); color: var(--gold); font-weight: 700; }
        .admin-portal-title { 
            font-family: 'Montserrat', sans-serif; font-size: clamp(1.2rem, 3.5vw, 2.2rem); 
            font-weight: 800; color: white; text-transform: uppercase; 
            border-left: 3px solid var(--gold); padding-left: 15px; margin-left: 15px;
        }

        .container { max-width: 850px; margin: 30px auto; padding: 0 15px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-bottom: 25px; border-top: 6px solid var(--forest); }
        h3 { color: var(--forest); margin: 0 0 20px; font-size: 1.3rem; border-bottom: 1px solid #eee; padding-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        
        .btn-attract { 
            background: linear-gradient(135deg, var(--forest), #004d26); 
            color: white; padding: 14px 35px; border-radius: 50px; 
            font-weight: bold; border: 2px solid rgba(255, 215, 0, 0.3); 
            cursor: pointer; font-size: 14px; transition: 0.3s; 
            box-shadow: 0 5px 15px rgba(0, 102, 51, 0.3);
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-attract:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0, 102, 51, 0.5); border-color: var(--gold); }
        .btn-attract.danger { background: linear-gradient(135deg, #d32f2f, #b71c1c); border-color: rgba(255,255,255,0.2); }
        .btn-attract.warning { background: linear-gradient(135deg, #fb8c00, #ef6c00); border-color: rgba(255,255,255,0.2); }
        
        .class-select { flex: 1; min-width: 200px; padding: 12px; border-radius: 10px; border: 2px solid #eee; font-size: 15px; outline: none; }

        .table-container { width: 100%; overflow: hidden; border-radius: 10px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; table-layout: fixed; }
        th { 
            background: var(--forest); color: white; text-transform: uppercase; 
            padding: 12px 2px; font-size: 11px; font-weight: 800;
        }
        th:first-child { border-top-left-radius: 10px; text-align: left; padding-left: 10px; width: 45%; }
        th:last-child { border-top-right-radius: 10px; }
        
        td { padding: 12px 2px; text-align: center; border-bottom: 1px solid #eee; font-size: 12px; }
        td:first-child { text-align: left; padding-left: 10px; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; padding: 25px 0; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); display: flex; justify-content: center; z-index: 1000; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div id="loginScreen" class="overlay-screen">
    <div class="auth-box">
        <img src="logo.png" class="auth-logo-corner" onerror="this.style.display='none'">
        <i class="fas fa-user-shield secure-icon"></i>
        <h2 class="auth-title">Admin Access</h2>
        <input type="password" id="adminPass" class="auth-input" placeholder="Admin Password">
        <button onclick="login()" class="btn-attract" style="width:100%;">Unlock Dashboard</button>
        <div style="margin-top:15px; display:flex; flex-direction:column; gap:8px;">
            <span style="color:#666; font-size:13px; text-decoration:underline; cursor:pointer;" onclick="window.location.href='index.html'">Cancel & Return</span>
            <span style="color:#666; font-size:13px; text-decoration:underline; cursor:pointer;" onclick="openRecovery()">Forgot Password?</span>
        </div>
    </div>
</div>

<div id="recoveryScreen" class="overlay-screen" style="display:none;">
    <div class="auth-box" style="border-bottom-color: var(--gold);">
        <i class="fas fa-key secure-icon" style="color: var(--gold);"></i>
        <h2 class="auth-title">Password Reset</h2>
        <input type="password" id="masterKey" class="auth-input" placeholder="Enter Master Key">
        <input type="password" id="newPass" class="auth-input" placeholder="New Admin Password">
        <button onclick="recoverPass()" class="btn-attract" style="width:100%;">Update Password</button>
        <span style="margin-top:15px; display:block; cursor:pointer; text-decoration:underline; font-size:13px;" onclick="closeRecovery()">Back to Login</span>
    </div>
</div>

<div id="mainApp" style="display:none;">
    <header>
        <div class="header-content">
            <img src="logo.png" class="header-logo" onerror="this.style.display='none'">
            <div class="school-text">
                <span class="school-name-main">PARAMOUNT</span>
                <span class="school-name-sub">ENGLISH MEDIUM SCHOOL</span>
            </div>
            <h1 class="admin-portal-title">Admin Portal</h1>
        </div>
    </header>

    <div class="container">
        <div class="card" style="border-top-color: var(--gold);">
            <h3><i class="fas fa-bullhorn"></i> Announcement Control</h3>
            <textarea id="annMsg" style="width:100%; height:110px; padding:15px; border-radius:10px; border:2px solid #eee; outline:none; margin-bottom:20px; resize:none;" placeholder="Type school announcement here..."></textarea>
            <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap;">
                <button onclick="postAnn()" class="btn-attract">Publish Now</button>
                <button onclick="clearAnn()" style="background:#eee; color:#666; border:none; padding:14px 25px; border-radius:50px; font-weight:bold; cursor:pointer;">Clear Message</button>
            </div>
        </div>

        <div class="card">
            <h3><i class="fas fa-calendar-check"></i> Attendance Monitoring</h3>
            <div style="display:flex; align-items:center; justify-content:center; gap:10px; width:100%; margin-bottom:25px; flex-wrap:wrap;">
                <select id="clsPick" class="class-select">
                    <option value="">-- Choose Class --</option>
                    <option value="Pre-KG">Pre-KG (Diamond)</option><option value="KG-1">KG-1 (Ruby)</option><option value="KG-2">KG-2 (Amber)</option>
                    <option value="Grade-1">Grade-1 (Opal)</option><option value="Grade-2">Grade-2 (Emerald)</option><option value="Grade-3">Grade-3 (Crystal)</option>
                    <option value="Grade-4">Grade-4 (Citrine)</option><option value="Grade-5">Grade-5 (Moonstone)</option><option value="Grade-6">Grade-6 (Alluri)</option>
                    <option value="Grade-7">Grade-7 (Kalam)</option><option value="Grade-8">Grade-8 (Bhagat)</option>
                </select>
                <button onclick="viewAtt()" class="btn-attract">View Report</button>
            </div>
            <div class="table-container">
                <table>
                    <thead><tr><th>Student</th><th>P</th><th>A</th><th>Total</th><th>%</th></tr></thead>
                    <tbody id="attBody"></tbody>
                </table>
            </div>
        </div>

        <div class="card" style="border-top-color: var(--danger);">
            <h3><i class="fas fa-tools"></i> Database Management</h3>
            <p style="font-size: 13px; color: #666; text-align: center; margin-bottom: 20px;">
                Choose a reset option. Monthly reset clears current month logs only.
            </p>
            <div style="display: flex; gap: 10px; flex-direction: column;">
                <button onclick="resetMonthlyData()" class="btn-attract warning" style="width: 100%;">
                    <i class="fas fa-calendar-minus"></i> Reset Current Month Only
                </button>
                <button onclick="resetAttendanceData()" class="btn-attract danger" style="width: 100%;">
                    <i class="fas fa-trash-alt"></i> Backup & Reset All Attendance
                </button>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <button onclick="window.location.href='index.html'" class="btn-attract" style="width: 90%; max-width: 400px;">
            <i class="fas fa-arrow-left"></i> Return to Attendance Portal
        </button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDRYk9KOK-ga0c88dnYMsAoifW2NJTd_Y8", databaseURL: "https://paramount-school-d55bc-default-rtdb.firebaseio.com", projectId: "paramount-school-d55bc" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function openRecovery() { document.getElementById('loginScreen').style.display='none'; document.getElementById('recoveryScreen').style.display='flex'; }
    function closeRecovery() { document.getElementById('recoveryScreen').style.display='none'; document.getElementById('loginScreen').style.display='flex'; }

    function login() {
        db.ref('admin/password').once('value', (snap) => {
            const savedPass = snap.val() || "Ahmad@07";
            if(document.getElementById('adminPass').value === savedPass) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
            } else { Swal.fire('Error', 'Incorrect Password', 'error'); }
        });
    }

    function recoverPass() {
        if(document.getElementById('masterKey').value === "PARAMOUNT@2026") {
            db.ref('admin/password').set(document.getElementById('newPass').value).then(() => {
                Swal.fire('Success', 'Password Updated!', 'success');
                closeRecovery();
            });
        } else { Swal.fire('Error', 'Invalid Master Key', 'error'); }
    }

    function viewAtt() {
        const cls = document.getElementById('clsPick').value;
        const body = document.getElementById('attBody');
        if(!cls) return;
        body.innerHTML = '<tr><td colspan="5" style="text-align:center;">Loading...</td></tr>';
        db.ref(`attendance/${cls}/students`).once('value', (snap) => {
            const data = snap.val(); body.innerHTML = "";
            for(let name in data) {
                const p = data[name].presentDays || 0; const t = data[name].totalDays || 0;
                body.innerHTML += `<tr><td>${name}</td><td>${p}</td><td>${t-p}</td><td>${t}</td><td>${t>0?Math.round((p/t)*100):0}%</td></tr>`;
            }
        });
    }

    function postAnn() { db.ref('announcement').set(document.getElementById('annMsg').value).then(() => Swal.fire('Published', '', 'success')); }
    function clearAnn() { db.ref('announcement').remove().then(() => { document.getElementById('annMsg').value = ""; Swal.fire('Cleared', '', 'info'); }); }

    /* RESET MONTHLY DATA LOGIC */
    async function resetMonthlyData() {
        const currentMonth = new Date().toISOString().slice(0, 7);
        const confirmResult = await Swal.fire({
            title: 'Confirm Monthly Reset',
            text: `Clear stats for ${currentMonth}? Yearly totals remain safe.`,
            icon: 'info',
            showCancelButton: true,
            confirmButtonText: 'Clear Month'
        });

        if (confirmResult.isConfirmed) {
            const { value: password } = await Swal.fire({
                title: 'Authorization',
                input: 'password',
                showCancelButton: true
            });

            if (password === "ParamountAdmin@2026") { //
                try {
                    Swal.fire({ title: 'Cleaning...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                    const snapshot = await db.ref('attendance').once('value');
                    const data = snapshot.val();
                    if (data) {
                        const updates = {};
                        Object.keys(data).forEach(cls => {
                            const students = data[cls].students;
                            if (students) Object.keys(students).forEach(name => {
                                updates[`attendance/${cls}/students/${name}/months/${currentMonth}`] = null;
                            });
                        });
                        await db.ref().update(updates);
                        Swal.fire('Success', `Logs for ${currentMonth} cleared.`, 'success');
                    }
                } catch (error) { Swal.fire('Error', error.message, 'error'); }
            } else if (password) { Swal.fire('Denied', 'Incorrect Password', 'error'); }
        }
    }

    /* MASTER RESET & BACKUP LOGIC */
    async function resetAttendanceData() {
        const confirmResult = await Swal.fire({
            title: 'WARNING: PERMANENT RESET',
            text: "This will delete all student records. A master backup file will be generated first.",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#d32f2f',
            confirmButtonText: 'Backup & Reset Now'
        });

        if (confirmResult.isConfirmed) {
            const { value: password } = await Swal.fire({
                title: 'Authorization Required',
                text: 'Enter Master Admin Password to proceed:',
                input: 'password',
                showCancelButton: true
            });

            if (password === "ParamountAdmin@2026") { //
                try {
                    Swal.fire({ title: 'Running Backup...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                    const snapshot = await db.ref('attendance').once('value');
                    const allData = snapshot.val();

                    if (allData) await generateMasterBackup(allData); //

                    await db.ref('attendance').remove(); //
                    Swal.fire('Success', 'Database cleared. Backup downloaded.', 'success');
                } catch (error) {
                    Swal.fire('Error', 'Reset failed: ' + error.message, 'error');
                }
            } else if (password) {
                Swal.fire('Denied', 'Incorrect Password', 'error');
            }
        }
    }

    async function generateMasterBackup(data) { //
        const workbook = new ExcelJS.Workbook();
        const sheet = workbook.addWorksheet('Attendance_Archive');
        sheet.columns = [
            { header: 'Class', key: 'class', width: 15 },
            { header: 'Student Name', key: 'name', width: 30 },
            { header: 'Present Days', key: 'present', width: 15 },
            { header: 'Total Days', key: 'total', width: 15 }
        ];

        Object.keys(data).forEach(className => {
            const students = data[className].students;
            if (students) {
                Object.keys(students).forEach(name => {
                    sheet.addRow({
                        class: className,
                        name: name,
                        present: students[name].presentDays || 0,
                        total: students[name].totalDays || 0
                    });
                });
            }
        });

        const buffer = await workbook.xlsx.writeBuffer();
        const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `Paramount_Archive_${new Date().toISOString().split('T')[0]}.xlsx`;
        link.click();
    }
</script>
</body>
</html>
