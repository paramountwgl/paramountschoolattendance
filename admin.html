<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Dashboard | Paramount School</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Segoe+UI:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root { --forest: #006633; --gold: #ffd700; --danger: #c62828; --light: #f4f7f6; --sky: #2196f3; }
        * { box-sizing: border-box; } 
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding-bottom: 120px; overflow-x: hidden; }
        
        /* LOGIN BOX */
        .overlay-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--light); z-index: 9999; display: flex; justify-content: center; align-items: center; padding: 15px; }
        .auth-box { background: white; padding: 40px 25px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 420px; border-bottom: 5px solid var(--forest); text-align: center; }
        .auth-header-row { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; margin-bottom: 25px; }
        .auth-logo { height: 75px; width: auto; }
        .auth-branding-text h2 { margin: 5px 0 0; font-family: 'Montserrat', sans-serif; font-size: 1.6rem; font-weight: 800; color: var(--forest); }
        .auth-branding-text p { margin: 0; font-size: 0.75rem; font-weight: 700; color: var(--gold); text-transform: uppercase; }
        .auth-input { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #eee; margin-bottom: 15px; text-align: center; font-size: 16px; outline: none; }
        .auth-links { margin-top: 15px; display: flex; flex-direction: column; gap: 10px; }
        .auth-links span { color: #666; font-size: 13px; text-decoration: underline; cursor: pointer; font-weight: 600; }

        /* HEADER BRANDING */
        header { background: var(--forest); color: white; padding: 20px 3%; box-shadow: 0 4px 10px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; }
        .header-content { display: flex; align-items: center; justify-content: center; max-width: 1400px; margin: 0 auto; width: 100%; gap: 15px; }
        .header-logo { height: clamp(50px, 8vw, 65px); width: auto; }
        .school-branding { display: flex; flex-direction: column; line-height: 1; text-align: left; }
        .school-name-main { font-family: 'Montserrat', sans-serif; font-size: clamp(1.1rem, 3vw, 2.2rem); font-weight: 800; letter-spacing: 1px; }
        .school-name-sub { font-family: 'Montserrat', sans-serif; font-size: clamp(0.55rem, 1.5vw, 0.9rem); color: var(--gold); font-weight: 700; text-transform: uppercase; }
        .divider-gold { width: 3px; height: 40px; background-color: var(--gold); flex-shrink: 0; margin: 0 5px; border-radius: 5px; }
        .admin-portal-text { font-family: 'Montserrat', sans-serif; font-size: clamp(0.9rem, 2.5vw, 2.2rem); font-weight: 800; text-transform: uppercase; }

        /* DASHBOARD UI */
        .container { max-width: 900px; margin: 20px auto; padding: 0 15px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-bottom: 20px; border-top: 6px solid var(--forest); }
        h3 { color: var(--forest); margin: 0 0 15px; font-size: 1.1rem; border-bottom: 1px solid #eee; padding-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        
        .btn-attract { background: linear-gradient(135deg, var(--forest), #004d26); color: white; padding: 12px 20px; border-radius: 50px; font-weight: bold; border: 2px solid var(--gold); cursor: pointer; font-size: 14px; transition: 0.3s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; width: 100%; margin-top: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .btn-view-report { background: linear-gradient(135deg, var(--sky), #1565c0); border-color: white; }
        .btn-attract.warning { background: linear-gradient(135deg, #fb8c00, #ef6c00); border-color: white; }
        .btn-attract.danger { background: linear-gradient(135deg, #d32f2f, #b71c1c); border-color: white; }

        /* MOBILE VIEW OPTIMIZATION */
        .table-container { width: 100%; margin-top: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { background: var(--forest); color: white; padding: 10px; text-transform: uppercase; font-size: 10px; text-align: center; }
        td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; font-size: 12px; }

        @media (max-width: 600px) {
            table, thead, tbody, th, td, tr { display: block; }
            thead tr { position: absolute; top: -9999px; left: -9999px; }
            tr { border: 1px solid #ddd; margin-bottom: 10px; border-radius: 10px; padding: 5px; background: #fafafa; }
            td { border: none; position: relative; padding-left: 50%; text-align: right; font-weight: bold; }
            td:before { position: absolute; left: 10px; width: 45%; padding-right: 10px; white-space: nowrap; text-align: left; font-weight: normal; color: #666; font-size: 10px; text-transform: uppercase; }
            td:nth-of-type(1):before { content: "Student"; }
            td:nth-of-type(2):before { content: "P"; }
            td:nth-of-type(3):before { content: "A"; }
            td:nth-of-type(4):before { content: "Total"; }
            td:nth-of-type(5):before { content: "Pct %"; }
        }

        .filter-row { display: flex; gap: 10px; align-items: center; margin-top: 10px; width: 100%; flex-wrap: wrap; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; padding: 15px; background: white; display: flex; justify-content: center; z-index: 1000; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); }
        .btn-premium { background: linear-gradient(135deg, #004d26, var(--forest)); color: white; padding: 14px 40px; border-radius: 60px; font-weight: 800; text-decoration: none; font-size: 14px; border: 2px solid var(--gold); transition: 0.3s; display: inline-flex; align-items: center; gap: 12px; box-shadow: 0 8px 20px rgba(0, 102, 51, 0.3); }
    </style>

</head>

</div>

            </div>

            <div id="dailyFilter" class="filter-row" style="display:none;">

            <button id="overallBtn" onclick="viewAtt()" class="btn-attract btn-view-report" style="width:100%;">View Overall Report <i class="fas fa-chart-line"></i></button>

            <div class="table-container"><table id="resultsTable"><thead id="tableHead"><tr><th>Student</th><th>P</th><th>A</th><th>Total</th><th>%</th></tr></thead><tbody id="attBody"></tbody></table></div>
        </div>

        <div class="card" style="border-top-color: var(--danger);">

            <div style="display: grid; gap: 10px;">
                <button onclick="secureReset('monthly')" class="btn-attract warning">Reset Monthly Stats (Auto-Backup)</button>
                <button onclick="secureReset('master')" class="btn-attract danger">Master Database Reset (Auto-Backup)</button>

        </div>
    </div>

    <div class="bottom-nav">
        <a href="index.html" class="btn-premium"><i class="fas fa-chalkboard-teacher"></i> Open Teacher Portal</a>
    </div>
</div>

    async function login() { const snap = await db.ref('admin/password').once('value'); const correct = snap.val() || "Ahmad@07"; if(document.getElementById('adminPass').value === correct) { document.getElementById('loginScreen').style.display='none'; document.getElementById('mainApp').style.display='block'; } else { Swal.fire('Error', 'Wrong Password', 'error'); } }
    function toggleFilterInputs() { const t = document.getElementById('viewType').value; document.getElementById('monthlyFilter').style.display = (t === 'monthly') ? 'flex' : 'none'; document.getElementById('dailyFilter').style.display = (t === 'daily') ? 'flex' : 'none'; document.getElementById('overallBtn').style.display = (t === 'total') ? 'block' : 'none'; }
    
    // PREMIUM EXCEL BACKUP ENGINE
    async function performBackup(backupTitle) {
        const workbook = new ExcelJS.Workbook();
        const sheet = workbook.addWorksheet('System Backup');
        const greenFill = { type: 'pattern', pattern: 'solid', fgColor: { argb: '006633' } };
        const goldFill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFD700' } };

        sheet.mergeCells('A1:F3');
        sheet.getCell('A1').value = 'PARAMOUNT ENGLISH MEDIUM SCHOOL';
        sheet.getCell('A1').fill = greenFill; sheet.getCell('A1').font = { color: { argb: 'FFFFFF' }, bold: true, size: 16 };
        sheet.getCell('A1').alignment = { vertical: 'middle', horizontal: 'center' };

        sheet.mergeCells('A4:F5');
        sheet.getCell('A4').value = backupTitle;
        sheet.getCell('A4').fill = goldFill; sheet.getCell('A4').font = { color: { argb: '000000' }, bold: true };
        sheet.getCell('A4').alignment = { vertical: 'middle', horizontal: 'center' };

        const headRow = sheet.getRow(7);
        headRow.values = ['Class', 'Student Name', 'Present', 'Absent', 'Total', 'Percentage'];
        headRow.eachCell(c => { c.font = {bold:true}; c.border = { top:{style:'thin'}, left:{style:'thin'}, bottom:{style:'thin'}, right:{style:'thin'} }; });

        const snap = await db.ref('attendance').once('value');
        const fullData = snap.val() || {};
        
        Object.keys(studentDataMaster).forEach(cls => {
            const classRef = fullData[cls] ? fullData[cls].students : {};
            studentDataMaster[cls].forEach(n => {
                let p=0, t=0;
                const studentMonths = classRef[n] ? classRef[n].months : {};
                Object.values(studentMonths).forEach(v => { p += v.present; t += v.total; });
                const row = sheet.addRow([cls, n, p, t-p, t, t > 0 ? Math.round(p/t*100) + '%' : '0%']);
                row.eachCell(c => { c.border = { top:{style:'thin'}, left:{style:'thin'}, bottom:{style:'thin'}, right:{style:'thin'} }; });
            });
        });

        sheet.getColumn(2).width = 30;
        const buffer = await workbook.xlsx.writeBuffer();
        saveAs(new Blob([buffer]), `Backup_${new Date().toLocaleDateString()}.xlsx`);
    }

    async function secureReset(mode) {
        const { value: pass } = await Swal.fire({ title: 'Confirm Reset', text: 'Enter Admin Pass to Backup & Clear.', input: 'password', showCancelButton: true });
        if(pass === "Ahmad@07") {
            Swal.fire('Generating Backup...', 'Please wait while we secure your data.', 'info');
            await performBackup(mode === 'master' ? 'FULL DATABASE BACKUP' : 'MONTHLY DATABASE BACKUP');
            
            if(mode === 'master') {
                db.ref('attendance').remove(); db.ref('daily_attendance').remove(); 
                Swal.fire('Wiped!', 'Database backed up and cleared.', 'success');
            } else {
                const m = document.getElementById('monthInput').value;
                if(!m) return Swal.fire('Error', 'Pick month first', 'error');
                const snap = await db.ref('attendance').once('value');
                const updates = {};
                if(snap.val()) Object.keys(snap.val()).forEach(c => { const st = snap.val()[c].students; if(st) Object.keys(st).forEach(n => updates[`attendance/${c}/students/${n}/months/${m}`] = null); });
                await db.ref().update(updates); 
                Swal.fire('Cleared!', `Data for ${m} backed up and removed.`, 'success');
            }
        } else if(pass) { Swal.fire('Error', 'Incorrect Password', 'error'); }
    }

    async function viewAtt() {
        const cls = document.getElementById('clsPick').value;
        const type = document.getElementById('viewType').value;
        const body = document.getElementById('attBody');
        if(!cls) return Swal.fire('Error', 'Pick a class', 'info');
        body.innerHTML = '<tr><td colspan="5">Loading...</td></tr>';
        
        const head = document.getElementById('tableHead');
        if(type === 'daily') {
            const date = document.getElementById('dateInput').value;
            head.innerHTML = `<tr><th>Student</th><th colspan="4">Status</th></tr>`;
            db.ref(`daily_attendance/${date}/${cls}`).once('value', (snap) => {
                const data = snap.val() || {};
                body.innerHTML = studentDataMaster[cls].map(n => `<tr><td>${n}</td><td colspan="4" style="color:${data[n] ? 'green':'red'}; font-weight:800">${data[n] === true ? 'PRESENT' : (data[n] === false ? 'ABSENT' : 'Not Marked')}</td></tr>`).join('');
            });
        } else {
            head.innerHTML = `<tr><th>Student</th><th>P</th><th>A</th><th>Total</th><th>%</th></tr>`;
            db.ref(`attendance/${cls}/students`).once('value', (snap) => {
                const data = snap.val() || {};
                body.innerHTML = studentDataMaster[cls].map(n => {
                    let p=0, t=0;
                    if(type === 'monthly') {
                        const m = document.getElementById('monthInput').value;
                        const mD = (data[n] && data[n].months && data[n].months[m]) ? data[n].months[m] : {present:0, total:0};
                        p = mD.present; t = mD.total;
                    } else if (data[n] && data[n].months) { Object.values(data[n].months).forEach(v => { p += v.present; t += v.total; }); }
                    return `<tr><td>${n}</td><td>${p}</td><td>${t-p}</td><td>${t}</td><td>${t>0?Math.round(p/t*100):0}%</td></tr>`;
                }).join('');
            });
        }
    }
