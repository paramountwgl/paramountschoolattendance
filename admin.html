<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Dashboard | Paramount School</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Segoe+UI:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
     <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root { --forest: #006633; --gold: #ffd700; --danger: #c62828; --light: #f4f7f6; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; } 
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding-bottom: 120px; overflow-x: hidden; }
        
        /* LOGIN SCREENS */
        .overlay-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--light); z-index: 9999; display: flex; justify-content: center; align-items: center; padding: 15px; }
        .auth-box { background: white; padding: 40px 25px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 400px; border-bottom: 5px solid var(--forest); position: relative; text-align: center; }
        .auth-logo-corner { position: absolute; top: 15px; left: 15px; height: 40px; width: auto; }
        .secure-icon { font-size: 50px; color: var(--forest); margin: 15px auto; display: block; }
        .auth-title { color: var(--forest); font-family: 'Montserrat', sans-serif; font-size: 1.5rem; font-weight: 800; margin-bottom: 20px; }
        .auth-input { width: 100%; padding: 14px; border-radius: 10px; border: 2px solid #eee; margin-bottom: 20px; text-align: center; font-size: 16px; outline: none; }

        /* RECOVERY LINK */
        .forgot-link { display: block; margin-top: 15px; color: #666; font-size: 13px; text-decoration: underline; cursor: pointer; font-weight: 600; }

        /* BALANCED HEADER: NO SLIDING */
        header { background: var(--forest); color: white; padding: 20px 5%; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header-content { display: flex; align-items: center; justify-content: center; gap: 20px; max-width: 1400px; margin: 0 auto; flex-wrap: wrap; }
        .header-logo { height: 70px; width: auto; }
        .school-branding-group { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; justify-content: center; }
        .school-text { display: flex; flex-direction: column; line-height: 1.1; text-align: center; margin-top: 12px; } 
        .school-name-main { font-family: 'Montserrat', sans-serif; font-size: clamp(1.6rem, 4vw, 2.5rem); font-weight: 800; }
        .school-name-sub { font-family: 'Montserrat', sans-serif; font-size: clamp(0.7rem, 2.5vw, 1.1rem); color: var(--gold); font-weight: 700; margin-top: 2px; }
        
        .admin-portal-heading { 
            font-family: 'Montserrat', sans-serif; font-size: clamp(1.6rem, 4vw, 2.5rem); font-weight: 800; 
            color: white; border-left: 4px solid var(--gold); padding-left: 20px; text-transform: uppercase;
        }

        .container { max-width: 900px; margin: 20px auto; padding: 0 10px; }
        .card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-bottom: 20px; border-top: 6px solid var(--forest); }
        
        /* ZERO-SLIDE TABLE */
        .table-container { width: 100%; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th, td { padding: 10px 2px; text-align: center; border-bottom: 1px solid #eee; font-size: 12px; word-wrap: break-word; }
        th { background: var(--forest); color: white; font-size: 11px; text-transform: uppercase; }
        td:first-child, th:first-child { text-align: left; padding-left: 5px; width: 45%; }

        .btn-small { background: var(--forest); color: white; padding: 10px 20px; border-radius: 50px; font-weight: bold; border: none; cursor: pointer; font-size: 13px; transition: 0.3s; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; padding: 15px; background: rgba(255, 255, 255, 0.95); display: flex; justify-content: center; z-index: 1000; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); }

        @media (max-width: 600px) {
            .header-content { flex-direction: column; gap: 8px; }
            .school-branding-group { flex-direction: column; gap: 5px; }
            .admin-portal-heading { border-left: none; border-top: 3px solid var(--gold); padding-left: 0; padding-top: 8px; }
            th, td { font-size: 11px; }
        }
    </style>
</head>
<body>

<div id="loginScreen" class="overlay-screen">
    <div class="auth-box">
        <img src="logo.png" class="auth-logo-corner" onerror="this.style.display='none'">
        <i class="fas fa-user-shield secure-icon"></i>
        <h2 class="auth-title">Admin Access</h2>
        <input type="password" id="adminPass" class="auth-input" placeholder="Admin Password">
        <button onclick="login()" class="btn-small" style="width:100%; font-size: 15px;">Unlock Dashboard</button>
        <span class="forgot-link" onclick="openRecovery()">Forgot Password?</span>
    </div>
</div>

<div id="recoveryScreen" class="overlay-screen" style="display:none;">
    <div class="auth-box" style="border-bottom-color: var(--gold);">
        <i class="fas fa-key secure-icon" style="color: var(--gold);"></i>
        <h2 class="auth-title" style="color: var(--forest);">Recovery Mode</h2>
        <input type="password" id="masterKey" class="auth-input" placeholder="Enter Master Key">
        <input type="password" id="newPass" class="auth-input" placeholder="Enter New Password">
        <button onclick="recoverPass()" class="btn-small" style="width:100%; background: var(--forest);">Reset Password</button>
        <span class="forgot-link" onclick="closeRecovery()">Back to Login</span>
    </div>
</div>

<div id="mainApp" style="display:none;">
    <header>
        <div class="header-content">
            <img src="logo.png" class="header-logo" onerror="this.style.display='none'">
            <div class="school-branding-group">
                <div class="school-text">
                    <span class="school-name-main">PARAMOUNT</span>
                    <span class="school-name-sub">ENGLISH MEDIUM SCHOOL</span>
                </div>
                <h1 class="admin-portal-heading">Admin Portal</h1>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="card">
            <h3><i class="fas fa-calendar-check"></i> Monitoring</h3>
            <div style="display:flex; gap:8px; margin-bottom:15px;">
                <select id="clsPick" style="flex:1; padding:10px; border-radius:8px; border:2px solid #eee; font-size:14px;">
                    <option value="">-- Class --</option>
                    <option value="Pre-KG">Pre-KG (Diamond)</option><option value="KG-1">KG-1 (Ruby)</option><option value="KG-2">KG-2 (Amber)</option>
                    <option value="Grade-1">Grade-1 (Opal)</option><option value="Grade-2">Grade-2 (Emerald)</option><option value="Grade-3">Grade-3 (Crystal)</option>
                    <option value="Grade-4">Grade-4 (Citrine)</option><option value="Grade-5">Grade-5 (Moonstone)</option><option value="Grade-6">Grade-6 (Alluri)</option>
                    <option value="Grade-7">Grade-7 (Kalam)</option><option value="Grade-8">Grade-8 (Bhagat)</option>
                </select>
                <button onclick="viewAtt()" class="btn-small">View</button>
            </div>
            <div class="table-container">
                <table>
                    <thead><tr><th>Student</th><th>P</th><th>A</th><th>Total</th><th>%</th></tr></thead>
                    <tbody id="attBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <button onclick="window.location.href='index.html'" class="btn-small" style="width:100%; max-width:350px;">
            <i class="fas fa-arrow-left"></i> Return to Portal
        </button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
    const firebaseConfig = { apiKey: "AIzaSyDRYk9KOK-ga0c88dnYMsAoifW2NJTd_Y8", databaseURL: "https://paramount-school-d55bc-default-rtdb.firebaseio.com", projectId: "paramount-school-d55bc" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Secure Recovery Logic
    function openRecovery() { document.getElementById('loginScreen').style.display='none'; document.getElementById('recoveryScreen').style.display='flex'; }
    function closeRecovery() { document.getElementById('recoveryScreen').style.display='none'; document.getElementById('loginScreen').style.display='flex'; }

    function login() {
        db.ref('admin/password').once('value', (snap) => {
            const savedPass = snap.val() || "Ahmad@07"; // Default if not in DB
            if(document.getElementById('adminPass').value === savedPass) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
            } else { Swal.fire('Error', 'Incorrect Password', 'error'); }
        });
    }

    function recoverPass() {
        const key = document.getElementById('masterKey').value;
        const freshPass = document.getElementById('newPass').value;
        if(key === "PARAMOUNT@2026") { // Your Master Key
            db.ref('admin/password').set(freshPass).then(() => {
                Swal.fire('Success', 'Password Updated!', 'success');
                closeRecovery();
            });
        } else { Swal.fire('Error', 'Invalid Master Key', 'error'); }
    }

    function viewAtt() {
        const cls = document.getElementById('clsPick').value;
        const body = document.getElementById('attBody');
        if(!cls) return;
        body.innerHTML = '<tr><td colspan="5" style="text-align:center;">Loading...</td></tr>';
        db.ref(`attendance/${cls}/students`).once('value', (snap) => {
            const data = snap.val(); body.innerHTML = "";
            for(let name in data) {
                const p = data[name].presentDays || 0; const t = data[name].totalDays || 0;
                body.innerHTML += `<tr><td>${name}</td><td>${p}</td><td>${t-p}</td><td>${t}</td><td>${t>0?Math.round((p/t)*100):0}%</td></tr>`;
            }
        });
    }
</script>
</body>
</html>
