<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Paramount School</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Segoe+UI:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root { --forest: #006633; --gold: #ffd700; --danger: #c62828; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding-bottom: 120px; }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--light); z-index: 9999; display: flex; justify-content: center; align-items: center; }

        .auth-box { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            width: 400px; 
            border-bottom: 5px solid var(--forest);
            position: relative;
            text-align: center; /* Ensures center alignment for children */
        }

        /* LOGO IN TOP-LEFT CORNER */
        .box-logo { 
            position: absolute;
            top: 20px;
            left: 20px;
            height: 45px; 
            width: auto; 
        }

        /* CENTERED SECURE ICON */
        .secure-icon { 
            font-size: 50px; 
            color: var(--forest); 
            display: block;
            margin: 0 auto 20px auto; 
        }

        .auth-title { 
            color: var(--forest); 
            margin-bottom: 25px; 
            font-family: 'Montserrat', sans-serif; 
            font-size: 1.6rem;
        }

        .auth-input { 
            width: 100%; 
            max-width: 300px;
            padding: 14px; 
            border-radius: 10px; 
            border: 2px solid #eee; 
            margin-bottom: 20px; 
            text-align: center; 
            font-size: 16px; 
            outline: none; 
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .attractive-btn { 
            background: linear-gradient(135deg, var(--forest), #004d26); 
            color: white; 
            padding: 16px 45px; 
            border-radius: 50px; 
            font-weight: bold; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 15px; 
            box-shadow: 0 8px 20px rgba(0, 102, 51, 0.4); 
            transition: 0.3s; 
            border: 2px solid rgba(255, 215, 0, 0.4); 
            cursor: pointer; 
            width: 100%; 
            max-width: 280px;
            margin-left: auto;
            margin-right: auto;
        }
        .attractive-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(0, 102, 51, 0.6); border-color: var(--gold); }

        /* DASHBOARD STYLES */
        #mainApp { display: none; }
        header { background: var(--forest); color: white; padding: 25px 5%; display: flex; align-items: center; gap: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .school-name { font-family: 'Montserrat', sans-serif; font-size: 2.2rem; font-weight: 800; text-transform: uppercase; margin: 0; letter-spacing: 2px; }
        .container { max-width: 1000px; margin: 30px auto; padding: 0 15px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 25px; border-top: 6px solid var(--forest); }
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; padding: 25px 0; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); display: flex; justify-content: center; z-index: 1000; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div id="loginScreen" class="overlay">
    <div class="auth-box">
        <img src="logo.png" alt="Logo" class="box-logo" onerror="this.style.display='none'">

        <i class="fas fa-user-shield secure-icon"></i>
        <h2 class="auth-title">Admin Access</h2>
        <input type="password" id="adminPass" class="auth-input" placeholder="Enter Admin Password" onkeypress="if(event.key==='Enter') login()">
        <button onclick="login()" class="attractive-btn">Unlock Dashboard</button>
    </div>
</div>

<div id="mainApp">
    <header>
        <img src="logo.png" style="height:70px;" onerror="this.style.display='none'">
        <h1 class="school-name">Paramount Admin Portal</h1>
    </header>

    <div class="container">
        <div class="card" style="border-top-color: var(--gold);">
            <h3><i class="fas fa-bullhorn"></i> Announcement Control</h3>
            <textarea id="annMsg" placeholder="Type school announcement here..." style="width:100%; height:80px; padding:12px; border-radius:10px; border:2px solid #eee; outline:none; font-family:inherit;"></textarea>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button onclick="postAnn()" class="attractive-btn" style="padding:10px 25px; font-size:14px; box-shadow:none;">Publish</button>
                <button onclick="clearAnn()" style="background:#eee; border:none; padding:10px 20px; border-radius:50px; cursor:pointer; font-weight:bold; color:#666;">Clear</button>
            </div>
        </div>

        <div class="card">
            <h3><i class="fas fa-calendar-check"></i> Attendance Oversight</h3>
            <div style="display:flex; gap:15px; align-items: center;">
                <select id="clsPick" style="flex:1; padding:12px; border-radius:10px; border:2px solid #eee; outline:none;">
                    <option value="">-- Choose Class --</option>
                    <option value="Pre-KG">Pre-KG (Diamond)</option>
                    <option value="KG-1">KG-1 (Ruby)</option>
                    <option value="KG-2">KG-2 (Amber)</option>
                    <option value="Grade-1">Grade-1 (Opal)</option>
                    <option value="Grade-2">Grade-2 (Emerald)</option>
                    <option value="Grade-3">Grade-3 (Crystal)</option>
                    <option value="Grade-4">Grade-4 (Citrine)</option>
                    <option value="Grade-5">Grade-5 (Moonstone)</option>
                    <option value="Grade-6">Grade-6 (Alluri)</option>
                    <option value="Grade-7">Grade-7 (Kalam)</option>
                    <option value="Grade-8">Grade-8 (Bhagat)</option>
                </select>
                <button onclick="viewAtt()" class="attractive-btn" style="padding:10px 30px; font-size:14px; box-shadow:none;">View Report</button>
            </div>
            <table id="attTable" style="width:100%; border-collapse:collapse; margin-top:20px;">
                <thead><tr style="background:var(--forest); color:white;"><th>Student</th><th>P</th><th>A</th><th>Total</th><th>%</th></tr></thead>
                <tbody id="attBody"></tbody>
            </table>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="index.html" class="attractive-btn" style="max-width: 320px;">
            <i class="fas fa-arrow-left"></i> Return to Attendance Portal
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyDRYk9KOK-ga0c88dnYMsAoifW2NJTd_Y8", 
        databaseURL: "https://paramount-school-d55bc-default-rtdb.firebaseio.com", 
        projectId: "paramount-school-d55bc" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function login() {
        if(document.getElementById('adminPass').value === "Ahmad@07") {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
        } else { Swal.fire('Error', 'Incorrect Password', 'error'); }
    }

    function postAnn() {
        const msg = document.getElementById('annMsg').value;
        db.ref('announcement').set(msg).then(() => Swal.fire('Live', 'Announcement Updated', 'success'));
    }

    function clearAnn() { db.ref('announcement').remove().then(() => Swal.fire('Cleared', 'Announcement Removed', 'info')); }

    function viewAtt() {
        const cls = document.getElementById('clsPick').value;
        const body = document.getElementById('attBody');
        db.ref(`attendance/${cls}/students`).once('value', (snap) => {
            const data = snap.val(); body.innerHTML = "";
            for(let name in data) {
                const p = data[name].presentDays || 0; const t = data[name].totalDays || 0;
                body.innerHTML += `<tr><td>${name}</td><td>${p}</td><td>${t-p}</td><td>${t}</td><td>${t>0?Math.round((p/t)*100):0}%</td></tr>`;
            }
        });
    }
</script>
</body>
</html>
