<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Paramount School</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --forest: #006633; --gold: #ffd700; --danger: #c62828; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; }
        .overlay-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(244, 247, 246, 0.95); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .auth-box { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 350px; }
        .auth-btn { background: var(--forest); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        header { background: var(--forest); color: white; padding: 20px; text-align: center; }
        .container { max-width: 900px; margin: 30px auto; padding: 0 15px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 25px; }
        select, textarea { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid #ddd; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: var(--forest); color: white; }
        .badge-verified { background: #e8f5e9; color: #2e7d32; padding: 4px 8px; border-radius: 10px; font-size: 10px; font-weight: bold; }
        #mainApp { display: none; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

<div id="loginScreen" class="overlay-screen">
    <div class="auth-box">
        <h2 style="color: var(--forest);">Admin Login</h2>
        <input type="password" id="adminPassword" placeholder="Enter Password">
        <button class="auth-btn" onclick="checkPassword()">Login</button>
    </div>
</div>

<div id="mainApp">
    <header>
        <h1 style="margin:0;">PARAMOUNT ADMIN</h1>
        <p style="color: var(--gold); margin:0; font-weight:bold;">Tracking & Announcements</p>
    </header>

    <div class="container">
        <div class="card" style="border-left: 6px solid var(--gold);">
            <h3><i class="fas fa-bullhorn"></i> Live Cloud Announcement</h3>
            <textarea id="announcementInput" placeholder="Broadcast message to all devices..."></textarea>
            <div style="display: flex; gap: 10px;">
                <button onclick="publishAnnouncement()" class="auth-btn" style="flex:1;">Publish</button>
                <button onclick="clearAnnouncement()" class="auth-btn" style="background: var(--danger); width:100px;">Clear</button>
            </div>
        </div>

        <div class="card">
            <h3><i class="fas fa-user-check"></i> Parent Verification Tracker</h3>
            <input type="date" id="trackDate" style="width: 200px; padding: 10px;">
            <button class="auth-btn" onclick="loadVerifications()" style="width:auto; padding: 10px 20px;">Track</button>
            <table id="verifyTable">
                <thead><tr><th>Student</th><th>Subject</th><th>Status</th><th>Time</th></tr></thead>
                <tbody id="verifyBody"></tbody>
            </table>
        </div>

        <div class="card">
            <h3><i class="fas fa-chart-bar"></i> Attendance Monitoring</h3>
            <select id="classSelect" style="width: 200px;"><option value="Grade-1">Grade-1</option></select>
            <button class="auth-btn" onclick="loadAttendance()" style="width:auto; padding: 10px 20px;">View Data</button>
            <table id="attTable">
                <thead><tr><th>Student Name</th><th>Present</th><th>Total</th><th>%</th></tr></thead>
                <tbody id="attBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
// Paste your Firebase Config here
const firebaseConfig = { apiKey: "AIzaSyDRYk9KOK-ga0c88dnYMsAoifW2NJTd_Y8", databaseURL: "https://paramount-school-d55bc-default-rtdb.firebaseio.com", projectId: "paramount-school-d55bc" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function checkPassword() {
    if(document.getElementById('adminPassword').value === "Ahmad@07") {
        document.getElementById('loginScreen').style.display = "none";
        document.getElementById('mainApp').style.display = "block";
    }
}

function publishAnnouncement() {
    const txt = document.getElementById('announcementInput').value;
    db.ref('announcement').set(txt).then(() => Swal.fire('Success', 'Announcement Live!', 'success'));
}

function clearAnnouncement() { db.ref('announcement').remove(); }

function loadVerifications() {
    const date = document.getElementById('trackDate').value;
    const body = document.getElementById('verifyBody');
    db.ref(`homework_status/${date}`).once('value', (snap) => {
        const data = snap.val(); body.innerHTML = "";
        if(!data) return;
        for(let st in data) {
            for(let sub in data[st]) {
                body.innerHTML += `<tr><td>${st}</td><td>${sub}</td><td><span class="badge-verified">VERIFIED</span></td><td>${data[st][sub].verifiedAt}</td></tr>`;
            }
        }
    });
}
// Add Attendance Logic here as per previous versions
</script>
</body>
</html>
