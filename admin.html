<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Paramount School</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root { --forest: #006633; --gold: #ffd700; --danger: #c62828; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 0; }
        .overlay-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(244, 247, 246, 0.95); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .auth-box { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 350px; }
        .auth-box input { padding: 12px; width: 100%; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; box-sizing: border-box; }
        .auth-btn { background: var(--forest); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        header { background: var(--forest); color: white; padding: 20px 5%; display: flex; justify-content: center; align-items: center; gap: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .logo-img { height: 70px; width: auto; }
        .container { max-width: 950px; margin: 30px auto; padding: 0 15px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .hw-input { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid #ddd; font-size: 16px; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: var(--forest); color: white; font-size: 12px; text-transform: uppercase; }
        .badge-verified { background: #e8f5e9; color: #2e7d32; padding: 4px 10px; border-radius: 15px; font-size: 11px; font-weight: bold; }
        .badge-pending { background: #fff3e0; color: #ef6c00; padding: 4px 10px; border-radius: 15px; font-size: 11px; font-weight: bold; }
        #mainApp { display: none; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

<div id="loginScreen" class="overlay-screen">
    <div class="auth-box">
        <h2 style="color: var(--forest);">Admin Login</h2>
        <input type="password" id="adminPassword" placeholder="Enter Password" onkeypress="if(event.key === 'Enter') checkPassword()">
        <button class="auth-btn" onclick="checkPassword()">Access Dashboard</button>
    </div>
</div>

<div id="mainApp">
    <header>
        <img src="logo.png" alt="Logo" class="logo-img">
        <div class="school-info">
            <h1 style="margin:0; font-size: 1.6rem;">PARAMOUNT ADMIN</h1>
            <p style="color: var(--gold); margin:0; font-weight:bold;">Cloud Control Panel</p>
        </div>
    </header>

    <div class="container">
        <div class="card" style="border-left: 6px solid var(--forest);">
            <h3><i class="fas fa-edit"></i> Post Daily Homework</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <input type="date" id="hwDate" class="hw-input">
                <input type="text" id="hwSubject" class="hw-input" placeholder="Subject Name">
            </div>
            <textarea id="hwTask" class="hw-input" style="margin-top:15px; min-height:80px; font-family:inherit;" placeholder="Homework details..."></textarea>
            <button class="auth-btn" onclick="saveHomework()" style="width:auto; padding: 12px 30px;"><i class="fas fa-paper-plane"></i> Publish to Portal</button>
        </div>

        <div class="card">
            <h3><i class="fas fa-user-check"></i> Parent Verification Tracker</h3>
            <div style="display:flex; gap:10px;">
                <input type="date" id="trackDate" class="hw-input" style="flex:1;">
                <button class="auth-btn" onclick="loadVerifications()" style="width:auto; margin:0;">Track Status</button>
            </div>
            <table id="verifyTable">
                <thead>
                    <tr><th>Student Name</th><th>Subject</th><th>Status</th><th>Time</th></tr>
                </thead>
                <tbody id="verifyBody">
                    <tr><td colspan="4" style="text-align:center; padding:20px; color:#999;">Select a date to view parent checks.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDRYk9KOK-ga0c88dnYMsAoifW2NJTd_Y8",
  databaseURL: "https://paramount-school-d55bc-default-rtdb.firebaseio.com",
  projectId: "paramount-school-d55bc"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function checkPassword() {
    if(document.getElementById('adminPassword').value === "Ahmad@07") {
        document.getElementById('loginScreen').style.display = "none";
        document.getElementById('mainApp').style.display = "block";
    } else { alert("Wrong Password"); }
}

// SAVE HOMEWORK WITH TIMESTAMP
function saveHomework() {
    const date = document.getElementById('hwDate').value;
    const subject = document.getElementById('hwSubject').value;
    const task = document.getElementById('hwTask').value;
    if(!date || !subject || !task) return Swal.fire('Error', 'Missing fields', 'error');

    const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    db.ref(`homework/${date}`).update({
        [subject]: task,
        lastUpdated: now
    }).then(() => {
        Swal.fire('Success', 'Homework posted at ' + now, 'success');
        document.getElementById('hwSubject').value = "";
        document.getElementById('hwTask').value = "";
    });
}

// TRACK PARENT CHECKS
function loadVerifications() {
    const date = document.getElementById('trackDate').value;
    const tbody = document.getElementById('verifyBody');
    if(!date) return alert("Select date");

    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">Loading...</td></tr>';

    db.ref(`homework_status/${date}`).once('value', (snap) => {
        const data = snap.val();
        tbody.innerHTML = "";
        if(!data) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:red;">No parent verifications found for this date.</td></tr>';
            return;
        }

        for(let student in data) {
            for(let sub in data[student]) {
                const info = data[student][sub];
                const badge = info.verified ? '<span class="badge-verified">VERIFIED</span>' : '<span class="badge-pending">PENDING</span>';
                tbody.innerHTML += `<tr>
                    <td style="font-weight:bold;">${student}</td>
                    <td>${sub}</td>
                    <td>${badge}</td>
                    <td style="font-size:11px; color:#666;">${info.verifiedAt || '---'}</td>
                </tr>`;
            }
        }
    });
}
</script>
</body>
</html>
