<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Paramount School</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Segoe+UI:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root { --forest: #006633; --gold: #ffd700; --danger: #c62828; --light: #f4f7f6; }
        * { box-sizing: border-box; } /* Layout Fix */
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding-bottom: 120px; }
        
        /* LOGIN SCREENS */
        .overlay-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--light); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .auth-box { 
            background: white; padding: 40px; border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 400px; 
            border-bottom: 5px solid var(--forest); position: relative; text-align: center;
        }
        .secure-icon { font-size: 50px; color: var(--forest); margin-bottom: 15px; display: block; }
        .auth-title { color: var(--forest); margin: 0 0 10px 0; font-family: 'Montserrat', sans-serif; font-size: 1.6rem; font-weight: 800; }
        .auth-input { width: 100%; max-width: 320px; padding: 14px; border-radius: 10px; border: 2px solid #eee; margin: 15px auto 25px auto; text-align: center; font-size: 16px; outline: none; display: block; }

        .btn-main { background: var(--forest); color: white; padding: 16px 45px; border-radius: 50px; font-weight: bold; border: none; cursor: pointer; width: 100%; max-width: 280px; transition: 0.3s; font-size: 16px; display: block; margin: 0 auto; text-decoration: none; text-align: center; }
        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 8px 15px rgba(0, 102, 51, 0.3); }

        /* BRANDED HEADER (Matched to Screenshot) */
        header { background: var(--forest); color: white; padding: 20px 5%; display: flex; align-items: center; gap: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .logo-container { height: 75px; width: 75px; background: white; border-radius: 50%; padding: 5px; display: flex; align-items: center; justify-content: center; border: 2px solid var(--gold); }
        .header-logo { height: 100%; width: auto; }
        .school-branding { display: flex; flex-direction: column; line-height: 1.1; }
        .school-name-top { font-family: 'Montserrat', sans-serif; font-size: 2.2rem; font-weight: 800; letter-spacing: 1px; }
        .school-name-bottom { font-family: 'Montserrat', sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--gold); letter-spacing: 0.5px; margin-top: 2px; }
        .portal-label { margin-left: auto; font-weight: bold; font-size: 0.9rem; opacity: 0.8; }

        .container { max-width: 1000px; margin: 30px auto; padding: 0 15px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 25px; border-top: 6px solid var(--forest); position: relative; }
        h3 { color: var(--forest); margin: 0 0 15px; font-size: 1.3rem; border-bottom: 1px solid #eee; padding-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        
        /* OVERLAP FIX: Announcement Control */
        .announcement-textarea { 
            width: 100%; height: 120px; padding: 15px; border-radius: 10px; 
            border: 2px solid #eee; outline: none; font-family: inherit; 
            margin-bottom: 20px; display: block; resize: none;
        }
        
        .action-row { display: flex; gap: 15px; align-items: center; margin-bottom: 10px; }
        .class-select { flex: 1; padding: 12px; border-radius: 10px; border: 2px solid #eee; outline: none; font-size: 15px; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: var(--forest); color: white; font-size: 12px; text-transform: uppercase; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; padding: 25px 0; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); display: flex; justify-content: center; z-index: 1000; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div id="loginScreen" class="overlay-screen">
    <div class="auth-box">
        <i class="fas fa-user-shield secure-icon"></i>
        <h2 class="auth-title">Admin Secure Login</h2>
        <input type="password" id="adminPass" class="auth-input" placeholder="Enter Admin Password" onkeypress="if(event.key==='Enter') login()">
        <button onclick="login()" class="btn-main">Unlock Dashboard</button>
    </div>
</div>

<div id="mainApp">
    <header>
        <div class="logo-container">
            <img src="logo.png" class="header-logo" onerror="this.src='https://via.placeholder.com/70'">
        </div>
        <div class="school-branding">
            <span class="school-name-top">PARAMOUNT</span>
            <span class="school-name-bottom">ENGLISH MEDIUM SCHOOL</span>
        </div>
        <span class="portal-label">Admin Portal</span>
    </header>

    <div class="container">
        <div class="card" style="border-top-color: var(--gold);">
            <h3><i class="fas fa-bullhorn"></i> Announcement Control</h3>
            <textarea id="annMsg" class="announcement-textarea" placeholder="Type school announcement here..."></textarea>
            <div style="display:flex; gap:15px; align-items: center;">
                <button onclick="postAnn()" class="btn-main" style="max-width:180px; margin:0;">Publish Now</button>
                <button onclick="clearAnn()" style="background:#eee; border:none; padding:10px 25px; border-radius:50px; cursor:pointer; font-weight:bold; color:#666;">Clear</button>
            </div>
        </div>

        <div class="card">
            <h3><i class="fas fa-calendar-check"></i> Attendance Monitoring</h3>
            <div class="action-row">
                <select id="clsPick" class="class-select">
                    <option value="">-- Choose Class --</option>
                    <option value="Pre-KG">Pre-KG (Diamond)</option>
                    <option value="KG-1">KG-1 (Ruby)</option>
                    <option value="KG-2">KG-2 (Amber)</option>
                    <option value="Grade-1">Grade-1 (Opal)</option>
                    <option value="Grade-2">Grade-2 (Emerald)</option>
                    <option value="Grade-3">Grade-3 (Crystal)</option>
                    <option value="Grade-4">Grade-4 (Citrine)</option>
                    <option value="Grade-5">Grade-5 (Moonstone)</option>
                    <option value="Grade-6">Grade-6 (Alluri)</option>
                    <option value="Grade-7">Grade-7 (Kalam)</option>
                    <option value="Grade-8">Grade-8 (Bhagat)</option>
                </select>
                <button onclick="viewAtt()" class="btn-main" style="max-width:160px; margin:0;">View Report</button>
            </div>
            <table id="attTable">
                <thead><tr><th>Student</th><th>P</th><th>A</th><th>Total</th><th>%</th></tr></thead>
                <tbody id="attBody"></tbody>
            </table>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="index.html" class="btn-main" style="max-width: 350px;">
            <i class="fas fa-arrow-left"></i> Return to Attendance Portal
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyDRYk9KOK-ga0c88dnYMsAoifW2NJTd_Y8", 
        databaseURL: "https://paramount-school-d55bc-default-rtdb.firebaseio.com", 
        projectId: "paramount-school-d55bc" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function login() {
        if(document.getElementById('adminPass').value === "Ahmad@07") {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
        } else { Swal.fire('Error', 'Incorrect Password', 'error'); }
    }

    function postAnn() { 
        const msg = document.getElementById('annMsg').value;
        if(!msg) return Swal.fire('Error', 'Type a message first', 'warning');
        db.ref('announcement').set(msg).then(() => Swal.fire('Success', 'Announcement Published', 'success')); 
    }
    
    function clearAnn() { 
        db.ref('announcement').remove().then(() => {
            document.getElementById('annMsg').value = "";
            Swal.fire('Info', 'Announcement Cleared', 'info');
        });
    }

    function viewAtt() {
        const cls = document.getElementById('clsPick').value;
        const body = document.getElementById('attBody');
        if(!cls) return Swal.fire('Notice', 'Please select a class', 'info');
        
        body.innerHTML = '<tr><td colspan="5" style="text-align:center;">Fetching Records...</td></tr>';
        db.ref(`attendance/${cls}/students`).once('value', (snap) => {
            const data = snap.val(); body.innerHTML = "";
            if(!data) return body.innerHTML = '<tr><td colspan="5" style="text-align:center;">No data found for this class.</td></tr>';
            for(let name in data) {
                const p = data[name].presentDays || 0; const t = data[name].totalDays || 0;
                const a = t - p; const pct = t > 0 ? Math.round((p/t)*100) : 0;
                body.innerHTML += `<tr><td>${name}</td><td style="color:green; font-weight:bold;">${p}</td><td style="color:red; font-weight:bold;">${a}</td><td>${t}</td><td>${pct}%</td></tr>`;
            }
        });
    }
</script>
</body>
</html>
