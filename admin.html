<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Dashboard | Paramount School</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Segoe+UI:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root { --forest: #006633; --gold: #ffd700; --danger: #c62828; --light: #f4f7f6; }
        * { box-sizing: border-box; } 
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding-bottom: 120px; overflow-x: hidden; }
        
        .overlay-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--light); z-index: 9999; display: flex; justify-content: center; align-items: center; padding: 15px; }
        .auth-box { background: white; padding: 40px 25px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 400px; border-bottom: 5px solid var(--forest); position: relative; text-align: center; }
        .secure-icon { font-size: 50px; color: var(--forest); margin: 0 auto 15px auto; display: block; }
        .auth-title { color: var(--forest); margin: 0; font-family: 'Montserrat', sans-serif; font-size: 1.5rem; font-weight: 800; }
        .auth-input { width: 100%; max-width: 320px; padding: 12px; border-radius: 10px; border: 2px solid #eee; margin: 20px auto; text-align: center; font-size: 16px; outline: none; display: block; }
        
        header { background: var(--forest); color: white; padding: 20px 3%; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header-content { display: flex; align-items: center; justify-content: space-between; max-width: 1400px; margin: 0 auto; width: 100%; position: relative; }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .header-logo { height: 65px; width: auto; flex-shrink: 0; }
        .school-text { display: flex; flex-direction: column; line-height: 1.1; white-space: nowrap; margin-left: 5px; }
        .school-name-main { font-family: 'Montserrat', sans-serif; font-size: clamp(1.2rem, 3.5vw, 2.2rem); font-weight: 800; }
        .school-name-sub { font-family: 'Montserrat', sans-serif; font-size: clamp(0.6rem, 2vw, 0.9rem); color: var(--gold); font-weight: 700; }
        .admin-portal-title { font-family: 'Montserrat', sans-serif; font-size: clamp(1rem, 2.5vw, 1.8rem); font-weight: 800; color: white; text-transform: uppercase; border-left: 3px solid var(--gold); padding-left: 15px; margin-left: 15px; }

        /* NOTIFICATION BOX STYLES */
        #notifBadge { position: absolute; top: -5px; right: -5px; background: var(--danger); color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px; font-weight: bold; border: 2px solid var(--forest); display: none; }
        #notifDropdown { display: none; position: absolute; top: 60px; right: 0; width: 320px; background: white; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); z-index: 10000; color: #333; overflow: hidden; }
        .notif-header { padding: 12px 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; background: #fafafa; }
        #notifList { max-height: 350px; overflow-y: auto; }
        .notif-item { padding: 15px; border-bottom: 1px solid #f5f5f5; transition: 0.3s; }
        .notif-item:hover { background: #f9f9f9; }

        /* PULSING ANIMATION FOR BELL */
        .fa-beat { animation: fa-beat 1.5s ease-in-out infinite; }
        @keyframes fa-beat { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }

        .container { max-width: 850px; margin: 30px auto; padding: 0 15px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-bottom: 25px; border-top: 6px solid var(--forest); }
        h3 { color: var(--forest); margin: 0 0 20px; font-size: 1.3rem; border-bottom: 1px solid #eee; padding-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        
        .btn-attract { background: linear-gradient(135deg, var(--forest), #004d26); color: white; padding: 14px 35px; border-radius: 50px; font-weight: bold; border: 2px solid rgba(255, 215, 0, 0.3); cursor: pointer; font-size: 14px; transition: 0.3s; box-shadow: 0 5px 15px rgba(0, 102, 51, 0.3); display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-attract:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0, 102, 51, 0.5); border-color: var(--gold); }
        .btn-attract.danger { background: linear-gradient(135deg, #d32f2f, #b71c1c); border-color: rgba(255,255,255,0.2); }
        .btn-attract.warning { background: linear-gradient(135deg, #fb8c00, #ef6c00); border-color: rgba(255,255,255,0.2); }
        
        .class-select { flex: 1; min-width: 150px; padding: 12px; border-radius: 10px; border: 2px solid #eee; font-size: 15px; outline: none; }

        .table-container { width: 100%; overflow: hidden; border-radius: 10px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; table-layout: fixed; }
        th { background: var(--forest); color: white; text-transform: uppercase; padding: 12px 2px; font-size: 11px; font-weight: 800; }
        th:first-child { border-top-left-radius: 10px; text-align: left; padding-left: 10px; width: 45%; }
        th:last-child { border-top-right-radius: 10px; }
        td { padding: 12px 2px; text-align: center; border-bottom: 1px solid #eee; font-size: 12px; }
        td:first-child { text-align: left; padding-left: 10px; }

        .status-p { color: #2e7d32; font-weight: 800; }
        .status-a { color: #c62828; font-weight: 800; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; padding: 25px 0; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); display: flex; justify-content: center; z-index: 1000; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div id="loginScreen" class="overlay-screen">
    <div class="auth-box">
        <i class="fas fa-user-shield secure-icon"></i>
        <h2 class="auth-title">Admin Access</h2>
        <input type="password" id="adminPass" class="auth-input" placeholder="Admin Password">
        <button onclick="login()" class="btn-attract" style="width:100%;">Unlock Dashboard <i class="fas fa-unlock-alt"></i></button>
        <div style="margin-top:15px; display:flex; flex-direction:column; gap:8px;">
            <span style="color:#666; font-size:13px; text-decoration:underline; cursor:pointer;" onclick="window.location.href='index.html'">Cancel & Return</span>
            <span style="color:#666; font-size:13px; text-decoration:underline; cursor:pointer;" onclick="openRecovery()">Forgot Password?</span>
        </div>
    </div>
</div>

<div id="recoveryScreen" class="overlay-screen" style="display:none;">
    <div class="auth-box" style="border-bottom-color: var(--gold);">
        <i class="fas fa-key secure-icon" style="color: var(--gold);"></i>
        <h2 class="auth-title">Password Reset</h2>
        <input type="password" id="masterKey" class="auth-input" placeholder="Enter Master Key">
        <input type="password" id="newPass" class="auth-input" placeholder="New Admin Password">
        <button onclick="recoverPass()" class="btn-attract" style="width:100%;">Update Password</button>
        <span style="margin-top:15px; display:block; cursor:pointer; text-decoration:underline; font-size:13px;" onclick="closeRecovery()">Back to Login</span>
    </div>
</div>

<div id="mainApp" style="display:none;">
    <header>
        <div class="header-content">
            <div class="header-left">
                <img src="logo.png" class="header-logo" onerror="this.style.display='none'">
                <div class="school-text">
                    <span class="school-name-main">PARAMOUNT</span>
                    <span class="school-name-sub">ENGLISH MEDIUM SCHOOL</span>
                </div>
                <h1 class="admin-portal-title">Admin</h1>
            </div>

            <div style="position: relative;">
                <div onclick="toggleNotifBox()" style="cursor: pointer; padding: 10px;">
                    <i id="bellIcon" class="fas fa-bell" style="font-size: 24px; color: white;"></i>
                    <span id="notifBadge">0</span>
                </div>
                <div id="notifDropdown">
                    <div class="notif-header">
                        <b>Quiz Requests <i class="fas fa-paper-plane"></i></b>
                        <small onclick="clearAllRequests()" style="cursor:pointer; color:var(--danger); font-weight: bold;">Clear All</small>
                    </div>
                    <div id="notifList">
                        <p style="padding:20px; text-align:center; color:#999; font-size:13px;">No new requests</p>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="card" style="border-top-color: var(--gold);">
            <h3><i class="fas fa-bullhorn"></i> Announcement Control</h3>
            <textarea id="annMsg" style="width:100%; height:110px; padding:15px; border-radius:10px; border:2px solid #eee; outline:none; margin-bottom:20px; resize:none;" placeholder="Type school announcement here..."></textarea>
            <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap;">
                <button onclick="postAnn()" class="btn-attract">Publish Now <i class="fas fa-check-circle"></i></button>
                <button onclick="clearAnn()" style="background:#eee; color:#666; border:none; padding:14px 25px; border-radius:50px; font-weight:bold; cursor:pointer;">Clear Message</button>
            </div>
        </div>

        <div class="card">
            <h3><i class="fas fa-calendar-check"></i> Attendance Monitoring</h3>
            <div style="display:flex; flex-direction:column; gap:15px; margin-bottom:25px;">
                <div style="display:flex; gap:10px; flex-wrap:wrap;">
                    <select id="clsPick" class="class-select">
                        <option value="">-- Choose Class --</option>
                        <option value="Pre-KG">Pre-KG</option><option value="KG-1">KG-1</option><option value="KG-2">KG-2</option>
                        <option value="Grade-1">Grade-1</option><option value="Grade-2">Grade-2</option><option value="Grade-3">Grade-3</option>
                        <option value="Grade-4">Grade-4</option><option value="Grade-5">Grade-5</option><option value="Grade-6">Grade-6</option>
                        <option value="Grade-7">Grade-7</option><option value="Grade-8">Grade-8</option>
                    </select>
                    <select id="viewType" class="class-select" onchange="toggleFilterInputs()">
                        <option value="total">Overall Totals</option>
                        <option value="monthly">Monthly Breakdown</option>
                        <option value="daily">Specific Date</option>
                    </select>
                </div>
                
                <div id="monthlyFilter" style="display:none;">
                    <label style="font-size: 11px; font-weight: bold; color: #666;">SELECT MONTH</label>
                    <input type="month" id="monthInput" class="auth-input" style="margin: 5px 0 0 0; width:100%;">
                </div>

                <div id="dailyFilter" style="display:none;">
                    <label style="font-size: 11px; font-weight: bold; color: #666;">SELECT DATE</label>
                    <input type="date" id="dateInput" class="auth-input" style="margin: 5px 0 0 0; width:100%;">
                </div>

                <div style="display:flex; gap:10px; flex-wrap:wrap;">
                    <button onclick="viewAtt()" class="btn-attract" style="flex:1;">View Report <i class="fas fa-file-invoice"></i></button>
                    <button onclick="downloadFilteredReport()" id="dlBtn" class="btn-attract warning" style="display:none; flex:1;">
                        <i class="fas fa-file-excel"></i> Download Excel Report
                    </button>
                </div>
            </div>
            <div class="table-container">
                <table id="resultsTable">
                    <thead id="tableHead">
                        <tr><th>Student</th><th>P</th><th>A</th><th>Total</th><th>%</th></tr>
                    </thead>
                    <tbody id="attBody"></tbody>
                </table>
            </div>
        </div>

        <div class="card" style="border-top-color: var(--danger);">
            <h3><i class="fas fa-tools"></i> Database Management</h3>
            <div style="display: flex; gap: 10px; flex-direction: column;">
                <button onclick="resetMonthlyData()" class="btn-attract warning"><i class="fas fa-calendar-minus"></i> Reset Current Month Only</button>
                <button onclick="resetAttendanceData()" class="btn-attract danger"><i class="fas fa-trash-alt"></i> Master Database Reset</button>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <button onclick="window.location.href='index.html'" class="btn-attract" style="width: 90%; max-width: 400px;">
            <i class="fas fa-arrow-left"></i> Return to Teacher Portal
        </button>
    </div>
</div>

        const snap = await db.ref('admin/password').once('value');
        return snap.val() || "Ahmad@07";

    async function login() {
        const correctPass = await getAdminPassword();
        if(document.getElementById('adminPass').value === correctPass) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';

            });

    }

    function toggleFilterInputs() {

        document.getElementById('monthlyFilter').style.display = (type === 'monthly') ? 'block' : 'none';

        document.getElementById('dlBtn').style.display = 'none'; 
    }

    function toggleNotifBox() {

        box.style.display = (box.style.display === 'none' || box.style.display === '') ? 'block' : 'none';
    }

        const list = document.getElementById('notifList');

        const bell = document.getElementById('bellIcon');
        let count = 0; list.innerHTML = "";

        if(!requests) {

            bell.classList.remove('fa-beat');
            list.innerHTML = '<p style="padding:20px; text-align:center; color:#999; font-size:13px;">No new requests</p>';
            return;
        }

                        <div style="display:flex; gap:8px; margin-top:8px;">
                            <button onclick="approveReq('${id}')" style="flex:1; background:var(--forest); color:white; border:none; padding:6px; border-radius:6px; font-size:11px; cursor:pointer; font-weight:bold;">Accept</button>
                            <button onclick="rejectReq('${id}')" style="flex:0.4; background:#f5f5f5; color:#666; border:none; padding:6px; border-radius:6px; font-size:11px; cursor:pointer;">Decline</button>
                        </div>
                    </div>`;
            }
        });

        if(count > 0) {
            badge.innerText = count;
            badge.style.display = 'block';
            bell.classList.add('fa-beat');
        } else {
            badge.style.display = 'none';
            bell.classList.remove('fa-beat');
            list.innerHTML = '<p style="padding:20px; text-align:center; color:#999; font-size:13px;">All caught up! ✨</p>';
        }
    });

    function approveReq(id) {
        db.ref(`quiz_requests/${id}`).update({ status: 'approved' }).then(() => {
            Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Request Accepted', showConfirmButton: false, timer: 2000 });
        });
    }

    function rejectReq(id) { db.ref(`quiz_requests/${id}`).remove(); }
    function clearAllRequests() { db.ref('quiz_requests').remove(); }

    async function viewAtt() {
        const cls = document.getElementById('clsPick').value;
        const type = document.getElementById('viewType').value;
        const body = document.getElementById('attBody');
        const head = document.getElementById('tableHead');
        if(!cls) return Swal.fire('Error', 'Choose a class', 'info');
        body.innerHTML = '<tr><td colspan="5" style="text-align:center;">Loading...</td></tr>';
        if(type === 'daily') {
            const selDate = document.getElementById('dateInput').value;
            if(!selDate) return Swal.fire('Error', 'Select a date', 'info');
            head.innerHTML = `<tr><th>Student</th><th colspan="4">Attendance Status</th></tr>`;
            db.ref(`daily_attendance/${selDate}/${cls}`).once('value', (snap) => {
                const data = snap.val(); body.innerHTML = "";
                if(!data) { document.getElementById('dlBtn').style.display = 'none'; return body.innerHTML = '<tr><td colspan="5" style="text-align:center;">No records found</td></tr>'; }
                document.getElementById('dlBtn').style.display = 'inline-flex';
                for(let name in data) { const status = data[name] ? '<span class="status-p">PRESENT</span>' : '<span class="status-a">ABSENT</span>'; body.innerHTML += `<tr><td>${name}</td><td colspan="4">${status}</td></tr>`; }
            });
        } else {
            head.innerHTML = `<tr><th>Student</th><th>P</th><th>A</th><th>Total</th><th>%</th></tr>`;
            db.ref(`attendance/${cls}/students`).once('value', (snap) => {
                const data = snap.val(); body.innerHTML = "";
                if(!data) { document.getElementById('dlBtn').style.display = 'none'; return body.innerHTML = '<tr><td colspan="5" style="text-align:center;">No data found</td></tr>'; }
                document.getElementById('dlBtn').style.display = 'inline-flex';
                for(let name in data) {
                    let p = 0, t = 0;
                    if(type === 'monthly') {
                        const selMonth = document.getElementById('monthInput').value;
                        if(!selMonth) return;
                        const mData = (data[name].months && data[name].months[selMonth]) ? data[name].months[selMonth] : null;
                        p = mData ? (mData.present || 0) : 0; t = mData ? (mData.total || 0) : 0;
                    } else {
                        if (data[name].months) Object.values(data[name].months).forEach(month => { p += (month.present || 0); t += (month.total || 0); });
                    }
                    const a = t - p; const pct = t > 0 ? Math.round((p/t)*100) : 0;
                    body.innerHTML += `<tr><td>${name}</td><td>${p}</td><td>${a}</td><td>${t}</td><td>${pct}%</td></tr>`;
                }
            });
        }
    }

    async function downloadFilteredReport() {
        const cls = document.getElementById('clsPick').value;
        const type = document.getElementById('viewType').value;
        const rows = document.getElementById('attBody').querySelectorAll('tr');
        const period = (type === 'monthly') ? document.getElementById('monthInput').value : (type === 'daily' ? document.getElementById('dateInput').value : "Overall History");
        const workbook = new ExcelJS.Workbook();
        const sheet = workbook.addWorksheet('Attendance_Report');

        sheet.mergeCells('A1:G1');
        const mH = sheet.getCell('A1'); mH.value = 'PARAMOUNT ENGLISH MEDIUM SCHOOL';
        mH.font = { name: 'Montserrat', size: 18, bold: true, color: { argb: 'FFFFFFFF' } };
        mH.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF006633' } };
        mH.alignment = { horizontal: 'center', vertical: 'middle' };

        sheet.mergeCells('A2:G2');
        const sH = sheet.getCell('A2'); sH.value = `STUDENT ATTENDANCE REPORT - ${cls.toUpperCase()}`;
        sH.font = { name: 'Montserrat', size: 12, bold: true, color: { argb: 'FF000000' } };
        sH.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFFFD700' } };
        sH.alignment = { horizontal: 'center', vertical: 'middle' };

        sheet.mergeCells('A3:G3');
        sheet.getCell('A3').value = `Period: ${period} | Exported: ${new Date().toLocaleDateString()}`;
        sheet.getCell('A3').alignment = { horizontal: 'center' };

        sheet.getRow(5).height = 25;
        const headerRow = sheet.getRow(5);
        headerRow.values = ['ROLL NO', 'STUDENT NAME', 'PRESENT', 'ABSENT', 'TOTAL', 'PERCENTAGE', 'REMARKS'];
        headerRow.eachCell(c => {
            c.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF004D26' } };
            c.font = { bold: true, color: { argb: 'FFFFFFFF' } };
            c.alignment = { horizontal: 'center', vertical: 'middle' };
            c.border = { top:{style:'thin'}, left:{style:'thin'}, bottom:{style:'thin'}, right:{style:'thin'} };
        });

        sheet.columns = [{key:'roll',width:15},{key:'name',width:35},{key:'p',width:12},{key:'a',width:12},{key:'t',width:12},{key:'pct',width:15},{key:'rem',width:20}];

        rows.forEach(r => {
            const name = r.cells[0].innerText;
            const added = sheet.addRow({
                roll: studentRolls[name] || "N/A", name: name,
                p: (type==='daily') ? (r.cells[1].innerText==="PRESENT"?1:0) : r.cells[1].innerText,
                a: (type==='daily') ? (r.cells[1].innerText==="ABSENT"?1:0) : r.cells[2].innerText,
                t: (type==='daily') ? 1 : r.cells[3].innerText,
                pct: (type==='daily') ? (r.cells[1].innerText==="PRESENT"?"100%":"0%") : r.cells[4].innerText,
                rem: ""
            });
            added.eachCell((cell, col) => {
                cell.alignment = { horizontal: (col===2)?'left':'center', vertical: 'middle' };
                cell.border = { top:{style:'thin'}, left:{style:'thin'}, bottom:{style:'thin'}, right:{style:'thin'} };
                if(col === 6) { const v = parseInt(cell.value); if(v >= 85) cell.font = { color: { argb: 'FF2E7D32' }, bold: true }; else if(v < 75) cell.font = { color: { argb: 'FFC62828' }, bold: true }; }
            });
        });
        const buffer = await workbook.xlsx.writeBuffer();
        const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
        const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = `Paramount_${cls}_Report.xlsx`; link.click();
    }

    function postAnn() { db.ref('announcement').set(document.getElementById('annMsg').value).then(() => Swal.fire('Published', '', 'success')); }
    function clearAnn() { db.ref('announcement').remove().then(() => { document.getElementById('annMsg').value = ""; Swal.fire('Cleared', '', 'info'); }); }

    async function resetMonthlyData() {
        const currentMonth = document.getElementById('monthInput').value;
        const confirmResult = await Swal.fire({ title: 'Confirm Full Monthly Reset', text: `Fully erase logs for ${currentMonth}?`, icon: 'warning', showCancelButton: true, confirmButtonColor: '#d32f2f' });
        if (confirmResult.isConfirmed) {
            const correctPass = await getAdminPassword();
            const { value: password } = await Swal.fire({ title: 'Enter Password', input: 'password', showCancelButton: true });
            if (password === correctPass) {
                try {
                    Swal.fire({ title: 'Purging...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                    const updates = {};
                    const statsSnapshot = await db.ref('attendance').once('value');
                    const statsData = statsSnapshot.val();
                    if (statsData) { Object.keys(statsData).forEach(cls => { const students = statsData[cls].students; if (students) Object.keys(students).forEach(name => { updates[`attendance/${cls}/students/${name}/months/${currentMonth}`] = null; }); }); }
                    const dailySnapshot = await db.ref('daily_attendance').once('value');
                    const dailyData = dailySnapshot.val();
                    if (dailyData) { Object.keys(dailyData).forEach(dateStr => { if (dateStr.startsWith(currentMonth)) updates[`daily_attendance/${dateStr}`] = null; }); }
                    await db.ref().update(updates); Swal.fire('Success', `Data for ${currentMonth} fully erased.`, 'success'); if(document.getElementById('clsPick').value) viewAtt();
                } catch (error) { Swal.fire('Error', error.message, 'error'); }
            } else if (password) { Swal.fire('Denied', 'Incorrect Password', 'error'); }
        }
    }

    async function resetAttendanceData() {
        const confirmResult = await Swal.fire({ title: 'MASTER RESET', text: "Delete everything? Archive will be generated first.", icon: 'warning', showCancelButton: true, confirmButtonColor: '#d32f2f' });
        if (confirmResult.isConfirmed) {
            const correctPass = await getAdminPassword();
            const { value: password } = await Swal.fire({ title: 'Enter Admin Password', input: 'password', showCancelButton: true });
            if (password === correctPass) {
                try {
                    Swal.fire({ title: 'Running Backup...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                    const snapshot = await db.ref('attendance').once('value');
                    const allData = snapshot.val();
                    if (allData) await generateMasterBackup(allData);
                    await db.ref('attendance').remove(); await db.ref('daily_attendance').remove(); 
                    Swal.fire('Success', 'Database cleared. Backup downloaded.', 'success');
                } catch (error) { Swal.fire('Error', 'Reset failed: ' + error.message, 'error'); }
            } else if (password) { Swal.fire('Denied', 'Incorrect Password', 'error'); }
        }
    }

    async function generateMasterBackup(data) {
        const workbook = new ExcelJS.Workbook();
        const sheet = workbook.addWorksheet('Full_Archive');
        sheet.columns = [{header:'ROLL',key:'roll',width:15},{header:'CLASS',key:'class',width:15},{header:'NAME',key:'name',width:30},{header:'PRESENT',key:'present',width:15},{header:'TOTAL',key:'total',width:15}];
        Object.keys(data).forEach(className => { const students = data[className].students; if (students) Object.keys(students).forEach(name => { sheet.addRow({ roll: studentRolls[name] || "N/A", class: className, name: name, present: students[name].presentDays || 0, total: students[name].totalDays || 0 }); }); });
        const buffer = await workbook.xlsx.writeBuffer();
        const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
        const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = `Paramount_Master_Archive.xlsx`; link.click();
    }

    document.getElementById('monthInput').value = new Date().toISOString().slice(0, 7);
    document.getElementById('dateInput').valueAsDate = new Date();
</script>
